name: CXOrbia Phase A TyA R15G Source-Safe Gates

on:
  workflow_dispatch:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - 'tools/hr-source/tya-build-live-hr-source-safe-static.mjs'
      - 'tools/hr-source/tya-build-live-hr-source-safe-r15g.mjs'
      - 'tools/hr-source/tya-canonicalize-live-hr-source-safe-r18a.mjs'
      - 'tools/hr-source/tya-hr-source-xlsx-lite.mjs'
      - 'tools/reconciliation/tya-apply-existing-r11d-r14c-certification-r18b.mjs'
      - 'tools/release/tya-source-safe-binding-build-r15f.mjs'
      - 'tools/release/tya-source-safe-binding-build-r15g.mjs'
      - 'tools/release/tya-source-safe-binding-build-r18a.mjs'
      - 'tools/release/tya-visible-overlays-build-r18d.mjs'
      - 'tools/qa/tya-source-semantics-r15g-gate.mjs'
      - 'tools/qa/tya-project-period-kpi-history-gate.mjs'
      - 'tools/qa/tya-phase-a-source-safe-visual-smoke.mjs'
      - 'tools/qa/tya-phase-a-visible-overlays-smoke-r18d.mjs'
      - 'tools/qa/verify-fast-lane-promotion-policy.mjs'
      - 'app/core/tya-phase-a-source-safe-preview.js'
      - 'app/data/tya-financial-control-source-safe.js'
      - 'app/data/tya-hr-source-safe-periods.js'
      - 'backend/config/phase-a-financial-review-queue-r14c.source-safe.json'
      - 'backend/contracts/prototype-baseline-registry-v1.json'
      - '.github/workflows/cxorbia-phase-a-source-safe-visual-smoke-tya.yml'
  pull_request:
    branches:
      - docs-tya-v6-v71-audit
      - release/cxorbia-tya-rc-20260630
    paths:
      - 'tools/hr-source/tya-build-live-hr-source-safe-r15g.mjs'
      - 'tools/hr-source/tya-canonicalize-live-hr-source-safe-r18a.mjs'
      - 'tools/reconciliation/tya-apply-existing-r11d-r14c-certification-r18b.mjs'
      - 'tools/release/tya-source-safe-binding-build-r15f.mjs'
      - 'tools/release/tya-source-safe-binding-build-r15g.mjs'
      - 'tools/release/tya-source-safe-binding-build-r18a.mjs'
      - 'tools/release/tya-visible-overlays-build-r18d.mjs'
      - 'tools/qa/tya-source-semantics-r15g-gate.mjs'
      - 'tools/qa/tya-project-period-kpi-history-gate.mjs'
      - 'tools/qa/tya-phase-a-source-safe-visual-smoke.mjs'
      - 'tools/qa/tya-phase-a-visible-overlays-smoke-r18d.mjs'
      - 'app/core/tya-phase-a-source-safe-preview.js'
      - 'app/data/tya-financial-control-source-safe.js'
      - '.github/workflows/cxorbia-phase-a-source-safe-visual-smoke-tya.yml'

permissions:
  contents: read
  statuses: write

defaults:
  run:
    shell: bash

env:
  CXORBIA_GATE_OUT: .tmp/r15g-source-safe-gates

jobs:
  r15g-source-safe-gates:
    name: TyA R15G source-safe semantic, role, history and overlay gates
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout candidate or active baseline
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build exact local source-safe runtime
        env:
          CXORBIA_HR_SOURCE_SAFE_OUT: app/data/tya-hr-source-safe-periods.js
          CXORBIA_HR_LIVE_MAX_ROW: '140'
          CXORBIA_HR_LIVE_MAX_COL: AI
        run: |
          set -euo pipefail
          mkdir -p "$CXORBIA_GATE_OUT"
          node tools/hr-source/tya-build-live-hr-source-safe-r15g.mjs
          node tools/hr-source/tya-canonicalize-live-hr-source-safe-r18a.mjs \
            --input app/data/tya-hr-source-safe-periods.js \
            --out app/data/tya-hr-source-safe-periods.js \
            --report-dir "$CXORBIA_GATE_OUT/r18a-canonicalization"
          node tools/reconciliation/tya-apply-existing-r11d-r14c-certification-r18b.mjs \
            --payload app/data/tya-hr-source-safe-periods.js \
            --out app/data/tya-hr-source-safe-periods.js \
            --report-dir "$CXORBIA_GATE_OUT/r18b-existing-overlays"
          node <<'NODE'
          const fs = require('fs');
          const rows = JSON.parse(fs.readFileSync('backend/config/phase-a-financial-review-queue-r14c.source-safe.json','utf8'));
          if (!Array.isArray(rows) || rows.length !== 92) throw new Error('Expected 92 approved R14C review items.');
          const normalized = rows.map((item,index)=>({...item,key:item.key || `r14c_control:${item.type || 'review'}:${item.entityId || 'source'}:${String(index+1).padStart(3,'0')}`,sourceSafe:true}));
          if (new Set(normalized.map(item=>item.key)).size !== normalized.length) throw new Error('R14C stable keys are not unique.');
          fs.writeFileSync(process.env.CXORBIA_GATE_OUT + '/r14c-review-queue-stable.source-safe.json',JSON.stringify(normalized,null,2)+'\n','utf8');
          NODE
          node tools/release/tya-source-safe-binding-build-r18a.mjs \
            --html app/index.html \
            --out "$CXORBIA_GATE_OUT/source-safe-binding"
          node tools/release/tya-visible-overlays-build-r18d.mjs \
            --html app/index.html \
            --r14c-queue "$CXORBIA_GATE_OUT/r14c-review-queue-stable.source-safe.json" \
            --out "$CXORBIA_GATE_OUT/visible-overlay-build"
          test -s app/data/tya-hr-source-safe-periods.js
          test -s app/adapters/tya-phase-a-source-safe-dev-adapter-r18a.js
          test -s app/adapters/tya-phase-a-visible-overlays-r18d.js
          grep -q 'semanticNormalizer.*r15g' app/data/tya-hr-source-safe-periods.js
          grep -Fq "CX.data.currentProjectId = 'cinepolis'" app/adapters/tya-phase-a-source-safe-dev-adapter-r18a.js
          grep -Fq 'CX.data.currentPeriodId = latest && latest.id' app/adapters/tya-phase-a-source-safe-dev-adapter-r18a.js
          grep -Fq 'adapters/tya-phase-a-visible-overlays-r18d.js' app/index.html

      - name: Static syntax and fast-lane policy
        run: |
          set -euo pipefail
          node --check tools/hr-source/tya-build-live-hr-source-safe-r15g.mjs
          node --check tools/hr-source/tya-canonicalize-live-hr-source-safe-r18a.mjs
          node --check tools/reconciliation/tya-apply-existing-r11d-r14c-certification-r18b.mjs
          node --check tools/release/tya-source-safe-binding-build-r15f.mjs
          node --check tools/release/tya-source-safe-binding-build-r15g.mjs
          node --check tools/release/tya-source-safe-binding-build-r18a.mjs
          node --check tools/release/tya-visible-overlays-build-r18d.mjs
          node --check tools/qa/tya-source-semantics-r15g-gate.mjs
          node --check tools/qa/tya-project-period-kpi-history-gate.mjs
          node --check tools/qa/tya-phase-a-visible-overlays-smoke-r18d.mjs
          node --check app/core/tya-phase-a-source-safe-preview.js
          node tools/qa/verify-fast-lane-promotion-policy.mjs

      - name: Install Playwright
        run: |
          npm init -y
          npm i -D playwright@1.47.2
          npx playwright install --with-deps chromium

      - name: Start local exact source-safe app
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 --directory app > "$CXORBIA_GATE_OUT/server.log" 2>&1 &
          echo $! > "$CXORBIA_GATE_OUT/server.pid"
          for attempt in $(seq 1 30); do
            if curl -fsS 'http://127.0.0.1:4173/index.html?cxTyaPhaseA=1&r18d=visible' >/dev/null; then
              echo 'Source-safe smoke server ready.'
              exit 0
            fi
            sleep 1
          done
          cat "$CXORBIA_GATE_OUT/server.log" || true
          echo 'Source-safe smoke server did not become ready.' >&2
          exit 1

      - name: Run fail-closed source-safe gates
        continue-on-error: true
        env:
          CXORBIA_BASE_URL: http://127.0.0.1:4173/index.html?cxTyaPhaseA=1&r18d=visible
          CXORBIA_EXPECT_TENANT_ID: tya
          CXORBIA_EXPECT_PROJECT_ID: cinepolis
          CXORBIA_EXPECT_PERIODS: '14'
          CXORBIA_EXPECT_VISITS: '616'
          CXORBIA_EXPECT_SHOPPERS: '216'
          CXORBIA_EXPECT_VISITS_PER_PERIOD: '44'
          CXORBIA_MAX_SOURCE_AGE_HOURS: '24'
        run: |
          node tools/qa/tya-source-semantics-r15g-gate.mjs --out "$CXORBIA_GATE_OUT/source-semantics"
          node tools/qa/tya-phase-a-source-safe-visual-smoke.mjs --out "$CXORBIA_GATE_OUT/role-smoke"
          node tools/qa/tya-project-period-kpi-history-gate.mjs --out "$CXORBIA_GATE_OUT/project-period-kpi-history"
          node tools/qa/tya-phase-a-visible-overlays-smoke-r18d.mjs --out "$CXORBIA_GATE_OUT/visible-overlays"

      - name: Enforce fail-closed R15G decision
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const root = process.env.CXORBIA_GATE_OUT;
          const reports = [
            ['source-semantics',`${root}/source-semantics/report.json`],
            ['role-smoke',`${root}/role-smoke/phase-a-source-safe-visual-smoke-report.json`],
            ['project-period-kpi-history',`${root}/project-period-kpi-history/report.json`],
            ['visible-overlays',`${root}/visible-overlays/r18d-visible-overlays-smoke.json`]
          ];
          let failed = false;
          for (const [name,file] of reports) {
            if (!fs.existsSync(file)) throw new Error(`${name} report missing: ${file}`);
            const result = JSON.parse(fs.readFileSync(file,'utf8'));
            console.log(`${name}=${result.decision}; blockers=${result.blockers?.length || 0}; warnings=${result.warnings?.length || 0}`);
            if (result.ok !== true) failed = true;
          }
          if (failed) {
            console.error('NO_GO: TyA source-safe runtime is not coherent.');
            process.exit(1);
          }
          console.log('PASS_R15G_TYA_SOURCE_SAFE_GATES');
          NODE

      - name: Cleanup local server
        if: always()
        run: |
          if [ -f "$CXORBIA_GATE_OUT/server.pid" ]; then
            kill "$(cat "$CXORBIA_GATE_OUT/server.pid")" 2>/dev/null || true
          fi

      - name: Upload sanitized reports and screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-a-tya-r15g-source-safe-gates
          path: .tmp/r15g-source-safe-gates
          if-no-files-found: error
          retention-days: 14

      - name: Publish R15G commit status
        if: always()
        uses: actions/github-script@v7
        env:
          CXORBIA_JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const state = process.env.CXORBIA_JOB_STATUS === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'cxorbia/r15g-source-safe',
              description: state === 'success'
                ? 'R15G/R18D exact source-safe runtime PASS'
                : 'R15G/R18D exact source-safe runtime HOLD',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
