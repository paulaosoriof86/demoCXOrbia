name: CXOrbia Fix Ops HR Row Filter One-Shot

on:
  push:
    branches:
      - ops/firebase-dev-readonly-20260710
    paths:
      - '.github/workflows/cxorbia-fix-ops-hr-row-filter-one-shot.yml'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  fix-and-self-remove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ops branch
        uses: actions/checkout@v4
        with:
          ref: ops/firebase-dev-readonly-20260710
          fetch-depth: 0

      - name: Apply exact visit-row filter
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          p = Path('tools/hr-source/tya-build-live-hr-source-safe-static.mjs')
          text = p.read_text(encoding='utf-8')
          old = "function isVisitRow(row, c){ return !!(cell(row, c.pais) && cell(row, c.shopping)); }"
          new = "function isVisitRow(row, c){\n  return !!(cell(row, c.pais) && cell(row, c.shopping) && cell(row, c.idCinema));\n}"
          if old not in text:
              raise SystemExit('Expected original visit-row predicate not found; refusing blind change.')
          text = text.replace(old, new, 1)
          oauth = "const body = new URLSearchParams({ grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer', assertion: jwt });"
          if oauth not in text:
              raise SystemExit('Expected exact OAuth grant type missing; refusing commit.')
          p.write_text(text, encoding='utf-8', newline='\n')
          PY
          node --check tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          git rm .github/workflows/cxorbia-fix-ops-hr-row-filter-one-shot.yml

      - name: Commit exact correction
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          git commit -m 'fix(hr-source): excluye fila resumen HN sin ID Cinema'
          git push origin HEAD:ops/firebase-dev-readonly-20260710
