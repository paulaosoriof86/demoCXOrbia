name: CXOrbia Phase A Live HR Read-Only Probe

on:
  workflow_dispatch:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - 'backend/contracts/phase-a-live-hr-runtime-read-v1.json'
      - 'tools/qa/tya-live-hr-read-probe-gate.mjs'
      - '.github/workflows/cxorbia-phase-a-live-hr-read-probe.yml'

permissions:
  contents: read

concurrency:
  group: cxorbia-phase-a-live-hr-read-probe
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  probe:
    name: Read current HR source and validate dynamic semantics
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout active branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate contract and scripts
        run: |
          set -euo pipefail
          node --check tools/qa/tya-live-hr-read-probe-gate.mjs
          node --check tools/hr-source/tya-build-live-hr-source-safe-r20.mjs
          node --check tools/hr-source/tya-filter-source-safe-to-inventory-r20.mjs
          node --check tools/hr-source/tya-canonicalize-live-hr-source-safe-r18a.mjs
          node --check tools/hr-source/tya-reapply-canonical-state-r20.mjs
          node -e "const fs=require('fs');const x=JSON.parse(fs.readFileSync('backend/contracts/phase-a-live-hr-runtime-read-v1.json','utf8'));if(x.requirements?.noFixedOperationalCounts!==true||x.requirements?.serverSideRead!==true||x.requirements?.writesToHr!==false||x.requirements?.writesToFirestore!==false)process.exit(2);console.log('Live HR runtime-read contract valid.');"

      - name: Read HR now and build source-safe projection
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
          CXORBIA_HR_SOURCE_SAFE_OUT: app/data/tya-hr-source-safe-periods.js
          CXORBIA_HR_LIVE_MAX_ROW: '140'
          CXORBIA_HR_LIVE_MAX_COL: AI
          CXORBIA_HR_EARLIEST_PERIOD: '2025-06'
          CXORBIA_GATE_OUT: .tmp/live-hr-read-probe/source
        run: |
          set -euo pipefail
          mkdir -p .tmp/live-hr-read-probe
          node tools/hr-source/tya-build-live-hr-source-safe-r20.mjs
          node tools/hr-source/tya-filter-source-safe-to-inventory-r20.mjs \
            --input app/data/tya-hr-source-safe-periods.js \
            --out app/data/tya-hr-source-safe-periods.js \
            --inventory backend/contracts/tya-hr-tab-inventory-r20-v1.json \
            --report-dir .tmp/live-hr-read-probe/inventory
          node tools/hr-source/tya-canonicalize-live-hr-source-safe-r18a.mjs \
            --input app/data/tya-hr-source-safe-periods.js \
            --out app/data/tya-hr-source-safe-periods.js \
            --report-dir .tmp/live-hr-read-probe/canonical
          node tools/hr-source/tya-reapply-canonical-state-r20.mjs \
            --input app/data/tya-hr-source-safe-periods.js \
            --out app/data/tya-hr-source-safe-periods.js \
            --report-dir .tmp/live-hr-read-probe/state

      - name: Gate freshness and live semantic consistency
        run: |
          set -euo pipefail
          node tools/qa/tya-live-hr-read-probe-gate.mjs \
            --payload app/data/tya-hr-source-safe-periods.js \
            --out .tmp/live-hr-read-probe/gate \
            --max-age-seconds 900

      - name: Prove no provider writes or deploy occurred
        run: |
          set -euo pipefail
          printf '%s\n' '{"hrWrites":0,"firestoreWrites":0,"imports":0,"deploy":0,"production":false,"payments":0}' > .tmp/live-hr-read-probe/safe-state.json

      - name: Upload source-safe probe evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-live-hr-read-only-probe
          path: |
            .tmp/live-hr-read-probe
          if-no-files-found: error
          retention-days: 14
