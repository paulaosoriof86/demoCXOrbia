name: CXOrbia Phase A Live HR Runtime Deploy DEV Temporary

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cxorbia-phase-a-live-hr-runtime-deploy-dev-temporary.yml'

permissions:
  contents: read
  statuses: write
  issues: write
  id-token: write

env:
  GCP_PROJECT_ID: cxorbia-backend-dev
  OUT_DIR: .tmp/live-hr-runtime-api-diagnostic

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: cxorbia-backend-dev

      - name: Capture service activation diagnostics
        run: |
          set +e
          mkdir -p "$OUT_DIR"
          gcloud services list --enabled --project "$GCP_PROJECT_ID" --format='value(config.name)' > "$OUT_DIR/enabled.out" 2> "$OUT_DIR/enabled.err"
          echo $? > "$OUT_DIR/enabled.exit"
          gcloud services enable run.googleapis.com cloudbuild.googleapis.com firebasehosting.googleapis.com containerregistry.googleapis.com artifactregistry.googleapis.com --project "$GCP_PROJECT_ID" --quiet > "$OUT_DIR/enable.out" 2> "$OUT_DIR/enable.err"
          echo $? > "$OUT_DIR/enable.exit"
          printf '%s\n' '{"diagnosticOnly":true,"deploy":false,"production":false,"writes":false}' > "$OUT_DIR/safe-state.json"
          exit 0

      - name: Publish sanitized diagnostic to PR 7
        uses: actions/github-script@v7
        env:
          OUT_DIR: ${{ env.OUT_DIR }}
        with:
          script: |
            const fs=require('fs');
            const p=process.env.OUT_DIR;
            const read=(f)=>{try{return fs.readFileSync(`${p}/${f}`,'utf8').trim();}catch{return ''}};
            const sanitize=(s)=>String(s||'')
              .replace(/[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}/gi,'[service-account]')
              .replace(/\b\d{8,}\b/g,'[numeric-id]')
              .slice(0,1800);
            const enabledExit=read('enabled.exit');
            const enableExit=read('enable.exit');
            const enabledCount=read('enabled.out')?read('enabled.out').split(/\r?\n/).filter(Boolean).length:0;
            const errors=sanitize([read('enabled.err'),read('enable.err')].filter(Boolean).join('\n'))||'(sin texto de error)';
            const body=`### Diagnóstico automático — carril temporal DEV\n\n- Commit main temporal: \`${context.sha}\`\n- Lectura de APIs habilitadas: exit \`${enabledExit||'n/a'}\`\n- APIs visibles: \`${enabledCount}\`\n- Activación de APIs requeridas: exit \`${enableExit||'n/a'}\`\n- Deploy ejecutado: **no**\n- Producción/escrituras/importaciones/pagos: **no**\n\n\`\`\`text\n${errors}\n\`\`\``;
            await github.rest.issues.createComment({owner:context.repo.owner,repo:context.repo.repo,issue_number:7,body});

      - uses: actions/upload-artifact@v4
        with:
          name: cxorbia-live-hr-runtime-api-diagnostic-exact
          path: ${{ env.OUT_DIR }}
          if-no-files-found: error
          retention-days: 14

      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({owner:context.repo.owner,repo:context.repo.repo,sha:context.sha,state:'success',context:'cxorbia/live-hr-runtime-api-diagnostic',description:'Exact DEV service diagnostics captured'});
