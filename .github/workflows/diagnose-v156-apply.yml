name: diagnose V156 apply
on:
  push:
    branches: [docs-tya-v6-v71-audit]
    paths:
      - '.github/workflows/diagnose-v156-apply.yml'
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
      - name: Capture exact apply result
        shell: bash
        run: |
          set +e
          mkdir -p diagnostic
          {
            echo "branch=$(git branch --show-current)"
            echo "head=$(git rev-parse HEAD)"
            echo "payload_present=$(test -f .cxorbia/v156-promotion.patch.gz.b64 && echo yes || echo no)"
            wc -c .cxorbia/v156-promotion.patch.gz.b64
            sha256sum .cxorbia/v156-promotion.patch.gz.b64
            base64 --decode .cxorbia/v156-promotion.patch.gz.b64 > /tmp/v156.patch.gz
            echo "base64_status=$?"
            wc -c /tmp/v156.patch.gz
            sha256sum /tmp/v156.patch.gz
            gzip -t /tmp/v156.patch.gz
            echo "gzip_test_status=$?"
            gzip -dc /tmp/v156.patch.gz > /tmp/v156.patch
            echo "gzip_decode_status=$?"
            wc -c /tmp/v156.patch
            sha256sum /tmp/v156.patch
            echo "--- patch head ---"
            head -n 12 /tmp/v156.patch
            echo "--- apply check ---"
            git apply --check --verbose /tmp/v156.patch
            echo "apply_check_status=$?"
            echo "--- apply 3way ---"
            git apply --3way --index --verbose /tmp/v156.patch
            echo "apply_3way_status=$?"
            echo "--- git status ---"
            git status --short
          } > diagnostic/FINALIZATION-DIAGNOSTIC.txt 2>&1
          git reset --hard HEAD >/dev/null 2>&1
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: v156-finalization-diagnostic
          path: diagnostic/FINALIZATION-DIAGNOSTIC.txt
          if-no-files-found: error
