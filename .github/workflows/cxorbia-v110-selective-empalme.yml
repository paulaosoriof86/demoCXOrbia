name: CXOrbia V110 Selective Empalme

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/empalme/v110-selective/READY

permissions:
  contents: write

jobs:
  empalme-selectivo-v110:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconstruir y verificar parches V110
        shell: bash
        run: |
          set -euo pipefail
          cat tools/empalme/v110-selective/parts/runtime-part-*.patchpart > /tmp/v110-runtime.patch
          cat tools/empalme/v110-selective/parts/academia-part-*.patchpart > /tmp/v110-academia.patch
          echo "d19e42df846d4b03f9407e856cc70e1dace6166ff3a46f17d93bda035566f0bd  /tmp/v110-runtime.patch" | sha256sum -c -
          echo "8395ca4eeb4dc5b5e459bcaf51ef538419db80535baaf319aec68688551740fd  /tmp/v110-academia.patch" | sha256sum -c -

      - name: Registrar protección de mejoras locales
        shell: bash
        run: |
          set -euo pipefail
          sha256sum app/core/finanzas-core.js app/core/topbar.js > /tmp/v110-protected-before.sha256

      - name: Precheck fail-closed de empalme 3-way
        shell: bash
        run: |
          set -euo pipefail
          git apply --3way --check /tmp/v110-runtime.patch
          git apply --3way --check /tmp/v110-academia.patch

      - name: Aplicar delta acumulado V105 a V110 sobre rama viva
        shell: bash
        run: |
          set -euo pipefail
          git apply --3way /tmp/v110-runtime.patch
          git apply --3way /tmp/v110-academia.patch

      - name: Verificar alcance exacto y preservación
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/v110-expected-files.txt <<'EOF'
          app/core/cliente-data.js
          app/core/data.js
          app/core/liquidacion.js
          app/modules/academia.js
          app/modules/beneficios.js
          app/modules/cert.js
          app/modules/cliente-extra.js
          app/modules/cliente.js
          app/modules/dashboard.js
          app/modules/finanzas.js
          app/styles/layout.css
          EOF
          sed -i 's/^          //' /tmp/v110-expected-files.txt
          git diff --name-only HEAD | sort > /tmp/v110-actual-files.txt
          diff -u /tmp/v110-expected-files.txt /tmp/v110-actual-files.txt
          sha256sum -c /tmp/v110-protected-before.sha256
          ! grep -RInE '^(<<<<<<<|=======|>>>>>>>)' \
            app/core/cliente-data.js app/core/data.js app/core/liquidacion.js \
            app/modules/academia.js app/modules/beneficios.js app/modules/cert.js \
            app/modules/cliente-extra.js app/modules/cliente.js app/modules/dashboard.js \
            app/modules/finanzas.js app/styles/layout.css

      - name: Validar sintaxis y contratos críticos
        shell: bash
        run: |
          set -euo pipefail
          for f in \
            app/core/cliente-data.js app/core/data.js app/core/liquidacion.js \
            app/modules/academia.js app/modules/beneficios.js app/modules/cert.js \
            app/modules/cliente-extra.js app/modules/cliente.js app/modules/dashboard.js \
            app/modules/finanzas.js; do
            node --check "$f"
          done
          grep -Fq "const reviewRequired=[]" app/core/data.js
          grep -Fq "const visitasValidas=[]" app/core/data.js
          grep -Fq "v.loteId=lote" app/core/data.js
          grep -Fq "reviewRequired" app/modules/finanzas.js
          grep -Fq "loteIdCombos" app/modules/finanzas.js
          grep -Fq "if(rol==='shopper')" app/modules/academia.js
          grep -Fq "CX.data.getShopper" app/modules/academia.js
          grep -Fq "paises=[]" app/modules/academia.js
          grep -Fq "visibleCourses" app/modules/academia.js
          grep -Fq "createdByUserId" app/modules/academia.js
          grep -Fq "Number.isFinite" app/core/cliente-data.js
          grep -Fq ".between{flex-wrap:wrap" app/styles/layout.css
          if grep -Fq "const lote='L-'+Date.now().toString(36).slice(-4).toUpperCase()" app/core/data.js; then
            echo "ERROR: quedó el lote aleatorio anterior en payVisits" >&2
            exit 1
          fi
          if grep -Fq "||'sh1'" app/modules/beneficios.js; then
            echo "ERROR: quedó fallback sh1 en Beneficios" >&2
            exit 1
          fi

      - name: Documentar empalme y pendientes no bloqueantes
        shell: bash
        run: |
          set -euo pipefail
          cat > app/docs/CAMBIOS-BACKEND-ADDENDUM-EMPALME-SELECTIVO-V110-20260712.md <<'EOF'
          # CAMBIOS BACKEND — ADDENDUM EMPALME SELECTIVO V110

          Fecha: 2026-07-12

          ## Resultado

          Se aplicó mediante merge 3-way el delta acumulado V105→V110 sobre la rama viva, sin reemplazar a ciegas el árbol `app/` y preservando las mejoras locales existentes.

          Archivos de runtime empalmados: 11. No se borraron documentos históricos, backend, contratos, tools, HR source-safe ni gates.

          Fuente auditada: `Prototype development request CXOrbia V110.zip`.
          ZIP SHA-256: `1f9e30f711899af500683e7292eb8652e9e0bc4b888cd1252a5482795dbba227`.
          Patch runtime SHA-256: `d19e42df846d4b03f9407e856cc70e1dace6166ff3a46f17d93bda035566f0bd`.
          Patch Academia SHA-256: `8395ca4eeb4dc5b5e459bcaf51ef538419db80535baaf319aec68688551740fd`.

          ## Phase A

          Se preservan R5/R6/R8/R9, HR source-safe, importadores, reviewQueue, auditEvents y datos operativos ya preparados. El siguiente gate es R10 source-safe sobre el runtime empalmado.

          ## Estado seguro

          Sin merge del PR, deploy, producción, importación real, Firebase/HR writes, Make/Gemini live ni pagos reales.
          EOF
          sed -i 's/^          //' app/docs/CAMBIOS-BACKEND-ADDENDUM-EMPALME-SELECTIVO-V110-20260712.md

          cat > app/docs/ACADEMIA-IMPACT-EMPALME-SELECTIVO-V110-20260712.md <<'EOF'
          # ACADEMIA — IMPACTO DEL EMPALME SELECTIVO V110

          - Scope de acceso separado de taxonomía.
          - País del shopper resuelto desde su identidad; sin país, fail-closed para contenido restringido.
          - KPIs, rutas, cursos, lecciones y certificados usan la misma colección visible.
          - Creador, revisor y aprobador usan IDs estables o quedan en preview honesto.
          - El próximo smoke R10 debe verificar Admin/Shopper, países GT/HN, KPIs y cero fuga de contenido.
          EOF
          sed -i 's/^          //' app/docs/ACADEMIA-IMPACT-EMPALME-SELECTIVO-V110-20260712.md

          cat > app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-EMPALME-V110-20260712.md <<'EOF'
          # TRACKER PHASE A — EMPALME V110

          - Auditoría V110: READY.
          - P0 Claude V109→V110: CLOSED.
          - Empalme físico selectivo V110: READY, sujeto al commit de este workflow.
          - Source lock unión repo+V110: generado y verificado en este bloque.
          - R10 source-safe: siguiente bloque exacto.
          - Firebase DEV read-only: pendiente autorización específica.
          - Pagos/certificaciones: pendientes fuentes sanitizadas.
          - Producción: HOLD.
          EOF
          sed -i 's/^          //' app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-EMPALME-V110-20260712.md

          if ! grep -Fq "Empalme selectivo V110 — 2026-07-12" CAMBIOS-BACKEND.md; then
            cat >> CAMBIOS-BACKEND.md <<'EOF'

          ## Empalme selectivo V110 — 2026-07-12

          - Delta acumulado V105→V110 aplicado con merge 3-way sobre la rama viva.
          - Se preservaron backend, documentación, gates y mejoras locales fuera de los 11 archivos frontend autorizados.
          - Se generó source lock unión verificable.
          - Sin deploy, producción, imports, writes, providers ni pagos reales.
          EOF
          fi

          if ! grep -Fq "Cierre V110 empalmada — 2026-07-12" RESUMEN-PARA-CLAUDE.md; then
            cat >> RESUMEN-PARA-CLAUDE.md <<'EOF'

          ## Cierre V110 empalmada — 2026-07-12

          - Los dos P0 de Academia por país y Finanzas fail-closed quedaron cerrados y empalmados.
          - No se genera otro paquete Claude.
          - No reabrir finite scores, lotes multipaís/multimoneda, IDs determinísticos, responsive, Beneficios, certificaciones, cache demo/real ni shell.
          - P1/P2 restantes quedan acumulados para un futuro paquete, no bloquean R10.
          EOF
          fi

          if ! grep -Fq "Pendientes no bloqueantes post-V110 — 2026-07-12" PENDIENTES-PROTOTIPO.md; then
            cat >> PENDIENTES-PROTOTIPO.md <<'EOF'

          ## Pendientes no bloqueantes post-V110 — 2026-07-12

          - Normalizar espacios en país/moneda antes del backend real de pagos.
          - Deduplicar IDs dentro de una llamada directa a `payVisits()`.
          - Endurecer idempotencia ante llamadas repetidas.
          - Ajustar copy cuando cero visitas fueron procesadas.
          - Normalizar retorno futuro a `processed/reviewRequired`.
          EOF
          fi
          sed -i 's/^          //' CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md

      - name: Generar source lock unión V110 y verificar
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const path=require('path');
          const crypto=require('crypto');
          const root=path.resolve('app');
          const manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json';
          const verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]);
          const rels=[];
          function walk(dir){
            for(const ent of fs.readdirSync(dir,{withFileTypes:true})){
              const p=path.join(dir,ent.name);
              if(ent.isDirectory()) walk(p);
              else if(ent.isFile()) rels.push(path.relative(root,p).split(path.sep).join('/'));
            }
          }
          walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{
            const b=fs.readFileSync(path.join(root,r));
            return {path:r,size:b.length,sha256:sha(b)};
          });
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          const manifest={
            package:'CXORBIA-V110-UNION-EMPALME-R1',
            project:'CXOrbia',
            baseline:'V110 selectiva empalmada sobre rama viva con documentación/backend preservados',
            generatedAt:new Date().toISOString(),
            sourceZipSha256:'1f9e30f711899af500683e7292eb8652e9e0bc4b888cd1252a5482795dbba227',
            runtimePatchSha256:'d19e42df846d4b03f9407e856cc70e1dace6166ff3a46f17d93bda035566f0bd',
            academiaPatchSha256:'8395ca4eeb4dc5b5e459bcaf51ef538419db80535baaf319aec68688551740fd',
            fileCount:files.length,
            aggregateSha256,
            exclusionsDeclared:[
              {path:'core/build-lock.js',reason:'declara el aggregate y se excluye por referencia circular'},
              {path:manifestRel,reason:'manifest se excluye a sí mismo'},
              {path:verifierRel,reason:'verificador se genera junto al manifest'}
            ],
            files
          };
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(manifest,null,2)+'\n','utf8');
          const lock=`/* CXOrbia · Source lock unión V110 empalme R1\n   Fuente auditada: Prototype development request CXOrbia V110.zip\n   Manifiesto: ${manifestRel}\n   No implica deploy, producción, importación ni providers activos. */\nvar CX_SOURCE_LOCK={\n  manifestFile:'${manifestRel}',\n  aggregateSha256:'${aggregateSha256}',\n  fileCount:${files.length},\n  generatedAt:'${manifest.generatedAt.slice(0,10)}',\n  sourceZipSha256:'${manifest.sourceZipSha256}',\n  note:'Baseline auditada de continuidad V110, empalme selectivo con backend y mejoras locales preservados.'\n};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`;
          fs.writeFileSync(path.join(root,'core/build-lock.js'),lock,'utf8');
          const verifier=`#!/usr/bin/env node\nimport {readFile} from 'node:fs/promises';\nimport {createHash} from 'node:crypto';\nimport path from 'node:path';\nconst ROOT=process.cwd();\nconst M=JSON.parse(await readFile(path.join(ROOT,'${manifestRel}'),'utf8'));\nconst sha=b=>createHash('sha256').update(b).digest('hex');\nlet diffs=0;const entries=[];\nfor(const f of M.files){let b;try{b=await readFile(path.join(ROOT,f.path));}catch(e){console.error('DIFERENCIA faltante',f.path);diffs++;continue;}const h=sha(b);if(h!==f.sha256||b.length!==f.size){console.error('DIFERENCIA',f.path);diffs++;}entries.push(f.path+':'+h);}\nconst agg=sha(Buffer.from(entries.join('\\n'),'utf8'));if(agg!==M.aggregateSha256){console.error('DIFERENCIA aggregate',agg);diffs++;}\nconsole.log('Archivos verificados:',M.files.length);console.log('Aggregate recalculado:',agg);console.log(diffs?'Diferencias: '+diffs:'0 diferencias');process.exit(diffs?1:0);\n`;
          fs.writeFileSync(path.join(root,verifierRel),verifier,'utf8');
          console.log(JSON.stringify({fileCount:files.length,aggregateSha256},null,2));
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Limpiar transporte y workflow temporal anterior
        shell: bash
        run: |
          set -euo pipefail
          git rm -rf tools/empalme/v110-selective
          git rm -f .github/workflows/cxorbia-v110-selective-empalme.yml
          git rm -f .github/workflows/cxorbia-v110-runtime-empalme.yml || true

      - name: Commit controlado del empalme selectivo V110
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md .github/workflows tools/empalme || true
          if git diff --cached --quiet; then
            echo "ERROR: no hay cambios que commitear" >&2
            exit 1
          fi
          git commit -m "feat(frontend): empalme selectivo V110 preservando backend"
          git push origin HEAD:docs-tya-v6-v71-audit
