name: CXOrbia Phase A R15B Source Lock Refresh

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/release/READY-R15B-LOCK

permissions:
  contents: write

jobs:
  refresh-r15b-source-lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Refresh V110 union manifest after R15B report clarification
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-new-empty-r15b.source-safe.json','utf8'));
          if(R.decision!=='BLOCKED_PROJECT_CREATION_PERMISSION_OR_POLICY') throw new Error('R15B decision drift');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}
          walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;
          M.r15b={decision:R.decision,projectId:R.target.projectId,atomicCreateConfirmedNew:Boolean(R.summary.atomicCreateConfirmedNew),projectCreated:Boolean(R.summary.projectCreated),firebaseAdded:Boolean(R.summary.firebaseAdded),emptyBaselineVerified:Boolean(R.summary.emptyBaselineVerified),report:'docs/PHASE-A-FIREBASE-DEV-NEW-EMPTY-R15B-RESULT-20260713.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R15B Firebase DEV */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11dDecision:'${M.r11d?.decision}',r14cDecision:'${M.r14c?.decision}',r15Decision:'${M.r15?.decision}',r15bDecision:'${R.decision}',r15bProjectId:'${R.target.projectId}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'R15B documenta bloqueo de permiso para crear Firebase DEV; sin import, deploy ni producción.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          console.log(JSON.stringify({fileCount:files.length,aggregateSha256,r15b:M.r15b},null,2));
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Commit refreshed lock and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r15b-source-lock-refresh.yml
          git rm -f tools/release/READY-R15B-LOCK
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app .github/workflows tools/release
          git commit -m 'chore(phase-a): refresh union lock after R15B permission report'
          git push origin HEAD:docs-tya-v6-v71-audit
