name: CXORBIA_READONLY_POST_GATES_RUNNER

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - .github/cxorbia-gate-requests/request.json
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    types:
      - synchronize
    paths:
      - .github/cxorbia-gate-requests/request.json
      - .github/workflows/cxorbia-readonly-post-gates-runner.yml
      - tools/release/cxorbia-readonly-post-gates-runner.mjs
      - tools/qa/tya-corte3-financial-reconciliation-r20-gate.mjs
      - tools/qa/tya-corte3-canonical-finance-ui-export-r23-gate.mjs

permissions:
  contents: read
  issues: write
  statuses: write

concurrency:
  group: cxorbia-readonly-post-gates-runner-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  post-gates:
    name: Run authorized CXOrbia read-only profile
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout exact live branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: docs-tya-v6-v71-audit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate controlled runner contract
        run: node tools/qa/cxorbia-controlled-runners-contract-gate.mjs

      - name: Read request state
        id: request
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = '.github/cxorbia-gate-requests/request.json';
          const x = JSON.parse(fs.readFileSync(p, 'utf8'));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `enabled=${x.enabled === true ? 'true' : 'false'}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `profile=${x.profile || ''}\n`);
          NODE

      - name: Install Playwright runtime for browser profiles
        if: >-
          steps.request.outputs.enabled == 'true' &&
          (steps.request.outputs.profile == 'V174_R20_M1_CORTE2A' ||
           steps.request.outputs.profile == 'CORTE3_CANONICAL_FINANCE_UI_EXPORT_R23')
        run: |
          npm install --no-save --ignore-scripts --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Prepare exact V174 source-safe binding for Corte 3 UI
        if: steps.request.outputs.enabled == 'true' && steps.request.outputs.profile == 'CORTE3_CANONICAL_FINANCE_UI_EXPORT_R23'
        run: |
          echo "app/adapters/tya-phase-a-source-safe-dev-adapter.js" >> .git/info/exclude
          node tools/release/tya-source-safe-binding-build-r15g.mjs \
            --html app/index-backend-dev.html \
            --app-dir app \
            --out .tmp/tya-corte3-canonical-finance-source-safe-binding-r23

      - name: Execute authorized read-only gate profile
        if: steps.request.outputs.enabled == 'true'
        id: gates
        continue-on-error: true
        run: |
          set +e
          node tools/release/cxorbia-readonly-post-gates-runner.mjs \
            .github/cxorbia-gate-requests/request.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Record disabled request safely
        if: steps.request.outputs.enabled != 'true'
        run: echo "Controlled gate request disabled; no gates executed."

      - name: Upload sanitized gate evidence
        if: always() && steps.request.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-readonly-post-gates-${{ github.run_id }}
          path: |
            .tmp/cxorbia-readonly-post-gates-runner
            .tmp/tya-project-period-kpi-history-r20
            .tmp/tya-corte2a-shopper-operation-canonical
            .tmp/tya-corte1-report-frontend-runtime
            .tmp/r20-source-safe-gates
            .tmp/phase-a-financial-r14c-live-hr
            .tmp/tya-corte3-financial-reconciliation-r20
            .tmp/tya-corte3-canonical-finance-source-safe-binding-r23
            .tmp/tya-corte3-canonical-finance-ui-export-r23
          if-no-files-found: warn
          retention-days: 14

      - name: Publish observable commit status
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const requestPath = '.github/cxorbia-gate-requests/request.json';
          const request = fs.existsSync(requestPath)
            ? JSON.parse(fs.readFileSync(requestPath, 'utf8'))
            : { enabled: false, requestId: null };
          const reportPath = '.tmp/cxorbia-readonly-post-gates-runner/report.json';
          const report = fs.existsSync(reportPath)
            ? JSON.parse(fs.readFileSync(reportPath, 'utf8'))
            : {
                status: request.enabled ? 'HOLD_REPORT_MISSING' : 'SKIPPED_DISABLED_REQUEST',
                requestId: request.requestId || null,
                requestCommitSha: process.env.GITHUB_SHA,
                targetHeadSha: request.targetHeadSha || null,
                checks: [],
                blockers: request.enabled ? ['report_missing_or_preflight_failed'] : []
              };
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const sha = report.requestCommitSha || process.env.GITHUB_SHA;
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const enabled = request.enabled === true;
          const success = enabled && report.status === 'PASS_READONLY_POST_GATES';
          const status = {
            state: enabled ? (success ? 'success' : 'failure') : 'success',
            context: 'cxorbia/readonly-post-gates/overall',
            description: enabled
              ? `${report.status}; profile=${report.profile || 'n/a'}; checks=${Array.isArray(report.checks) ? report.checks.length : 0}; blockers=${Array.isArray(report.blockers) ? report.blockers.length : 0}`.slice(0, 140)
              : 'SKIPPED_DISABLED_REQUEST',
            target_url: runUrl
          };
          fetch(`${process.env.GITHUB_API_URL}/repos/${owner}/${repo}/statuses/${sha}`, {
            method: 'POST',
            headers: {
              Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              Accept: 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(status)
          }).then(async response => {
            if (!response.ok) throw new Error(`status_failed_HTTP_${response.status}:${await response.text()}`);
          }).catch(error => { console.error(error); process.exitCode = 1; });
          NODE

      - name: Report result in PR 7
        if: always() && steps.request.outputs.enabled == 'true'
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GATES_EXIT_CODE: ${{ steps.gates.outputs.exit_code }}
        run: |
          node <<'NODE'
          const fs = require('fs');
          const reportPath = '.tmp/cxorbia-readonly-post-gates-runner/report.json';
          const report = fs.existsSync(reportPath)
            ? JSON.parse(fs.readFileSync(reportPath, 'utf8'))
            : { status: 'HOLD_REPORT_MISSING', requestId: null, targetHeadSha: null, checks: [], blockers: ['report_missing'] };
          const checkLines = Array.isArray(report.checks) && report.checks.length
            ? report.checks.map(value => `- PASS: \`${value}\``)
            : ['- none'];
          const body = [
            '## CXORBIA_READONLY_POST_GATES_RUNNER',
            '',
            `- Run: ${process.env.GITHUB_RUN_ID}`,
            `- Event: ${process.env.GITHUB_EVENT_NAME}`,
            `- Estado: \`${report.status}\``,
            `- Request: \`${report.requestId || 'n/a'}\``,
            `- Profile: \`${report.profile || 'n/a'}\``,
            `- Target HEAD: \`${report.targetHeadSha || 'n/a'}\``,
            `- Exit code: ${process.env.GATES_EXIT_CODE || 'n/a'}`,
            '',
            'Checks:',
            ...checkLines,
            '',
            'Blockers:',
            ...(report.blockers?.length ? report.blockers.map(x => `- ${x}`) : ['- none']),
            '',
            'Ejecución read-only: cero commit/push, deploy, merge, producción, importaciones o writes reales.'
          ].join('\n');
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          fetch(`${process.env.GITHUB_API_URL}/repos/${owner}/${repo}/issues/7/comments`, {
            method: 'POST',
            headers: {
              Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              Accept: 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ body })
          }).then(async response => {
            if (!response.ok) throw new Error(`comment_failed_HTTP_${response.status}:${await response.text()}`);
          }).catch(error => { console.error(error); process.exitCode = 1; });
          NODE

      - name: Enforce gate result
        if: always() && steps.request.outputs.enabled == 'true'
        run: test "${{ steps.gates.outputs.exit_code }}" = "0"
