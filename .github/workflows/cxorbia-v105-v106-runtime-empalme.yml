name: CXOrbia V110 Deterministic Runtime Empalme

on:
  workflow_dispatch:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'

permissions:
  contents: write

jobs:
  empalme-deterministico-v110:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Proteger backend y fuentes source-safe fuera del runtime candidato
        shell: bash
        run: |
          set -euo pipefail
          find app/core -maxdepth 1 -type f -name 'tya-phase-a-*' -print0 | sort -z | xargs -0 -r sha256sum > /tmp/v110-protected-before.sha256
          find app/data -maxdepth 1 -type f -name 'tya-*' -print0 | sort -z | xargs -0 -r sha256sum >> /tmp/v110-protected-before.sha256
          find backend -type f -print0 | sort -z | xargs -0 -r sha256sum > /tmp/v110-backend-before.sha256

      - name: Reconstruir baseline exacta V105 build interno V106
        shell: bash
        env:
          CXORBIA_CONFIRM: EMPALME_V105_INTERNAL_V106_EXACTO
        run: |
          set -euo pipefail
          bash tools/empalme/tya-apply-v105-internal-v106-runtime.sh

      - name: Reconstruir delta auditado V105 a V110
        shell: bash
        run: |
          set -euo pipefail
          cat tools/empalme/v110-selective/exact/runtime-exact-*.b64 | tr -d '\r\n\t ' | base64 -d > /tmp/v110-runtime.patch
          cat tools/empalme/v110-selective/parts/academia-part-*.patchpart > /tmp/v110-academia.patch
          echo 'd19e42df846d4b03f9407e856cc70e1dace6166ff3a46f17d93bda035566f0bd  /tmp/v110-runtime.patch' | sha256sum -c -
          echo '8395ca4eeb4dc5b5e459bcaf51ef538419db80535baaf319aec68688551740fd  /tmp/v110-academia.patch' | sha256sum -c -
          git apply --check /tmp/v110-runtime.patch
          git apply --check /tmp/v110-academia.patch
          git apply /tmp/v110-runtime.patch
          git apply /tmp/v110-academia.patch

      - name: Verificar identidad exacta del runtime V110
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/v110-runtime-checksums.sha256 <<'EOF'
