name: CXOrbia V110 Deterministic Runtime Empalme

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'

permissions:
  contents: write

jobs:
  empalme-deterministico-v110:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ejecutar empalme determinístico V110
        shell: bash
        run: |
          set -euo pipefail
          bash tools/empalme/run-v110-deterministic-final.sh
