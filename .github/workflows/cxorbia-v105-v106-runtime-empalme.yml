name: CXOrbia V110 Deterministic Runtime Empalme

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'

permissions:
  contents: write

jobs:
  empalme-deterministico-v110:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ejecutar empalme determinístico V110
        shell: bash
        run: |
          set +e
          python3 - <<'PY'
          from pathlib import Path
          p=Path('tools/empalme/run-v110-deterministic-final.sh')
          s=p.read_text(encoding='utf-8')
          s=s.replace('V110_LIQ_B64="tools/empalme/v110-exact/liquidacion.js.b64"','V110_LIQ_FILE="tools/empalme/v110-exact/liquidacion.js.exact"')
          s=s.replace('$V110_LIQ_B64','$V110_LIQ_FILE')
          s=s.replace('tr -d \'\\r\\n\\t \' < "$V110_LIQ_FILE" | base64 -d > app/core/liquidacion.js','cp "$V110_LIQ_FILE" app/core/liquidacion.js')
          s=s.replace("if(regs.length!==48||new Set(regs).size!==48) throw new Error(`module_graph_invalid registrations=${regs.length} unique=${new Set(regs).size}`);", "const unique=new Set(regs);const duplicates=[...unique].filter(id=>regs.filter(x=>x===id).length>1);if(unique.size!==48) throw new Error(`module_graph_invalid registrations=${regs.length} unique=${unique.size}`);console.log('moduleDuplicateExtensions',duplicates);")
          s=s.replace('git rm -f tools/empalme/v105-baseline-last-run.txt tools/empalme/v105-baseline-checksums.log tools/empalme/v105-baseline-diagnostic.txt || true','git rm -f tools/empalme/v105-baseline-last-run.txt tools/empalme/v105-baseline-checksums.log tools/empalme/v105-baseline-diagnostic.txt tools/empalme/v110-final-last-run.txt || true')
          p.write_text(s,encoding='utf-8')
          PY
          bash tools/empalme/run-v110-deterministic-final.sh > tools/empalme/v110-final-last-run.txt 2>&1
          rc=$?
          set -e
          cat tools/empalme/v110-final-last-run.txt
          if [ "$rc" -ne 0 ]; then
            git restore app CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md tools/empalme/run-v110-deterministic-final.sh 2>/dev/null || true
            rm -rf .tmp
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tools/empalme/v110-final-last-run.txt
            git commit -m "ci: persist deterministic V110 empalme failure"
            git push origin HEAD:docs-tya-v6-v71-audit
            exit "$rc"
          fi
