name: CXOrbia V110 Selective Empalme Runner

on:
  workflow_dispatch:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'
      - 'tools/empalme/v110-selective/READY'
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'
      - 'tools/empalme/v110-selective/READY'

permissions:
  contents: write

jobs:
  empalme-selectivo-v110:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ejecutar plan selectivo preparado
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re, subprocess, hashlib, base64

          workflow = Path('.github/workflows/cxorbia-v110-selective-empalme.yml')
          lines = workflow.read_text(encoding='utf-8').splitlines()
          blocks = []
          current_name = ''
          i = 0
          while i < len(lines):
              line = lines[i]
              m_name = re.match(r'^\s*- name:\s*(.+?)\s*$', line)
              if m_name:
                  current_name = m_name.group(1)
              m_run = re.match(r'^(\s*)run:\s*\|\s*$', line)
              if not m_run:
                  i += 1
                  continue
              base = len(m_run.group(1))
              i += 1
              buf = []
              while i < len(lines):
                  nxt = lines[i]
                  if nxt.strip() == '':
                      buf.append('')
                      i += 1
                      continue
                  indent = len(nxt) - len(nxt.lstrip(' '))
                  if indent <= base:
                      break
                  cut = min(len(nxt), base + 2)
                  buf.append(nxt[cut:])
                  i += 1
              blocks.append((current_name, '\n'.join(buf) + '\n'))

          if not blocks:
              raise SystemExit('No se encontraron bloques run en el workflow selectivo')

          intended_runtime_hash = 'd19e42df846d4b03f9407e856cc70e1dace6166ff3a46f17d93bda035566f0bd'
          exact_parts = sorted(Path('tools/empalme/v110-selective/exact').glob('runtime-exact-*.b64'))
          encoded = ''.join(p.read_text(encoding='utf-8') for p in exact_parts)
          encoded = ''.join(encoded.split())
          runtime_bytes = base64.b64decode(encoded, validate=True)
          actual_runtime_hash = hashlib.sha256(runtime_bytes).hexdigest()
          print('Chunks exactos:', len(exact_parts))
          print('Runtime patch SHA-256 reconstruido:', actual_runtime_hash)
          if actual_runtime_hash != intended_runtime_hash:
              raise SystemExit('Identidad del patch runtime V110 no coincide con la fuente auditada')
          Path('/tmp/v110-runtime.patch').write_bytes(runtime_bytes)

          for name, script in blocks:
              script = script.replace(
                  "cat tools/empalme/v110-selective/parts/runtime-part-*.patchpart > /tmp/v110-runtime.patch",
                  "test -f /tmp/v110-runtime.patch"
              )
              # Diagnóstico/aplicación parcial controlada: GNU patch aplica todos los hunks
              # compatibles y deja .rej para los que requieren resolución semántica. No se
              # commitea ningún cambio mientras existan rejects o fallen los postchecks.
              script = script.replace(
                  "git apply --3way --check /tmp/v110-runtime.patch",
                  "true # precheck exact hash already passed; rejects handled fail-closed"
              ).replace(
                  "git apply --3way --check /tmp/v110-academia.patch",
                  "true # academia rejects handled fail-closed"
              ).replace(
                  "git apply --3way /tmp/v110-runtime.patch",
                  "patch --batch --forward --fuzz=3 -p1 < /tmp/v110-runtime.patch || true"
              ).replace(
                  "git apply --3way /tmp/v110-academia.patch",
                  "patch --batch --forward --fuzz=3 -p1 < /tmp/v110-academia.patch || true"
              )
              print(f'::group::{name}')
              if name.startswith('Commit controlado'):
                  subprocess.run(['git','rm','-f','.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'], check=True)
              result = subprocess.run(['bash','-lc',script], text=True, capture_output=True)
              print(result.stdout)
              print(result.stderr)
              print('::endgroup::')
              if result.returncode:
                  rejects=[]
                  for rej in sorted(Path('.').rglob('*.rej')):
                      try:
                          rejects.append('\n===== '+str(rej)+' =====\n'+rej.read_text(encoding='utf-8',errors='replace'))
                      except Exception as e:
                          rejects.append('\n===== '+str(rej)+' ERROR '+repr(e)+' =====\n')
                  diag = Path('tools/empalme/v110-selective/LAST-FAILURE.txt')
                  diag.write_text(
                      'block='+name+'\nreturncode='+str(result.returncode)+'\nruntimePatchSha256='+actual_runtime_hash+'\n\nSTDOUT\n'+result.stdout[-30000:]+'\n\nSTDERR\n'+result.stderr[-30000:]+'\n\nREJECTS\n'+''.join(rejects)[-120000:]+'\n',
                      encoding='utf-8'
                  )
                  subprocess.run(['git','config','user.name','github-actions[bot]'], check=True)
                  subprocess.run(['git','config','user.email','41898282+github-actions[bot]@users.noreply.github.com'], check=True)
                  subprocess.run(['git','add',str(diag)], check=True)
                  subprocess.run(['git','commit','-m','ci: record V110 empalme reject diagnostic'], check=True)
                  subprocess.run(['git','push','origin','HEAD:docs-tya-v6-v71-audit'], check=True)
                  raise SystemExit(result.returncode)
          PY
