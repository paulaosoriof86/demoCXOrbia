name: CXOrbia V105 Baseline Persisted Diagnostic

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'

permissions:
  contents: write

jobs:
  diagnose-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Ejecutar reconstrucción y capturar salida
        id: baseline
        shell: bash
        env:
          CXORBIA_CONFIRM: EMPALME_V105_INTERNAL_V106_EXACTO
        run: |
          set +e
          mkdir -p tools/empalme
          bash tools/empalme/tya-apply-v105-internal-v106-runtime.sh > tools/empalme/v105-baseline-last-run.txt 2>&1
          rc=$?
          {
            echo
            echo "exitCode=$rc"
            echo "head=$(git rev-parse HEAD)"
            echo "branch=${GITHUB_REF_NAME:-$(git branch --show-current)}"
            echo "checksumFileSha=$(sha256sum tools/empalme/v105-v106-runtime-checksums.sha256 | awk '{print $1}')"
          } >> tools/empalme/v105-baseline-last-run.txt
          cat tools/empalme/v105-baseline-last-run.txt
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persistir diagnóstico
        shell: bash
        run: |
          set -euo pipefail
          git restore app || true
          rm -rf .tmp
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/empalme/v105-baseline-last-run.txt
          git commit -m "ci: persist V105 baseline reconstruction diagnostic"
          git push origin HEAD:docs-tya-v6-v71-audit

      - name: Fallar si la baseline no pasó
        if: steps.baseline.outputs.rc != '0'
        run: exit 1
