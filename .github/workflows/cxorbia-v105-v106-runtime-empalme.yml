name: CXOrbia V110 Selective Empalme Runner

on:
  workflow_dispatch:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'
      - 'tools/empalme/v110-selective/**'
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'
      - 'tools/empalme/v110-selective/**'

permissions:
  contents: write

jobs:
  empalme-selectivo-v110:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ejecutar empalme selectivo V110
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/empalme/v110-selective/run-empalme.py
