name: CXOrbia V110 Deterministic Runtime Empalme

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-v106-runtime-empalme.yml'

permissions:
  contents: write

jobs:
  empalme-deterministico-v110:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Ejecutar empalme determinístico V110
        shell: bash
        run: |
          set +e
          bash tools/empalme/run-v110-deterministic-final.sh > tools/empalme/v110-final-last-run.txt 2>&1
          rc=$?
          set -e
          cat tools/empalme/v110-final-last-run.txt
          if [ "$rc" -ne 0 ]; then
            git restore app CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md 2>/dev/null || true
            rm -rf .tmp
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tools/empalme/v110-final-last-run.txt
            git commit -m "ci: persist deterministic V110 empalme failure"
            git push origin HEAD:docs-tya-v6-v71-audit
            exit "$rc"
          fi
