      - name: Validar estructura, sintaxis, UTF-8 y P0 V110
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do node --check "$f"; done < <(find app -type f \( -name '*.js' -o -name '*.mjs' \) -print0)
          python3 - <<'PY'
          from pathlib import Path
          bad=('Ã','Â','â€','ï»¿','�')
          for p in Path('app').rglob('*'):
              if not p.is_file() or p.suffix.lower() not in {'.js','.mjs','.html','.css','.json','.md','.webmanifest'}:
                  continue
              raw=p.read_bytes()
              if raw.startswith(b'\xef\xbb\xbf'):
                  raise SystemExit(f'utf8_bom:{p}')
              text=raw.decode('utf-8')
              for token in bad:
                  if token in text:
                      raise SystemExit(f'mojibake:{token}:{p}')
          print('utf8_no_bom_no_mojibake:PASS')
          PY
          grep -Fq "const reviewRequired=[]" app/core/data.js
          grep -Fq "const visitasValidas=[]" app/core/data.js
          grep -Fq "v.loteId=lote" app/core/data.js
          grep -Fq "reviewRequired" app/modules/finanzas.js
          grep -Fq "loteIdCombos" app/modules/finanzas.js
          grep -Fq "if(rol==='shopper')" app/modules/academia.js
          grep -Fq "CX.data.getShopper" app/modules/academia.js
          grep -Fq "paises=[]" app/modules/academia.js
          grep -Fq "visibleCourses" app/modules/academia.js
          grep -Fq "createdByUserId" app/modules/academia.js
          grep -Fq "Number.isFinite" app/core/cliente-data.js
          grep -Fq ".between{flex-wrap:wrap" app/styles/layout.css
          ! grep -RInE '^(<<<<<<<|=======|>>>>>>>)' app/core app/modules app/styles
          node <<'NODE'
          const fs=require('fs'),path=require('path');
          const html=fs.readFileSync('app/index.html','utf8');
          const scripts=[...html.matchAll(/<script[^>]+src="([^"]+)"/g)].map(m=>m[1]);
          const local=scripts.filter(s=>!/^https?:\/\//i.test(s));
          const missing=local.filter(s=>!fs.existsSync(path.join('app',s)));
          const dup=local.filter((s,i)=>local.indexOf(s)!==i);
          if(scripts.length!==66||local.length!==64||new Set(local).size!==64||missing.length||dup.length) throw new Error(`script_graph_invalid total=${scripts.length} local=${local.length} unique=${new Set(local).size} missing=${missing} dup=${dup}`);
          const regs=[];for(const f of fs.readdirSync('app/modules').filter(f=>f.endsWith('.js'))){const t=fs.readFileSync(path.join('app/modules',f),'utf8');for(const m of t.matchAll(/CX\.module\(\s*['"]([^'"]+)/g))regs.push(m[1]);}
          if(regs.length!==48||new Set(regs).size!==48) throw new Error(`module_graph_invalid registrations=${regs.length} unique=${new Set(regs).size}`);
          console.log(JSON.stringify({scriptsTotal:scripts.length,scriptsLocal:local.length,moduleRegistrations:regs.length},null,2));
          NODE

      - name: Verificar preservación del backend protegido
        shell: bash
        run: |
          set -euo pipefail
          sha256sum -c /tmp/v110-protected-before.sha256
          sha256sum -c /tmp/v110-backend-before.sha256

      - name: Documentar empalme exacto V110
        shell: bash
        run: |
          set -euo pipefail
          cat > app/docs/CAMBIOS-BACKEND-ADDENDUM-EMPALME-DETERMINISTICO-V110-20260712.md <<'EOF'
          # CAMBIOS BACKEND — EMPALME DETERMINÍSTICO V110

          Fecha: 2026-07-12

          ## Resultado

          Se reconstruyó primero la baseline exacta `Prototype development request CXOrbia V105(1).zip` / build interno V106 desde el commit base y su delta SHA-verificado. Sobre esa identidad exacta se aplicó el delta auditado V105→V110, sin reconciliación difusa ni resolución heurística.

          La identidad final de 70 archivos runtime se verificó contra checksums calculados directamente del ZIP V110 auditado. Los dos P0 quedan físicamente incorporados: Academia fail-closed por país real del shopper y Finanzas fail-closed antes de procesar pagos/lotes.

          Se preservaron los archivos backend/source-safe externos al runtime candidato: `app/core/tya-phase-a-*`, `app/data/tya-*`, `backend/`, contratos, importadores, HR, reviewQueue, auditEvents, R5/R6/R8/R9 y gates.

          ## Estado seguro

          Sin merge del PR, deploy, producción, importación real, Firestore/HR writes, Make/Gemini live ni pagos reales.
          EOF
          sed -i 's/^          //' app/docs/CAMBIOS-BACKEND-ADDENDUM-EMPALME-DETERMINISTICO-V110-20260712.md

          cat > app/docs/ACADEMIA-IMPACT-EMPALME-DETERMINISTICO-V110-20260712.md <<'EOF'
          # ACADEMIA — IMPACTO EMPALME DETERMINÍSTICO V110

          - El país del shopper se resuelve desde `CX.data.getShopper(shopperId).pais`.
          - Si no existe país real resoluble, el contenido restringido falla cerrado; el contenido global continúa visible.
          - KPIs, rutas, cursos, lecciones y certificados consumen la misma colección visible.
          - Módulo/nivel/paquete son filtros de clasificación, no ejes de autorización.
          - Creador, revisor y aprobador usan IDs estables o muestran pendiente honesto de Auth.
          - R10 debe comprobar Admin/Shopper, GT/HN, KPIs y ausencia de fuga entre países.
          EOF
          sed -i 's/^          //' app/docs/ACADEMIA-IMPACT-EMPALME-DETERMINISTICO-V110-20260712.md

          cat > app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-EMPALME-DETERMINISTICO-V110-20260712.md <<'EOF'
          # TRACKER PHASE A — EMPALME DETERMINÍSTICO V110

          - Auditoría V110: READY.
          - P0 Claude V109→V110: CLOSED.
          - Empalme físico V110: COMPLETED_VERIFIED.
          - Identidad runtime: 70/70 checksums PASS.
          - Backend/source-safe protegido: PASS.
          - Source lock unión repo+V110: generado en este bloque.
          - R10 source-safe: siguiente bloque exacto.
          - Firebase DEV read-only: pendiente autorización específica.
          - Pagos/certificaciones: pendientes fuentes sanitizadas.
          - Producción: HOLD.
          EOF
          sed -i 's/^          //' app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-EMPALME-DETERMINISTICO-V110-20260712.md

          cat >> CAMBIOS-BACKEND.md <<'EOF'

          ## Empalme determinístico V110 — 2026-07-12

          - Baseline V105/build interno V106 reconstruida desde identidad SHA-verificada; delta V105→V110 aplicado sin heurísticas.
          - Runtime final V110 verificado 70/70 por checksum.
          - Backend, source-safe, HR, importadores, R5/R6/R8/R9 y gates preservados.
          - Sin deploy, producción, imports, writes, providers ni pagos reales.
          EOF
          cat >> RESUMEN-PARA-CLAUDE.md <<'EOF'

          ## Cierre V110 empalmada — 2026-07-12

          - Los dos P0 de Academia por país y Finanzas fail-closed quedaron cerrados, verificados y empalmados físicamente.
          - No se genera otro paquete Claude.
          - No reabrir finite scores, bandas unificadas, lotes multipaís/multimoneda, IDs determinísticos, responsive, Beneficios, certificaciones, cache demo/real ni shell.
          - P1/P2 restantes quedan acumulados para un futuro paquete y no bloquean R10.
          EOF
          cat >> PENDIENTES-PROTOTIPO.md <<'EOF'

          ## Pendientes no bloqueantes post-V110 — 2026-07-12

          - Normalizar espacios en país/moneda antes del backend real de pagos.
          - Deduplicar IDs dentro de una llamada directa a `payVisits()`.
          - Endurecer idempotencia ante llamadas repetidas.
          - Ajustar copy cuando cero visitas fueron procesadas.
          - Normalizar retorno futuro a `processed/reviewRequired`.
          EOF
          sed -i 's/^          //' CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md

      - name: Generar y verificar source lock unión V110
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');const path=require('path');const crypto=require('crypto');
          const root=path.resolve('app');
          const manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json';
          const verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]);
          const rels=[];function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          const manifest={package:'CXORBIA-V110-UNION-EMPALME-R1',project:'CXOrbia',baseline:'V110 exacta empalmada sobre rama viva con backend/source-safe preservados',generatedAt:new Date().toISOString(),sourceZipSha256:'1f9e30f711899af500683e7292eb8652e9e0bc4b888cd1252a5482795dbba227',basePackageSha256:'582a8c98cdac7b46028bb720d1304657c6d678e99e4bc23a49e80ab440bc8206',runtimePatchSha256:'d19e42df846d4b03f9407e856cc70e1dace6166ff3a46f17d93bda035566f0bd',academiaPatchSha256:'8395ca4eeb4dc5b5e459bcaf51ef538419db80535baaf319aec68688551740fd',runtimeIdentityFiles:70,fileCount:files.length,aggregateSha256,exclusionsDeclared:[{path:'core/build-lock.js',reason:'referencia circular'},{path:manifestRel,reason:'manifest se excluye a sí mismo'},{path:verifierRel,reason:'verificador generado junto al manifest'}],files};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(manifest,null,2)+'\n','utf8');
          const lock=`/* CXOrbia · Source lock unión V110 empalme R1\n   Fuente auditada: Prototype development request CXOrbia V110.zip\n   Manifiesto: ${manifestRel}\n   No implica deploy, producción, importación ni providers activos. */\nvar CX_SOURCE_LOCK={\n  manifestFile:'${manifestRel}',\n  aggregateSha256:'${aggregateSha256}',\n  fileCount:${files.length},\n  runtimeIdentityFiles:70,\n  generatedAt:'${manifest.generatedAt.slice(0,10)}',\n  sourceZipSha256:'${manifest.sourceZipSha256}',\n  note:'Baseline auditada de continuidad V110 empalmada de forma determinística; backend y source-safe preservados.'\n};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`;
          fs.writeFileSync(path.join(root,'core','build-lock.js'),lock,'utf8');
          const verifier=`#!/usr/bin/env node\nimport {readFile} from 'node:fs/promises';\nimport {createHash} from 'node:crypto';\nimport path from 'node:path';\nconst ROOT=process.cwd();const M=JSON.parse(await readFile(path.join(ROOT,'${manifestRel}'),'utf8'));const sha=b=>createHash('sha256').update(b).digest('hex');let diffs=0;const entries=[];for(const f of M.files){let b;try{b=await readFile(path.join(ROOT,f.path));}catch(e){console.error('DIFERENCIA faltante',f.path);diffs++;continue;}const h=sha(b);if(h!==f.sha256||b.length!==f.size){console.error('DIFERENCIA',f.path);diffs++;}entries.push(f.path+':'+h);}const agg=sha(Buffer.from(entries.join('\\n'),'utf8'));if(agg!==M.aggregateSha256){console.error('DIFERENCIA aggregate',agg);diffs++;}console.log('Archivos verificados:',M.files.length);console.log('Aggregate recalculado:',agg);console.log(diffs?'Diferencias: '+diffs:'0 diferencias');process.exit(diffs?1:0);\n`;
          fs.writeFileSync(path.join(root,verifierRel),verifier,'utf8');
          console.log(JSON.stringify({fileCount:files.length,aggregateSha256},null,2));
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

