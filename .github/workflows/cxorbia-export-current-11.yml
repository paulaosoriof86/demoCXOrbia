name: CXOrbia Export Current 11 Runtime Files

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/empalme/export-current-11/READY

permissions:
  contents: write

jobs:
  export-current-runtime:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Empaquetar runtime actual y archivos conflictivos
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/current-11 tools/empalme/export-current-11/output
          mkdir -p .tmp/current-11 tools/empalme/export-current-11/output/problem
          while IFS= read -r f; do
            mkdir -p ".tmp/current-11/$(dirname "$f")"
            cp "$f" ".tmp/current-11/$f"
          done <<'EOF'
          app/core/cliente-data.js
          app/core/data.js
          app/core/liquidacion.js
          app/modules/academia.js
          app/modules/beneficios.js
          app/modules/cert.js
          app/modules/cliente-extra.js
          app/modules/cliente.js
          app/modules/dashboard.js
          app/modules/finanzas.js
          app/styles/layout.css
          EOF
          tar -czf .tmp/cxorbia-current-11.tar.gz -C .tmp/current-11 .
          sha256sum .tmp/cxorbia-current-11.tar.gz | tee tools/empalme/export-current-11/output/archive.sha256
          base64 -w0 .tmp/cxorbia-current-11.tar.gz > .tmp/cxorbia-current-11.b64
          split -b 20000 -d -a 2 .tmp/cxorbia-current-11.b64 tools/empalme/export-current-11/output/chunk-

          for spec in \
            'cliente-data:app/core/cliente-data.js' \
            'academia:app/modules/academia.js' \
            'cliente:app/modules/cliente.js' \
            'finanzas:app/modules/finanzas.js'; do
            name="${spec%%:*}"
            file="${spec#*:}"
            gzip -c "$file" | base64 -w76 > "tools/empalme/export-current-11/output/problem/${name}.js.gz.b64"
            sha256sum "$file" > "tools/empalme/export-current-11/output/problem/${name}.sha256"
          done

          {
            echo 'source=branch:docs-tya-v6-v71-audit'
            echo 'files=11'
            echo "chunks=$(find tools/empalme/export-current-11/output -maxdepth 1 -name 'chunk-*' | wc -l)"
            echo "head=$(git rev-parse HEAD)"
            echo 'chunkBytes=20000'
            echo 'problemFiles=4'
            echo 'problemEncoding=gzip+base64-wrap76'
            echo 'noDeploy=true'
            echo 'noProduction=true'
          } > tools/empalme/export-current-11/output/MANIFEST.txt

      - name: Commit export temporal verificable
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/empalme/export-current-11/output
          git commit -m "ci: export current runtime conflict files for V110 reconciliation"
          git push origin HEAD:docs-tya-v6-v71-audit
