name: CXOrbia Phase A Remote Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL HTTPS del preview/staging a validar'
        required: false
        default: 'https://cxorbia-backend-dev.web.app/index.html?cxTyaPhaseA=1&r17=visible'
        type: string
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-phase-a-remote-smoke.yml'
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - '.github/workflows/cxorbia-phase-a-remote-smoke.yml'

permissions:
  contents: read

concurrency:
  group: cxorbia-phase-a-remote-smoke-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CXORBIA_DEFAULT_REMOTE_URL: https://cxorbia-backend-dev.web.app/index.html?cxTyaPhaseA=1&r17=visible
  CXORBIA_PROOF_URL: https://cxorbia-backend-dev.web.app/cxorbia-dev-build-proof.json
  CXORBIA_EXPECT_DEPLOY_COMMIT: cf4c845722e2bbe2b401b2b332ff9f4d2f6cb803
  CXORBIA_EXPECT_BUILD: tya-visible-r17-source-safe

jobs:
  remote-smoke:
    name: Visible TyA R17 remote smoke post-Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve and validate remote URL
        run: |
          set -euo pipefail
          URL='${{ inputs.base_url }}'
          if [ -z "$URL" ]; then URL="$CXORBIA_DEFAULT_REMOTE_URL"; fi
          if [[ ! "$URL" =~ ^https:// ]]; then
            echo 'base_url must start with https://'
            exit 1
          fi
          if [[ "$URL" =~ localhost|127\.0\.0\.1 ]]; then
            echo 'base_url must be remote, not localhost'
            exit 1
          fi
          echo "CXORBIA_SMOKE_BASE_URL=$URL" >> "$GITHUB_ENV"

      - name: Wait for exact deployed R17 proof
        run: |
          set -euo pipefail
          mkdir -p .tmp/phase-a-remote-smoke
          for attempt in $(seq 1 60); do
            if curl -fsSL --max-time 15 "$CXORBIA_PROOF_URL?attempt=$attempt" > .tmp/phase-a-remote-smoke/build-proof.json; then
              if node <<'NODE'
          const fs = require('fs');
          let proof;
          try { proof = JSON.parse(fs.readFileSync('.tmp/phase-a-remote-smoke/build-proof.json','utf8')); }
          catch { process.exit(1); }
          const expectedCommit = process.env.CXORBIA_EXPECT_DEPLOY_COMMIT;
          const expectedBuild = process.env.CXORBIA_EXPECT_BUILD;
          const safe = proof.environment === 'dev' &&
            proof.build === expectedBuild &&
            proof.commit === expectedCommit &&
            proof.tenantId === 'tya' && proof.projectId === 'cinepolis' &&
            proof.visibleDataGate === true &&
            proof.expectedPeriods === 14 && proof.expectedVisits === 616 &&
            proof.expectedShoppers === 210 && proof.expectedCriticalRoutes === 13 &&
            proof.hostingOnly === true && proof.firestoreWrites === false &&
            proof.authWrites === false && proof.storageWrites === false &&
            proof.imports === false && proof.rules === false && proof.functions === false &&
            proof.make === false && proof.gemini === false && proof.payments === false &&
            proof.production === false;
          process.exit(safe ? 0 : 1);
          NODE
              then
                echo 'Exact visible TyA R17 deployed proof verified.'
                exit 0
              fi
            fi
            echo "Waiting for exact R17 proof ($attempt/60)..."
            sleep 5
          done
          echo 'Exact visible TyA R17 proof was not available within the verification window.'
          cat .tmp/phase-a-remote-smoke/build-proof.json 2>/dev/null || true
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          set -euo pipefail
          npm install --no-save --ignore-scripts playwright@1.47.2
          npx playwright install --with-deps chromium

      - name: Run authoritative visible TyA and 13-route remote smoke
        env:
          CXORBIA_BASE_URL: ${{ env.CXORBIA_SMOKE_BASE_URL }}
        run: |
          set -euo pipefail
          node tools/qa/tya-phase-a-visible-data-smoke-r17.mjs \
            --out .tmp/phase-a-remote-smoke/visible-r17
          printf 'status=success\nurl=%s\nproof_commit=%s\nbuild=%s\nvisible_smoke=pass\ncritical_routes=13/13\n' \
            "$CXORBIA_SMOKE_BASE_URL" "$CXORBIA_EXPECT_DEPLOY_COMMIT" "$CXORBIA_EXPECT_BUILD" \
            > .tmp/phase-a-remote-smoke/remote-status.txt

      - name: Upload remote smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-a-remote-visible-tya-r17-smoke-report
          path: .tmp/phase-a-remote-smoke
          if-no-files-found: error
          retention-days: 14
