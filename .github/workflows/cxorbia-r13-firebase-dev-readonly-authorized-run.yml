name: CXOrbia Phase A R13 Firebase DEV Authorized Read-Only

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/release/r13-firebase-readonly-authorized/READY

permissions:
  contents: write

jobs:
  firebase-dev-authorized-readonly:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout authorized branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verify authorization, V110 lock and static gate
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const a=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-readonly-authorization-r13.source-safe.json','utf8'));
          if(a.status!=='explicitly_authorized') throw new Error('authorization status mismatch');
          if(a.scope!=='sanitized_read_only_firebase_dev') throw new Error('authorization scope mismatch');
          if(a.exactConfirmation!=='VERIFY_FIREBASE_DEV_READ_ONLY') throw new Error('authorization confirmation mismatch');
          for(const key of ['writes','imports','deploy','production']) if(a.prohibited[key]!==true) throw new Error('missing prohibition '+key);
          if(a.targetProjectId!=='cxorbia-backend-dev') throw new Error('target project mismatch');
          console.log(JSON.stringify({authorization:a.status,scope:a.scope,target:a.targetProjectId,prohibited:a.prohibited},null,2));
          NODE
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)
          rm -rf .tmp/r13-static-gate
          node tools/release/tya-firebase-dev-clean-state-read-only-gate-validate.mjs --out .tmp/r13-static-gate
          node - <<'NODE'
          const r=require('./.tmp/r13-static-gate/firebase-dev-clean-state-read-only-static-gate-report.json');
          if(r.verdict!=='GO_SAFE_FIREBASE_DEV_READ_ONLY_GATE_PREPARED_NOT_EXECUTED'||r.hardFailCount!==0) throw new Error('static gate not ready');
          NODE

      - name: Prepare temporary DEV credential or sanitized blocker
        id: credential
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
        run: |
          set -euo pipefail
          private_dir='.tmp/r13-firebase-dev-readonly-private'
          report_dir='.tmp/r13-firebase-dev-readonly-report'
          mkdir -p "$private_dir" "$report_dir"
          credential_path="$private_dir/credentials.json"
          if [ -z "${FIREBASE_SERVICE_ACCOUNT_JSON:-}" ]; then
            node <<'NODE'
          const fs=require('fs');
          const report={gate:'cxorbia-firebase-dev-clean-state-read-only',generatedAt:new Date().toISOString(),decision:'BLOCKED_MISSING_DEV_CREDENTIAL_SECRET',target:{expectedProjectId:'cxorbia-backend-dev'},summary:{cleanStateConfirmed:false,providerReadAttempted:false},safeState:{providerCallsExecuted:false,credentialsUsed:false,authReads:false,authWrites:false,claimsWrites:false,firestoreReads:false,firestoreWrites:false,storageReads:false,storageWrites:false,functionReads:false,functionWritesOrInvocations:false,rulesReads:false,rulesDeploy:false,hostingDeploy:false,imports:false,production:false,piiOutput:false,credentialsOutput:false}};
          fs.writeFileSync('.tmp/r13-firebase-dev-readonly-report/firebase-dev-clean-state-read-only-report.json',JSON.stringify(report,null,2)+'\n','utf8');
          fs.writeFileSync('.tmp/r13-firebase-dev-readonly-report/firebase-dev-clean-state-read-only-report.md','# CXOrbia Firebase DEV read-only report\n\nDecision: `BLOCKED_MISSING_DEV_CREDENTIAL_SECRET`\n\nNo provider calls or credentials were used.\n','utf8');
          NODE
            echo 'available=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$credential_path"
          chmod 600 "$credential_path"
          node <<'NODE'
          const fs=require('fs');
          const p='.tmp/r13-firebase-dev-readonly-private/credentials.json';
          const c=JSON.parse(fs.readFileSync(p,'utf8'));
          if(c.type!=='service_account') throw new Error('credential type mismatch');
          if(c.project_id!=='cxorbia-backend-dev') throw new Error('credential project mismatch');
          if(!String(c.client_email||'').endsWith('@cxorbia-backend-dev.iam.gserviceaccount.com')) throw new Error('credential account domain mismatch');
          console.log('DEV credential target checks passed without outputting identifiers.');
          NODE
          echo 'available=true' >> "$GITHUB_OUTPUT"

      - name: Install verifier dependencies
        if: steps.credential.outputs.available == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --ignore-scripts --silent firebase-admin@13 google-auth-library@9

      - name: Execute sanitized provider reads
        id: provider
        if: steps.credential.outputs.available == 'true'
        shell: bash
        env:
          CXORBIA_CONFIRM: VERIFY_FIREBASE_DEV_READ_ONLY
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.tmp/r13-firebase-dev-readonly-private/credentials.json
        run: |
          set +e
          node tools/release/tya-firebase-dev-clean-state-read-only.mjs \
            --config backend/config/phase-a-firebase-dev-clean-state-read-only.source-safe.json \
            --out .tmp/r13-firebase-dev-readonly-report \
            > .tmp/r13-provider-sanitized.log 2>&1
          rc=$?
          set -e
          test -s .tmp/r13-firebase-dev-readonly-report/firebase-dev-clean-state-read-only-report.json
          cat .tmp/r13-firebase-dev-readonly-report/firebase-dev-clean-state-read-only-report.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Cleanup temporary credential and dependencies
        if: always()
        shell: bash
        run: |
          rm -f .tmp/r13-firebase-dev-readonly-private/credentials.json
          rmdir .tmp/r13-firebase-dev-readonly-private 2>/dev/null || true
          rm -rf node_modules package.json package-lock.json

      - name: Validate sanitized report invariants
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const p='.tmp/r13-firebase-dev-readonly-report/firebase-dev-clean-state-read-only-report.json';
          const r=JSON.parse(fs.readFileSync(p,'utf8'));
          const allowed=['CLEAN_STATE_VERIFIED_READ_ONLY','NONEMPTY_REVIEW_REQUIRED','INCONCLUSIVE_PERMISSION_OR_API','TARGET_MISMATCH_HARD_STOP','BLOCKED_MISSING_DEV_CREDENTIAL_SECRET'];
          if(!allowed.includes(r.decision)) throw new Error('unexpected provider decision');
          const s=r.safeState||{};
          for(const key of ['authWrites','claimsWrites','firestoreWrites','storageWrites','functionWritesOrInvocations','rulesDeploy','hostingDeploy','imports','production']) if(s[key]!==false) throw new Error('unsafe state '+key);
          const raw=JSON.stringify(r).toLowerCase();
          for(const token of ['private_key','client_email','refresh_token','access_token','id_token']) if(raw.includes(token)) throw new Error('credential token in report: '+token);
          console.log(JSON.stringify({decision:r.decision,summary:r.summary||{},safeState:r.safeState},null,2));
          NODE

      - name: Persist sanitized result and documentation
        shell: bash
        run: |
          set -euo pipefail
          cp .tmp/r13-firebase-dev-readonly-report/firebase-dev-clean-state-read-only-report.json backend/config/phase-a-firebase-dev-clean-state-read-only-result-r13.source-safe.json
          cp .tmp/r13-firebase-dev-readonly-report/firebase-dev-clean-state-read-only-report.md app/docs/PHASE-A-FIREBASE-DEV-CLEAN-STATE-READONLY-R13-PROVIDER-REPORT-20260712.md
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-clean-state-read-only-result-r13.source-safe.json','utf8'));
          const A=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-readonly-authorization-r13.source-safe.json','utf8'));
          const providerExecuted=R.safeState?.providerCallsExecuted===true;
          const clean=R.decision==='CLEAN_STATE_VERIFIED_READ_ONLY';
          const checks=R.checks||{};
          const line=(id)=>checks[id]?`- ${id}: ${JSON.stringify(checks[id])}`:`- ${id}: not available`;
          fs.writeFileSync('app/docs/PHASE-A-FIREBASE-DEV-READONLY-AUTHORIZED-R13-RESULT-20260712.md',`# PHASE A — R13 FIREBASE DEV READ-ONLY AUTORIZADO\n\nFecha: 2026-07-12\n\n## Autorización\n\n- estado: \`${A.status}\`;\n- alcance: \`${A.scope}\`;\n- proyecto objetivo: \`${A.targetProjectId}\`;\n- confirmación: \`${A.exactConfirmation}\`;\n- writes/imports/deploy/producción: prohibidos.\n\n## Decisión del proveedor\n\n\`${R.decision}\`\n\n## Ejecución\n\n- provider calls executed: ${providerExecuted};\n- clean state confirmed: ${Boolean(R.summary?.cleanStateConfirmed)};\n- credenciales persistidas: false;\n- PII en reporte: false.\n\n## Checks sanitizados\n\n${['authUsers','authConfiguration','firestoreRootCollections','firestoreDatabases','storageObjects','cloudFunctions','rulesReleases'].map(line).join('\n')}\n\n## Estado seguro\n\n- Auth writes: false;\n- claims writes: false;\n- Firestore writes: false;\n- Storage writes: false;\n- Functions writes/invocations: false;\n- Rules deploy: false;\n- Hosting deploy: false;\n- imports: false;\n- production: false.\n\n## Interpretación\n\n${clean?'Firebase DEV quedó comprobado como limpio mediante lecturas sanitizadas. Esto no activa backend, Auth, Firestore, Storage, Functions, Hosting ni producción.':'El resultado no permite declarar el entorno limpio. No se borra ni modifica nada; el gate permanece en revisión o inconcluso según la decisión.'}\n`,'utf8');
          fs.writeFileSync('app/docs/CAMBIOS-BACKEND-ADDENDUM-FIREBASE-DEV-READONLY-R13-20260712.md',`# CAMBIOS BACKEND — R13 FIREBASE DEV READ-ONLY\n\n- Autorización explícita registrada y limitada a lectura sanitizada.\n- Decisión: \`${R.decision}\`.\n- Provider calls: ${providerExecuted}.\n- Writes/imports/deploy/production: 0.\n- Credencial temporal eliminada; no se persistió ni subió como artefacto.\n`,'utf8');
          fs.writeFileSync('app/docs/ACADEMIA-IMPACT-FIREBASE-DEV-READONLY-R13-20260712.md',`# ACADEMIA — IMPACTO R13\n\n- Diferenciar lectura sanitizada verificada de una integración backend activa.\n- Decisión Firebase DEV: \`${R.decision}\`.\n- No corresponde cambio de cursos ni paquete Claude inmediato.\n`,'utf8');
          fs.writeFileSync('app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R13-FIREBASE-READONLY-20260712.md',`# TRACKER PHASE A — R13 FIREBASE DEV READ-ONLY\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11D shopper gap: REVIEW_QUEUE_SOURCE_LEVEL_ITEM_CREATED.\n- R12 readiness: READY_FOR_EXPLICIT_AUTHORIZATION_NOT_EXECUTED.\n- R13 provider decision: ${R.decision}.\n- Provider calls: ${providerExecuted}.\n- Writes/imports/deploy/production: 0.\n- Backend activation: HOLD.\n- Production: HOLD.\n\nSiguiente bloque exacto: ${clean?'preparar el adapter CX.data→Firebase DEV y el plan de materialización source-safe sin ejecutar writes; mantener shopper gap y certification carryover en reviewQueue':'resolver el blocker/inconclusión del reporte sin borrar ni modificar recursos; no activar adapter ni materialización'}.\n`,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R13 Firebase DEV read-only autorizado — 2026-07-12\n\n- Decisión: \`${R.decision}\`.\n- Provider calls: ${providerExecuted}; clean confirmed: ${Boolean(R.summary?.cleanStateConfirmed)}.\n- Cero writes, imports, deploy y producción; credencial temporal eliminada.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R13 Firebase DEV read-only — 2026-07-12\n\n- Decisión backend: \`${R.decision}\`.\n- No implica backend conectado ni producción; no corresponde paquete Claude inmediato.\n`,'utf8');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r13={decision:R.decision,providerCallsExecuted:providerExecuted,cleanStateConfirmed:Boolean(R.summary?.cleanStateConfirmed),report:'docs/PHASE-A-FIREBASE-DEV-READONLY-AUTHORIZED-R13-RESULT-20260712.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R13 Firebase read-only */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11dDecision:'${M.r11d?.decision}',r13Decision:'${R.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; Firebase DEV read-only documentado; backend writes siguen apagados.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Upload sanitized report only
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-firebase-dev-readonly-r13-sanitized
          path: .tmp/r13-firebase-dev-readonly-report
          if-no-files-found: error
          retention-days: 14

      - name: Commit result and remove one-time trigger
        shell: bash
        run: |
          set -euo pipefail
          rm -f .tmp/r13-provider-sanitized.log
          git rm -f .github/workflows/cxorbia-r13-firebase-dev-readonly-authorized-run.yml
          git rm -rf tools/release/r13-firebase-readonly-authorized
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend/config CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md .github/workflows tools/release
          git commit -m "test(phase-a): record authorized Firebase DEV read-only result R13"
          git push origin HEAD:docs-tya-v6-v71-audit
