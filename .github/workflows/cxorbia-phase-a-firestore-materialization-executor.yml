name: CXOrbia Phase A Firestore Materialization Executor

on:
  workflow_dispatch:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - 'backend/contracts/phase-a-firestore-materialization-executor-v1.json'
      - 'backend/config/phase-a-firestore-target-attestation.example.json'
      - 'tools/migration/tya-phase-a-firestore-materialization-executor.mjs'
      - 'tools/migration/tya-phase-a-firestore-materialization-executor-validate.mjs'
      - '.github/workflows/cxorbia-phase-a-firestore-materialization-executor.yml'
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - 'backend/contracts/phase-a-firestore-materialization-executor-v1.json'
      - 'backend/config/phase-a-firestore-target-attestation.example.json'
      - 'tools/migration/tya-phase-a-firestore-materialization-executor.mjs'
      - 'tools/migration/tya-phase-a-firestore-materialization-executor-validate.mjs'
      - '.github/workflows/cxorbia-phase-a-firestore-materialization-executor.yml'

permissions:
  contents: read

jobs:
  validate-fail-closed:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Validate executor gates without writes
        run: node tools/migration/tya-phase-a-firestore-materialization-executor-validate.mjs --out .tmp/firestore-materialization-executor-validation
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firestore-materialization-executor-validation
          path: .tmp/firestore-materialization-executor-validation
          if-no-files-found: error
          retention-days: 14
