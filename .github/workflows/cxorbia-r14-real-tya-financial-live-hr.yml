name: CXOrbia Phase A R14 Real TyA Financial Reconciliation

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/reconciliation/r14-financial-live-hr/READY

permissions:
  contents: write

jobs:
  reconcile-real-tya-financial:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout current Phase A branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node and Python
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Decode sanitized TyA financial source
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p backend/config .tmp/r14-real-tya
          base64 -d tools/reconciliation/r14-financial-live-hr/phase-a-financial-workbook-source-safe-r14.json.gz.b64 | gzip -d > backend/config/phase-a-financial-workbook-source-safe-r14.json
          node <<'NODE'
          const fs=require('fs');
          const r=JSON.parse(fs.readFileSync('backend/config/phase-a-financial-workbook-source-safe-r14.json','utf8'));
          if(r.reportId!=='phase-a-financial-workbook-source-safe-r14') throw new Error('wrong R14 source id');
          if(r.tenantId!=='tya'||r.projectId!=='cinepolis') throw new Error('wrong tenant/project');
          if(r.safeState?.sourceSafe!==true||r.safeState?.piiOutput!==false||r.safeState?.rawWorkbookCommitted!==false) throw new Error('unsafe source state');
          if(r.source?.sha256!=='b8e753ade03286caf3ff19e119a9b21b4dde7d5bd21d61fba70ab32719afea89') throw new Error('source workbook hash mismatch');
          if(r.liquidationControl?.summary?.uniqueRecordCount!==247) throw new Error('unexpected liquidation count');
          console.log(JSON.stringify({records:r.liquidationControl.summary.uniqueRecordCount,duplicates:r.liquidationControl.summary.exactDuplicateCount,itemizedLedger:r.expenseLedger.summary.itemizedRecordCount,sourceSafe:true},null,2));
          NODE

      - name: Build live TyA HR source-safe payload
        env:
          CXORBIA_HR_SOURCE_SAFE_OUT: app/data/tya-hr-source-safe-periods.js
          CXORBIA_HR_LIVE_MAX_ROW: '140'
          CXORBIA_HR_LIVE_MAX_COL: AI
        shell: bash
        run: |
          set -euo pipefail
          node tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          test -s app/data/tya-hr-source-safe-periods.js

      - name: Reconcile real TyA financial rows against live HR
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/reconciliation/tya-financial-workbook-live-hr-reconcile-r14.mjs
          node tools/reconciliation/tya-financial-workbook-live-hr-reconcile-r14.mjs \
            --hr app/data/tya-hr-source-safe-periods.js \
            --financial backend/config/phase-a-financial-workbook-source-safe-r14.json \
            --out .tmp/r14-real-tya
          test -s .tmp/r14-real-tya/financial-live-hr-reconciliation-r14.source-safe.json

      - name: Run existing source-safe importer on exact linked liquidation rows
        shell: bash
        run: |
          set -euo pipefail
          python tools/migration/tya_phase_a_source_safe_import.py \
            --hr app/data/tya-hr-source-safe-periods.js \
            --financial .tmp/r14-real-tya/financial-import-input-r14.source-safe.json \
            --out .tmp/r14-real-tya/importer-dry-run \
            > .tmp/r14-real-tya/importer-console.json
          test -s .tmp/r14-real-tya/importer-dry-run/phase-a-source-safe-import-report.json

      - name: Validate operational and safety invariants
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const p='.tmp/r14-real-tya/financial-live-hr-reconciliation-r14.source-safe.json';
          const r=JSON.parse(fs.readFileSync(p,'utf8'));
          const allowed=['PASS_WITH_REVIEW_REAL_TYA_FINANCIAL_RECONCILIATION','HOLD_NO_EXACT_REAL_TYA_LINKS'];
          if(!allowed.includes(r.decision)) throw new Error('unexpected decision');
          if(r.summary.hrVisits!==616) throw new Error(`HR visit drift ${r.summary.hrVisits}`);
          if(r.summary.financialLiquidationRows!==247) throw new Error('financial row drift');
          const s=r.safeState||{};
          for(const key of ['piiOutput','rawWorkbookRead','rawWorkbookCommitted','providerReads','providerWrites','imports','paymentsExecuted','deploy','production']) if(s[key]!==false) throw new Error('unsafe state '+key);
          const raw=fs.readFileSync(p,'utf8');
          for(const token of ['"shopperName"','"beneficiaryName"','"storeName"','"bankAccount"','"dpi"']) if(raw.includes(token)) throw new Error('forbidden field '+token);
          console.log(JSON.stringify({decision:r.decision,summary:r.summary,june:r.coverageByPeriodCountry?.['2026-06']},null,2));
          NODE

      - name: Persist sanitized operational result and documentation
        shell: bash
        run: |
          set -euo pipefail
          cp .tmp/r14-real-tya/financial-live-hr-reconciliation-r14.source-safe.json backend/config/phase-a-financial-live-hr-reconciliation-r14.source-safe.json
          cp .tmp/r14-real-tya/ledger-payment-evidence-candidates-r14.source-safe.json backend/config/phase-a-ledger-payment-evidence-candidates-r14.source-safe.json
          cp .tmp/r14-real-tya/review-queue-r14.source-safe.json backend/config/phase-a-financial-review-queue-r14.source-safe.json
          cp .tmp/r14-real-tya/importer-dry-run/phase-a-source-safe-import-report.json backend/config/phase-a-financial-importer-dry-run-r14.source-safe.json
          cp .tmp/r14-real-tya/financial-live-hr-reconciliation-r14.source-safe.md app/docs/PHASE-A-FINANCIAL-REAL-TYA-R14-RESULT-20260713.md
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-financial-live-hr-reconciliation-r14.source-safe.json','utf8'));
          const S=JSON.parse(fs.readFileSync('backend/config/phase-a-financial-workbook-source-safe-r14.json','utf8'));
          const I=JSON.parse(fs.readFileSync('backend/config/phase-a-financial-importer-dry-run-r14.source-safe.json','utf8'));
          const june=R.coverageByPeriodCountry?.['2026-06']||{};
          const exact=R.summary.exactCompositeLinked;
          const docs={
            'app/docs/CAMBIOS-BACKEND-ADDENDUM-FINANCIAL-REAL-TYA-R14-20260713.md':`# CAMBIOS BACKEND — R14 FINANZAS REALES TyA\n\n- Fuente financiera real procesada localmente y sanitizada: ${S.liquidationControl.summary.uniqueRecordCount} filas únicas, ${S.liquidationControl.summary.exactDuplicateCount} duplicado exacto colapsado.\n- Periodos: enero-junio 2026; GT/HN; sin nombres, bancos ni datos personales.\n- HR viva reconciliada: ${R.summary.hrVisits} visitas.\n- Enlaces compuestos exactos: ${exact}.\n- Decisión: \`${R.decision}\`.\n- Importador R4 ejecutado en dry-run: ${JSON.stringify(I.summary||I)}.\n- Cero provider writes, imports reales, pagos, deploy o producción.\n`,
            'app/docs/ACADEMIA-IMPACT-FINANCIAL-REAL-TYA-R14-20260713.md':`# ACADEMIA — IMPACTO R14 FINANZAS REALES TyA\n\n- Manuales y cursos deben distinguir control de liquidación, evidencia de pago y pago confirmado.\n- Un día planificado o estado liquidada no equivale a pagada.\n- Los casos ambiguos se enseñan como revisión humana, sin match por nombre visible.\n- No corresponde paquete Claude inmediato: el cambio es backend/datos source-safe.\n`,
            'app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R14-FINANCIAL-REAL-TYA-20260713.md':`# TRACKER PHASE A — R14 FINANZAS REALES TyA\n\n- V110 empalme: COMPLETED_VERIFIED.\n- R10 visual source-safe: PASS_WITH_REVIEW.\n- R11D shopper gap 210/213: REVIEW_QUEUE.\n- R13 Firebase DEV: NONEMPTY_REVIEW_REQUIRED.\n- R14 financiero real TyA: ${R.decision}.\n- Filas control liquidación: ${R.summary.financialLiquidationRows}.\n- Enlaces exactos HR: ${exact}.\n- Evidencia itemizada ledger: ${R.summary.itemizedLedgerRows}.\n- Junio GT: HR ${june.GT?.hrVisits||0}, fuente financiera ${june.GT?.financialRows||0}, gap ${june.GT?.sourceCountGap||0}.\n- Junio HN: HR ${june.HN?.hrVisits||0}, fuente financiera ${june.HN?.financialRows||0}, gap ${june.HN?.sourceCountGap||0}.\n- Writes/import/pagos/deploy/producción: HOLD.\n\nSiguiente bloque: cerrar enlaces exactos y evidencia de pago; paralelamente reemplazar Firebase DEV no limpio por una base nueva y vacía antes de cualquier materialización.\n`
          };
          for(const [p,c] of Object.entries(docs)) fs.writeFileSync(p,c,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R14 Finanzas reales TyA — 2026-07-13\n\n- ${R.summary.financialLiquidationRows} filas reales de liquidación source-safe contra ${R.summary.hrVisits} visitas HR.\n- ${exact} enlaces compuestos exactos.\n- Decisión: \`${R.decision}\`.\n- Sin writes, import real, pagos, deploy ni producción.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R14 Finanzas reales TyA — 2026-07-13\n\n- Backend/datos procesó fuente financiera real y HR viva.\n- Decisión: \`${R.decision}\`; enlaces exactos: ${exact}.\n- No corresponde cambio frontend inmediato; conservar distinción liquidada/pagada y los P1 ya registrados.\n`,'utf8');
          fs.appendFileSync('PENDIENTES-PROTOTIPO.md',`\n\n## R14 Finanzas reales TyA — impacto Claude\n\n- Sin P0 frontend nuevo.\n- Mantener abiertos únicamente los P1 de pagos ya documentados; no convertir liquidación o día planificado en pago confirmado.\n`,'utf8');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r14={decision:R.decision,financialLiquidationRows:R.summary.financialLiquidationRows,exactCompositeLinked:exact,report:'docs/PHASE-A-FINANCIAL-REAL-TYA-R14-RESULT-20260713.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R14 datos financieros reales TyA */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11dDecision:'${M.r11d?.decision}',r13Decision:'${M.r13?.decision}',r14Decision:'${R.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; R14 usa datos financieros reales TyA source-safe; provider writes siguen apagados.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Upload sanitized R14 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-r14-real-tya-financial-source-safe
          path: .tmp/r14-real-tya
          if-no-files-found: error
          retention-days: 14

      - name: Commit sanitized results and remove one-time trigger
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r14-real-tya-financial-live-hr.yml
          git rm -rf tools/reconciliation/r14-financial-live-hr
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend/config tools/reconciliation CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md .github/workflows
          git commit -m "feat(phase-a): record real TyA financial reconciliation R14"
          git push origin HEAD:docs-tya-v6-v71-audit
