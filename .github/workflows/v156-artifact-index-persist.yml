name: CXOrbia V156 artifact index persisted

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/v156-artifact-index-persist.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  index:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
      - name: Persist complete artifact index
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p app/docs
          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | {id,name,size_in_bytes,created_at,expires_at,expired,digest,run_id:.workflow_run.id,head_branch:.workflow_run.head_branch,head_sha:.workflow_run.head_sha}' \
            > /tmp/artifacts.ndjson
          python3 <<'PY'
          from pathlib import Path
          import json,os,re
          items=[]
          for line in Path('/tmp/artifacts.ndjson').read_text().splitlines():
            line=line.strip()
            if line: items.append(json.loads(line))
          items.sort(key=lambda x:x.get('created_at',''),reverse=True)
          rx=re.compile(r'v156|final|candidate|prototype|export|source|baseline|promotion|audit|package|paquete',re.I)
          matches=[x for x in items if rx.search(x.get('name','')) or rx.search(x.get('head_branch') or '')]
          result={
            'schemaVersion':'1.0.0',
            'generatedAtRunId':os.environ.get('GITHUB_RUN_ID'),
            'artifactCount':len(items),
            'matchingCount':len(matches),
            'matchingArtifacts':matches,
            'allArtifacts':items
          }
          Path('app/docs/V156-ACTIONS-ARTIFACT-INDEX-20260716.json').write_text(json.dumps(result,indent=2,ensure_ascii=False)+'\n',encoding='utf-8')
          md=['# V156 Actions artifact index','',f"Artifacts: {len(items)}",f"Matching recovery terms: {len(matches)}",'']
          for x in matches:
            md.append(f"- `{x['id']}` · **{x['name']}** · {x['size_in_bytes']} bytes · run `{x['run_id']}` · branch `{x.get('head_branch')}` · {x['created_at']} · expired={x['expired']}")
          Path('app/docs/V156-ACTIONS-ARTIFACT-INDEX-20260716.md').write_text('\n'.join(md)+'\n',encoding='utf-8')
          print(json.dumps({'artifactCount':len(items),'matchingCount':len(matches),'topMatches':matches[:30]},indent=2))
          PY
          git config user.name 'CXOrbia Artifact Index Bot'
          git config user.email 'cxorbia-artifacts@example.invalid'
          git add app/docs/V156-ACTIONS-ARTIFACT-INDEX-20260716.json app/docs/V156-ACTIONS-ARTIFACT-INDEX-20260716.md
          git commit -m 'docs: persist Actions artifact index for V156 recovery'
          git push origin HEAD:docs-tya-v6-v71-audit
