name: CXORBIA_ATOMIC_APPLY_RUNNER

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - .github/cxorbia-apply-requests/request.json
      - .github/workflows/cxorbia-atomic-apply-runner.yml
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    types:
      - synchronize
    paths:
      - .github/cxorbia-apply-requests/request.json
      - .github/workflows/cxorbia-atomic-apply-runner.yml
      - tools/release/cxorbia-atomic-apply-runner.mjs
      - tools/release/cxorbia-focal-text-patch-runner.mjs
      - tools/release/cxorbia-source-lock-atomic-apply.mjs

permissions:
  contents: write
  issues: write
  statuses: write

concurrency:
  group: cxorbia-atomic-apply-runner-docs-tya-v6-v71-audit
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  atomic-apply:
    name: Apply audited delta atomically
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout exact live branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          ref: docs-tya-v6-v71-audit

      - name: Detect active request
        id: request
        run: |
          if [ -f .github/cxorbia-apply-requests/request.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            node <<'NODE'
            const fs=require('fs');
            const request=JSON.parse(fs.readFileSync('.github/cxorbia-apply-requests/request.json','utf8'));
            fs.appendFileSync(process.env.GITHUB_OUTPUT,`mode=${request.mode||'blob_delta_v1'}\n`);
            NODE
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "mode=none" >> "$GITHUB_OUTPUT"
            echo "Request already consumed; safe no-op."
          fi

      - name: Setup Node
        if: steps.request.outputs.present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate controlled runner contract
        if: steps.request.outputs.present == 'true'
        run: node tools/qa/cxorbia-controlled-runners-contract-gate.mjs

      - name: Publish started status
        if: steps.request.outputs.present == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const {spawnSync}=require('child_process');
          const [owner,repo]=process.env.GITHUB_REPOSITORY.split('/');
          const sha=spawnSync('git',['rev-parse','HEAD'],{encoding:'utf8'}).stdout.trim();
          const body={state:'pending',context:'cxorbia/atomic-apply/overall',description:'CONTROLLED_ATOMIC_APPLY_STARTED',target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`};
          fetch(`${process.env.GITHUB_API_URL}/repos/${owner}/${repo}/statuses/${sha}`,{method:'POST',headers:{Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:JSON.stringify(body)}).then(async r=>{if(!r.ok)throw new Error(await r.text());}).catch(e=>{console.error(e);process.exitCode=1;});
          NODE

      - name: Execute controlled focal text patch
        if: steps.request.outputs.present == 'true' && steps.request.outputs.mode == 'focal_text_patch_v1'
        id: focal
        continue-on-error: true
        run: |
          set +e
          node tools/release/cxorbia-focal-text-patch-runner.mjs .github/cxorbia-apply-requests/request.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Execute controlled source-lock regeneration
        if: steps.request.outputs.present == 'true' && steps.request.outputs.mode == 'source_lock_regenerate_v1'
        id: source_lock
        continue-on-error: true
        run: |
          set +e
          node tools/release/cxorbia-source-lock-atomic-apply.mjs .github/cxorbia-apply-requests/request.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Execute controlled blob delta
        if: steps.request.outputs.present == 'true' && steps.request.outputs.mode != 'focal_text_patch_v1' && steps.request.outputs.mode != 'source_lock_regenerate_v1'
        id: apply
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          node tools/release/cxorbia-atomic-apply-runner.mjs .github/cxorbia-apply-requests/request.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Resolve execution result
        if: always() && steps.request.outputs.present == 'true'
        id: result
        run: |
          if [ "${{ steps.request.outputs.mode }}" = "focal_text_patch_v1" ]; then
            echo "exit_code=${{ steps.focal.outputs.exit_code }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ steps.request.outputs.mode }}" = "source_lock_regenerate_v1" ]; then
            echo "exit_code=${{ steps.source_lock.outputs.exit_code }}" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=${{ steps.apply.outputs.exit_code }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload sanitized apply evidence
        if: always() && steps.request.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-atomic-apply-${{ github.run_id }}
          path: .tmp/cxorbia-atomic-apply-runner
          if-no-files-found: error
          retention-days: 14

      - name: Publish final status
        if: always() && steps.request.outputs.present == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node <<'NODE'
          const fs=require('fs');
          const reportPath='.tmp/cxorbia-atomic-apply-runner/report.json';
          const report=fs.existsSync(reportPath)?JSON.parse(fs.readFileSync(reportPath,'utf8')):{status:'HOLD_REPORT_MISSING',requestCommitSha:null,blockers:['report_missing']};
          const {spawnSync}=require('child_process');
          const [owner,repo]=process.env.GITHUB_REPOSITORY.split('/');
          const sha=report.requestCommitSha||spawnSync('git',['rev-parse','HEAD'],{encoding:'utf8'}).stdout.trim();
          const state=report.status==='APPLIED_AND_VERIFIED'?'success':'failure';
          const body={state,context:'cxorbia/atomic-apply/overall',description:`${report.status}; blockers=${Array.isArray(report.blockers)?report.blockers.length:0}`.slice(0,140),target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`};
          fetch(`${process.env.GITHUB_API_URL}/repos/${owner}/${repo}/statuses/${sha}`,{method:'POST',headers:{Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,Accept:'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:JSON.stringify(body)}).then(async r=>{if(!r.ok)throw new Error(await r.text());}).catch(e=>{console.error(e);process.exitCode=1;});
          NODE

      - name: Enforce apply result
        if: steps.request.outputs.present == 'true'
        run: test "${{ steps.result.outputs.exit_code }}" = "0"
