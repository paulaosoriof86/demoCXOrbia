name: CXOrbia V105 Baseline Diagnostic

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-v105-baseline-diagnostic.yml'

permissions:
  contents: write

jobs:
  diagnose-v105-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
      - name: Calcular evidencia sin modificar runtime
        shell: bash
        run: |
          set -u
          OUT=tools/empalme/v105-baseline-diagnostic.txt
          TMP=.tmp/v105-baseline-diagnostic
          rm -rf "$TMP" && mkdir -p "$TMP"
          {
            echo "generatedAt=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "head=$(git rev-parse HEAD)"
            echo "branch=${GITHUB_REF_NAME:-$(git branch --show-current)}"
            git cat-file -e 40ed11aa4f6de5524f60b0ea1d0060f20a4172f4^{commit} 2>/dev/null && echo 'baseCommit=PASS' || echo 'baseCommit=FAIL'
            test -f backend/config/phase-a-v105-v106-empalme-request.source-safe.json && echo 'requestFile=PASS' || echo 'requestFile=FAIL'
            test -f tools/empalme/v105-v106-runtime-checksums.sha256 && echo 'checksumFile=PASS' || echo 'checksumFile=FAIL'
            echo "checksumFileSha=$(sha256sum tools/empalme/v105-v106-runtime-checksums.sha256 | awk '{print $1}')"
            echo "checksumLines=$(wc -l < tools/empalme/v105-v106-runtime-checksums.sha256 | tr -d ' ')"
          } > "$OUT"
          cat tools/empalme/v105-v106-delta/part-00.txt tools/empalme/v105-v106-delta/part-01.txt tools/empalme/v105-v106-delta/part-02.txt tools/empalme/v105-v106-delta/part-03.txt tools/empalme/v105-v106-delta/part-04-05.txt tools/empalme/v105-v106-delta/part-06-07.txt tools/empalme/v105-v106-delta/part-08-09.txt tools/empalme/v105-v106-delta/part-10-11.txt tools/empalme/v105-v106-delta/part-12-13.txt | tr -d '\r\n\t ' > "$TMP/raw.b64"
          {
            echo "rawLength=$(wc -c < "$TMP/raw.b64" | tr -d ' ')"
            echo "rawSha=$(sha256sum "$TMP/raw.b64" | awk '{print $1}')"
          } >> "$OUT"
          python3 - "$TMP/raw.b64" "$TMP/repaired.b64" "$OUT" <<'PY'
from pathlib import Path
import sys
src=Path(sys.argv[1]).read_bytes(); out=Path(sys.argv[2]); report=Path(sys.argv[3])
rows=[]
rows.append(f'offset85527={src[85527:85528].decode("latin1") if len(src)>85527 else "MISSING"}')
rows.append(f'offset101860={src[101860:101861].decode("latin1") if len(src)>101860 else "MISSING"}')
rows.append(f'offset114227={src[114227:114228].decode("latin1") if len(src)>114227 else "MISSING"}')
try:
    b=bytearray(src)
    b[85527:85527]=b'k'
    b[101860:101861]=b'A'
    b[114227:114227]=b'/'
    out.write_bytes(b)
    rows.append(f'repairedLength={len(b)}')
except Exception as exc:
    rows.append('repairError='+repr(exc))
with report.open('a',encoding='utf-8') as f:
    f.write('\n'.join(rows)+'\n')
PY
          {
            echo "repairedSha=$(sha256sum "$TMP/repaired.b64" | awk '{print $1}')"
            if base64 --decode "$TMP/repaired.b64" > "$TMP/archive.tar.gz" 2>"$TMP/decode.err"; then
              echo 'decode=PASS'
              echo "archiveSha=$(sha256sum "$TMP/archive.tar.gz" | awk '{print $1}')"
              echo "archiveFiles=$(tar -tzf "$TMP/archive.tar.gz" 2>/dev/null | wc -l | tr -d ' ')"
            else
              echo 'decode=FAIL'
              echo "decodeError=$(tr '\n' ' ' < "$TMP/decode.err")"
            fi
          } >> "$OUT"
          cat "$OUT"
      - name: Commit diagnóstico
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools/empalme/v105-baseline-diagnostic.txt
          git commit -m "ci: record V105 baseline transport diagnostic"
          git push origin HEAD:docs-tya-v6-v71-audit
