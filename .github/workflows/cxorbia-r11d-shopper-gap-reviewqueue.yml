name: CXOrbia Phase A R11D Shopper Gap ReviewQueue

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/reconciliation/r11d/READY

permissions:
  contents: write

jobs:
  build-review-item:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Build and validate source-level review item
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),crypto=require('crypto');
          const R11=JSON.parse(fs.readFileSync('backend/config/phase-a-shopper-reference-drift-r11.source-safe.json','utf8'));
          const R11B=JSON.parse(fs.readFileSync('backend/config/phase-a-shopper-reference-history-recovery-r11b.source-safe.json','utf8'));
          const R11C=JSON.parse(fs.readFileSync('backend/config/phase-a-shopper-reference-builder-lineage-r11c.source-safe.json','utf8'));
          const R5=JSON.parse(fs.readFileSync('backend/config/phase-a-firestore-materialization-r5-summary.source-safe.json','utf8'));
          if(R11.current.shopperCount!==210||R5.counts.byDomain.shopper!==213) throw new Error('unexpected shopper counts');
          if(R11B.decision!=='HOLD_NO_213_REFERENCE_SET_IN_REACHABLE_GIT_OBJECTS') throw new Error('unexpected R11B decision');
          if(R11C.decision!=='SOURCE_SNAPSHOT_DRIFT_NOT_BUILDER_DRIFT') throw new Error('unexpected R11C decision');
          const stable=s=>crypto.createHash('sha256').update(s).digest('hex').slice(0,24);
          const reviewId=`review_${stable(`tya|cinepolis|shopper_source_snapshot_gap|${R5.sourceSha256}|${R11.current.referenceSetSha256}`)}`;
          const item={
            reviewId,tenantId:'tya',projectId:'cinepolis',phase:'Phase A',
            conflictType:'shopper_source_snapshot_reference_gap',severity:'P0_DATA_GATE',entityType:'source_snapshot',
            entityRef:`shopper_reference_set:${R11.current.referenceSetSha256.slice(0,16)}`,
            sourceARef:`r5_source:${R5.sourceSha256.slice(0,16)}:count_213`,
            sourceBRef:`current_live_source_safe:${R11.current.referenceSetSha256.slice(0,16)}:count_210`,
            reason:'R5 materialization summary proves 213 shopper operations, current live source-safe read proves 210 identities, parser lineage is unchanged, and no approved 213-reference set is reachable in Git objects.',
            recommendedAction:'attach_approved_historical_source_safe_reference_set_or_supersede_r5_count_after_human_review',
            allowedActions:['attach_historical_source_safe_reference_set','attach_protected_materialization_candidate_paths','approve_210_as_authoritative_with_audited_r5_supersession','defer_materialization_keep_visual_runtime'],
            blockedActions:['infer_three_identities_from_count','match_or_merge_by_name','create_placeholder_shoppers','delete_historical_shoppers','materialize_shoppers','reopen_frontend_or_claude','write_firestore_or_hr'],
            status:'blocked',createdAt:new Date().toISOString(),resolvedAt:null,
            evidence:{r5PlanId:R5.planId,r5SourceSha256:R5.sourceSha256,r5PlanSha256:R5.planSha256,r5ShopperCount:213,currentReferenceSetSha256:R11.current.referenceSetSha256,currentShopperCount:210,currentVisits:616,currentPeriods:14,r11Decision:R11.decision,r11bDecision:R11B.decision,r11cDecision:R11C.decision,builderSame:R11C.lineage.hrBuilder.same,xlsxHelperSame:R11C.lineage.xlsxHelper.same},
            impact:{visualSmoke:'not_blocked',historicalShopperCompleteness:'blocked',shopperMaterialization:'blocked',certificationCarryover:'hold_for_identity_linking',payments:'not_automatically_blocked_but_identity_links_require_review',production:'hold'},
            sourceSafe:true,piiIncluded:false
          };
          const audit={eventId:`audit_${stable(reviewId+'|candidateGenerated')}`,eventType:'candidateNeedsReview',tenantId:'tya',projectId:'cinepolis',entityType:'source_snapshot',entityRef:item.entityRef,reviewId,reasonCode:'historical_reference_set_unavailable',createdAt:item.createdAt,sourceSafe:true,piiIncluded:false};
          const pack={schemaVersion:'1.0.0',contractId:'phase-a-shopper-source-snapshot-gap-review-r11d-v1',decision:'REVIEW_QUEUE_SOURCE_LEVEL_ITEM_CREATED',reviewItems:[item],auditEvents:[audit],counts:{reviewItems:1,auditEvents:1,placeholderShoppers:0,materializedShoppers:0},policy:{oneSourceLevelItemNotThreeInventedIdentities:true,noNameMatching:true,noAutomaticMerge:true,noAutomaticDelete:true,noFixtureBackfill:true},safeState:{writes:false,imported:false,production:false,providers:false,hrWrites:false,paymentsExecuted:false}};
          const raw=JSON.stringify(pack);
          for(const key of ['email','phone','telefono','dpi','bank','banco','address','direccion','rawName','shopperName']) if(raw.toLowerCase().includes(`"${key.toLowerCase()}"`)) throw new Error('sensitive key detected:'+key);
          if(pack.reviewItems.length!==1||pack.counts.placeholderShoppers!==0||pack.safeState.writes) throw new Error('review pack invariant failed');
          fs.writeFileSync('backend/config/phase-a-shopper-source-snapshot-gap-review-r11d.source-safe.json',JSON.stringify(pack,null,2)+'\n','utf8');
          console.log(JSON.stringify(pack,null,2));
          NODE

      - name: Documentar R11D y refrescar source lock
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const P=JSON.parse(fs.readFileSync('backend/config/phase-a-shopper-source-snapshot-gap-review-r11d.source-safe.json','utf8'));
          const I=P.reviewItems[0];
          fs.writeFileSync('app/docs/PHASE-A-SHOPPER-SOURCE-SNAPSHOT-GAP-REVIEW-R11D-20260712.md',`# PHASE A — R11D REVIEWQUEUE DE BRECHA SHOPPER\n\nFecha: 2026-07-12\n\n## Decisión\n\n\`${P.decision}\`\n\nSe creó un único ítem de revisión a nivel de fuente/snapshot: \`${I.reviewId}\`. No se inventaron tres shoppers ni se generaron placeholders.\n\n## Evidencia\n\n- R5: ${I.evidence.r5ShopperCount} shoppers, plan \`${I.evidence.r5PlanId}\`;\n- lectura viva actual: ${I.evidence.currentShopperCount} shoppers / ${I.evidence.currentVisits} visitas / ${I.evidence.currentPeriods} periodos;\n- builder HR idéntico a R5: ${I.evidence.builderSame};\n- helper XLSX idéntico a R5: ${I.evidence.xlsxHelperSame};\n- set histórico de 213 alcanzable en Git: no.\n\n## Acciones permitidas\n\n${I.allowedActions.map(x=>`- ${x}`).join('\n')}\n\n## Acciones bloqueadas\n\n${I.blockedActions.map(x=>`- ${x}`).join('\n')}\n\n## Impacto\n\n- smoke visual: no bloqueado;\n- completitud histórica shopper: bloqueada;\n- materialización shopper: bloqueada;\n- certificaciones: hold para enlace de identidad;\n- producción: hold.\n\n## Estado seguro\n\nSin datos sensibles, placeholders, imports, writes, HR writes, deploy, producción, providers ni pagos reales.\n`,'utf8');
          fs.writeFileSync('app/docs/INSUMO-PUNTUAL-SNAPSHOT-R5-SHOPPERS-20260712.md',`# INSUMO PUNTUAL ACEPTABLE — SNAPSHOT R5 SHOPPERS\n\nSolo si se desea cerrar la diferencia 210/213 sin reemplazar R5, sirve cualquiera de estas evidencias source-safe aprobadas:\n\n1. payload R5 con los 213 \`shopperRefId\` opacos;\n2. plan R5 con las 213 rutas \`/shoppers/{shopperRefId}\`;\n3. preview protegido de candidatos shopper del mismo \`sourceSha256\`;\n4. artefacto R5 firmado con manifest/checksum que contenga referencias opacas.\n\nNo enviar HR cruda, nombres, teléfonos, correos, DPI, banco, NDA, direcciones o filas completas. Si la evidencia no existe, la alternativa correcta es una decisión humana auditada que declare 210 como snapshot autoritativo y superseda el conteo R5; nunca inferir tres identidades.\n`,'utf8');
          fs.writeFileSync('app/docs/CAMBIOS-BACKEND-ADDENDUM-SHOPPER-GAP-REVIEW-R11D-20260712.md',`# CAMBIOS BACKEND — R11D REVIEWQUEUE\n\n- Creado un review item source-safe a nivel de snapshot.\n- No se crearon tres identidades ficticias.\n- Materialización histórica shopper y enlace de certificaciones permanecen HOLD.\n- Sin writes, imports, deploy o producción.\n`,'utf8');
          fs.writeFileSync('app/docs/ACADEMIA-IMPACT-SHOPPER-GAP-REVIEW-R11D-20260712.md',`# ACADEMIA — IMPACTO R11D\n\n- Manual administrativo debe explicar revisión a nivel de fuente, no creación de registros ficticios.\n- Diferenciar snapshot actual, snapshot histórico y decisión de supersesión auditada.\n- No corresponde paquete Claude inmediato.\n`,'utf8');
          fs.writeFileSync('app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R11D-SHOPPER-GAP-20260712.md',`# TRACKER PHASE A — R11D SHOPPER GAP\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11/R11B: set histórico 213 no disponible.\n- R11C: SOURCE_SNAPSHOT_DRIFT_NOT_BUILDER_DRIFT.\n- R11D: REVIEW_QUEUE_SOURCE_LEVEL_ITEM_CREATED.\n- Placeholder shoppers: 0.\n- Materialización shopper: HOLD.\n- Producción: HOLD.\n\nSiguiente bloque exacto: mantener el review item abierto y avanzar en carril no dependiente con readiness Firebase DEV read-only post-V110, sin ejecutar conexión hasta autorización explícita.\n`,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R11D reviewQueue brecha shopper — 2026-07-12\n\n- Se creó un único ítem source-level; no tres shoppers ficticios.\n- Materialización shopper/carryover de certificaciones queda HOLD hasta evidencia o decisión humana auditada.\n- Sin imports, writes, deploy ni producción.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R11D shopper gap review — 2026-07-12\n\n- Brecha 210/213 encapsulada en reviewQueue backend a nivel de fuente.\n- No es tarea Claude y no reabre V110/R10.\n`,'utf8');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r11d={decision:P.decision,report:'docs/PHASE-A-SHOPPER-SOURCE-SNAPSHOT-GAP-REVIEW-R11D-20260712.md',reviewItems:P.counts.reviewItems,placeholderShoppers:P.counts.placeholderShoppers};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R10/R11D */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11dDecision:'${P.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; brecha shopper en reviewQueue source-level; backend preservado.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Commit y limpiar runner
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r11d-shopper-gap-reviewqueue.yml
          git rm -rf tools/reconciliation/r11d
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend/config CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md .github/workflows
          git commit -m "feat(phase-a): create source-level shopper gap review item R11D"
          git push origin HEAD:docs-tya-v6-v71-audit
