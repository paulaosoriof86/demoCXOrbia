name: CXOrbia Phase A R11C Shopper Builder Lineage

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/reconciliation/r11c/READY

permissions:
  contents: write

jobs:
  audit-builder-lineage:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Audit R5 builder lineage
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import subprocess, json, hashlib
          from pathlib import Path
          from datetime import datetime, timezone

          summary='backend/config/phase-a-firestore-materialization-r5-summary.source-safe.json'
          builder='tools/hr-source/tya-build-live-hr-source-safe-static.mjs'
          helper='tools/hr-source/tya-hr-source-xlsx-lite.mjs'
          plan_builder='tools/migration/tya-phase-a-build-firestore-materialization-plan.mjs'

          def out(*args):
              return subprocess.check_output(args,text=True,stderr=subprocess.DEVNULL).strip()
          commits=out('git','log','--all','--format=%H','--',summary).splitlines()
          if not commits: raise SystemExit('R5 summary history not found')
          r5_commit=commits[-1]
          r5_time=out('git','show','-s','--format=%cI',r5_commit)
          def blob(ref,path):
              try:return out('git','rev-parse',f'{ref}:{path}')
              except:return None
          def file_sha(ref,path):
              try:
                  b=subprocess.check_output(['git','show',f'{ref}:{path}'],stderr=subprocess.DEVNULL)
                  return hashlib.sha256(b).hexdigest()
              except:return None
          current='HEAD'
          rows={}
          for name,path in [('hrBuilder',builder),('xlsxHelper',helper),('materializationPlanBuilder',plan_builder)]:
              rows[name]={
                  'path':path,
                  'r5Blob':blob(r5_commit,path),
                  'currentBlob':blob(current,path),
                  'r5Sha256':file_sha(r5_commit,path),
                  'currentSha256':file_sha(current,path),
              }
              rows[name]['same']=rows[name]['r5Blob']==rows[name]['currentBlob'] and rows[name]['r5Blob'] is not None
          r5=json.loads(out('git','show',f'{r5_commit}:{summary}'))
          if rows['hrBuilder']['same'] and rows['xlsxHelper']['same']:
              decision='SOURCE_SNAPSHOT_DRIFT_NOT_BUILDER_DRIFT'
          else:
              decision='BUILDER_LINEAGE_DRIFT_REQUIRES_CONTROLLED_REPLAY'
          report={
              'schemaVersion':'1.0.0',
              'reportId':'tya-shopper-reference-builder-lineage-r11c',
              'generatedAt':datetime.now(timezone.utc).isoformat(),
              'tenantId':'tya','projectId':'cinepolis',
              'decision':decision,
              'r5Evidence':{
                  'commit':r5_commit,'committedAt':r5_time,'summaryPath':summary,
                  'planId':r5.get('planId'),'sourceSha256':r5.get('sourceSha256'),'planSha256':r5.get('planSha256'),
                  'counts':r5.get('counts',{}),'verification':r5.get('verification',{})
              },
              'lineage':rows,
              'interpretation': 'R5 and current HR parser lineage are identical; the 213→210 difference must be reconciled as source snapshot/reference drift, not frontend or builder regression.' if decision.startswith('SOURCE_SNAPSHOT') else 'Builder/helper lineage changed after R5; replay the historical version against the controlled source before classifying identity drift.',
              'policy':{'noNameMatching':True,'noAutomaticMerge':True,'noAutomaticDelete':True,'noFixtureBackfill':True,'materializationHold':True},
              'safeState':{'writes':False,'imported':False,'production':False,'providers':False,'paymentsExecuted':False}
          }
          Path('backend/config/phase-a-shopper-reference-builder-lineage-r11c.source-safe.json').write_text(json.dumps(report,indent=2)+'\n',encoding='utf-8')
          Path('.tmp').mkdir(exist_ok=True)
          Path('.tmp/r11c.json').write_text(json.dumps(report,indent=2)+'\n',encoding='utf-8')
          print(json.dumps(report,indent=2))
          PY

      - name: Document R11C and refresh lock
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-shopper-reference-builder-lineage-r11c.source-safe.json','utf8'));
          const lines=Object.entries(R.lineage).map(([k,v])=>`- ${k}: same=${v.same}; R5 blob=\`${v.r5Blob}\`; current blob=\`${v.currentBlob}\``).join('\n');
          fs.writeFileSync('app/docs/PHASE-A-SHOPPER-REFERENCE-BUILDER-LINEAGE-R11C-20260712.md',`# PHASE A — R11C LINEAGE DEL BUILDER SHOPPER\n\nFecha: 2026-07-12\n\n## Decisión\n\n\`${R.decision}\`\n\n## Evidencia R5\n\n- commit: \`${R.r5Evidence.commit}\`;\n- fecha: ${R.r5Evidence.committedAt};\n- planId: \`${R.r5Evidence.planId}\`;\n- source SHA-256: \`${R.r5Evidence.sourceSha256}\`;\n- shoppers: ${R.r5Evidence.counts.byDomain.shopper};\n- visitas: ${R.r5Evidence.counts.byDomain.visit}.\n\n## Lineage\n\n${lines}\n\n## Interpretación\n\n${R.interpretation}\n\nNo se reabre frontend, Claude, Level 0/1 ni el builder. La materialización shopper permanece HOLD hasta recuperar el set histórico aprobado o resolver las tres referencias mediante evidencia source-safe estable.\n`,'utf8');
          fs.writeFileSync('app/docs/CAMBIOS-BACKEND-ADDENDUM-SHOPPER-BUILDER-LINEAGE-R11C-20260712.md',`# CAMBIOS BACKEND — R11C BUILDER LINEAGE\n\n- Se comparó lineage Git de builder HR, helper XLSX y planificador R5.\n- Decisión: \`${R.decision}\`.\n- No se usaron nombres ni datos crudos.\n- Sin imports, writes, deploy o producción.\n`,'utf8');
          fs.writeFileSync('app/docs/ACADEMIA-IMPACT-SHOPPER-BUILDER-LINEAGE-R11C-20260712.md',`# ACADEMIA — IMPACTO R11C\n\n- Sin cambios de cursos o rutas.\n- Manual administrativo: diferenciar drift de fuente/snapshot frente a regresión de parser.\n- No corresponde paquete Claude.\n`,'utf8');
          fs.writeFileSync('app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R11C-BUILDER-LINEAGE-20260712.md',`# TRACKER PHASE A — R11C BUILDER LINEAGE\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11: HOLD_REFERENCE_SET_UNAVAILABLE.\n- R11B: HOLD_NO_213_REFERENCE_SET_IN_REACHABLE_GIT_OBJECTS.\n- R11C: ${R.decision}.\n- Materialización shopper: HOLD.\n- Producción: HOLD.\n\nSiguiente bloque exacto: ${R.decision.startsWith('SOURCE_SNAPSHOT')?'recuperar evidencia externa source-safe del snapshot R5 (artefacto/salida protegida) o generar reviewQueue por ausencia de evidencia, sin inferir las tres identidades':'replay controlado de la versión histórica del builder contra fuente aprobada'}.\n`,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R11C lineage builder shopper — 2026-07-12\n\n- Decisión: \`${R.decision}\`.\n- Se verificó si 213→210 proviene de cambio del builder/helper o de snapshot/fuente.\n- No nombres, imports, writes, deploy ni producción.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R11C builder lineage — 2026-07-12\n\n- Decisión backend: \`${R.decision}\`.\n- No es tarea Claude; no reabrir V110/R10.\n`,'utf8');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r11c={decision:R.decision,report:'docs/PHASE-A-SHOPPER-REFERENCE-BUILDER-LINEAGE-R11C-20260712.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R10/R11 lineage */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11Decision:'${M.r11?.decision}',r11bDecision:'${M.r11b?.decision}',r11cDecision:'${R.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; R10/R11 lineage documentados; backend preservado.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Commit and clean
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r11c-shopper-builder-lineage.yml
          git rm -rf tools/reconciliation/r11c
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend/config CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md .github/workflows
          git commit -m "docs(phase-a): classify shopper drift builder lineage R11C"
          git push origin HEAD:docs-tya-v6-v71-audit
