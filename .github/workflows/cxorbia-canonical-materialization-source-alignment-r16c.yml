name: CXOrbia Canonical Materialization Source Alignment R16C

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - 'backend/contracts/phase-a-canonical-materialization-source-alignment-r16c-v1.json'
      - 'backend/contracts/phase-a-firestore-materialization-plan-v1.json'
      - 'backend/config/phase-a-financial-live-hr-reconciliation-r14c.source-safe.json'
      - 'backend/config/phase-a-shopper-source-snapshot-gap-review-r11d.source-safe.json'
      - 'backend/config/phase-a-liquidation-certification-projection-summary.source-safe.json'
      - 'app/data/tya-hr-source-safe-periods.js'
      - 'app/data/tya-financial-control-source-safe.js'
      - 'app/data/tya-certification-carryover-source-safe.js'
      - 'tools/migration/tya-phase-a-build-firestore-materialization-plan.mjs'
      - 'tools/migration/tya-canonical-materialization-source-alignment-r16c.mjs'
      - '.github/workflows/cxorbia-canonical-materialization-source-alignment-r16c.yml'
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - 'backend/contracts/phase-a-canonical-materialization-source-alignment-r16c-v1.json'
      - 'backend/contracts/phase-a-firestore-materialization-plan-v1.json'
      - 'backend/config/phase-a-financial-live-hr-reconciliation-r14c.source-safe.json'
      - 'backend/config/phase-a-shopper-source-snapshot-gap-review-r11d.source-safe.json'
      - 'backend/config/phase-a-liquidation-certification-projection-summary.source-safe.json'
      - 'app/data/tya-hr-source-safe-periods.js'
      - 'app/data/tya-financial-control-source-safe.js'
      - 'app/data/tya-certification-carryover-source-safe.js'
      - 'tools/migration/tya-phase-a-build-firestore-materialization-plan.mjs'
      - 'tools/migration/tya-canonical-materialization-source-alignment-r16c.mjs'
      - '.github/workflows/cxorbia-canonical-materialization-source-alignment-r16c.yml'
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  source-alignment:
    name: Offline canonical source alignment
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate syntax and JSON
        run: |
          set -euo pipefail
          node --check tools/migration/tya-phase-a-build-firestore-materialization-plan.mjs
          node --check tools/migration/tya-canonical-materialization-source-alignment-r16c.mjs
          node -e "const fs=require('fs');for(const p of ['backend/contracts/phase-a-canonical-materialization-source-alignment-r16c-v1.json','backend/config/phase-a-financial-live-hr-reconciliation-r14c.source-safe.json','backend/config/phase-a-shopper-source-snapshot-gap-review-r11d.source-safe.json','backend/config/phase-a-liquidation-certification-projection-summary.source-safe.json'])JSON.parse(fs.readFileSync(p,'utf8'));console.log('R16C inputs valid.');"

      - name: Build deterministic source-safe plan offline
        run: |
          set -euo pipefail
          node tools/migration/tya-phase-a-build-firestore-materialization-plan.mjs \
            --hr app/data/tya-hr-source-safe-periods.js \
            --financial app/data/tya-financial-control-source-safe.js \
            --certifications app/data/tya-certification-carryover-source-safe.js \
            --out .tmp/r16c-materialization-plan

      - name: Run source alignment gate
        run: |
          node tools/migration/tya-canonical-materialization-source-alignment-r16c.mjs \
            --plan .tmp/r16c-materialization-plan/firestore-materialization-plan.json \
            --out .tmp/canonical-materialization-source-alignment-r16c

      - name: Upload source-safe R16C report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: canonical-materialization-source-alignment-r16c-report
          path: |
            .tmp/canonical-materialization-source-alignment-r16c
            .tmp/r16c-materialization-plan/firestore-materialization-summary.json
            .tmp/r16c-materialization-plan/firestore-materialization-plan.md
          if-no-files-found: error
          retention-days: 14
