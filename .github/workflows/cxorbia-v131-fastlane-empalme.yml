name: CXOrbia V131 Fast-lane Atomic Empalme

on:
  push:
    branches:
      - phase-a/empalme-v131-fastlane-20260714
    paths:
      - '_staging/v131patch-*.b64'
      - '_staging/v131aux-*.b64'
      - '.github/workflows/cxorbia-v131-fastlane-empalme.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: cxorbia-v131-fastlane-empalme
  cancel-in-progress: true

jobs:
  audit-empalme:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Reconstruct audited assets
        run: |
          set -euo pipefail
          mkdir -p .tmp
          cat _staging/v131aux-*.b64 | base64 -d | tar -xzf - -C .
          cat _staging/v131patch-*.b64 | base64 -d | gzip -d > .tmp/v131-product.patch
      - name: Apply audited incremental patch
        run: |
          set -euo pipefail
          git apply --check .tmp/v131-product.patch
          git apply .tmp/v131-product.patch
      - name: Audit, source-lock and promote atomically
        run: node _staging/empalme-v131-fastlane.mjs
      - name: Remove temporary staging and workflow
        run: |
          rm -rf _staging .tmp
          rm -f .github/workflows/cxorbia-v131-fastlane-empalme.yml
      - name: Commit accepted baseline
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(prototype): accept and empalme V131 received as V121'
          git push origin HEAD:phase-a/empalme-v131-fastlane-20260714
