name: CXOrbia V156 Atomic Materialization

on:
  push:
    branches:
      - audit/v156-atomic-20260716
    paths:
      - '.candidate/v156-runtime-delta.zip'
      - 'tools/release/tya-promote-v156-atomic.mjs'
      - '.github/workflows/cxorbia-v156-atomic-promotion.yml'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  materialize-v156:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout isolated V156 branch
        uses: actions/checkout@v4
        with:
          ref: audit/v156-atomic-20260716
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Materialize complete audited V156 runtime
        run: |
          set -euo pipefail
          test "$(sha256sum .candidate/v156-runtime-delta.zip | awk '{print $1}')" = "053af067f5ffa5f2c9244798af3d0cce28189457533a835fb5376eac5112ebf5"
          rm -rf evidence
          unzip -oq .candidate/v156-runtime-delta.zip -d .
          mkdir -p app/docs .tmp/v156-atomic
          cp evidence/MANIFEST-V156.json app/docs/MANIFEST-V156.json
          cp evidence/REPORTE-CORRECCION-V156-GATE-AUTOMATIZADO-20260716.md app/docs/
          node tools/release/tya-promote-v156-atomic.mjs materialize
          while IFS= read -r -d '' file; do node --check "$file"; done < <(find app -type f \( -name '*.js' -o -name '*.mjs' \) -not -path 'app/docs/*' -print0)
          cat > app/docs/RESULTADO-MATERIALIZACION-V156-20260716.json <<'JSON'
          {
            "schemaVersion": "1.0.0",
            "decision": "PASS_V156_COMPLETE_RUNTIME_MATERIALIZED",
            "candidateVersion": "V156",
            "candidateManifestAggregateSha256": "0262675769bf613c933e0872484bd27d38c4adabe28b335f697ae456cc5c0305",
            "candidateManifestFileCount": 205,
            "candidateRuntimeFileCount": 71,
            "deltaZipSha256": "053af067f5ffa5f2c9244798af3d0cce28189457533a835fb5376eac5112ebf5",
            "runtimeMismatches": 0,
            "syntax": "PASS",
            "nextGate": "explicit_R15G_overlays_manifest_source_lock_and_role_smoke",
            "safeState": {
              "deploy": false,
              "production": false,
              "imports": false,
              "writes": false,
              "providers": false,
              "payments": false
            }
          }
          JSON

      - name: Commit complete V156 runtime atomically
        run: |
          set -euo pipefail
          rm -rf .candidate evidence .tmp
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A .candidate
          git add app .github/workflows/cxorbia-v156-atomic-promotion.yml
          git commit -m "feat: materialize complete audited V156 runtime [skip ci]"
          git push origin HEAD:audit/v156-atomic-20260716
