name: CXOrbia V156 git object source scan

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/v156-git-object-source-scan.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
      - name: Scan all refs and unreachable recent objects
        run: |
          set -euo pipefail
          git fetch --all --tags --prune
          mkdir -p app/docs
          git rev-list --all --objects > /tmp/all-objects.txt
          git fsck --full --no-reflogs --unreachable 2>/dev/null | awk '$2=="blob"{print $3}' > /tmp/unreachable-blobs.txt || true
          python3 <<'PY'
          from pathlib import Path
          import json,re,subprocess,os
          rows=[]
          rx=re.compile(r'(v15[1-6]|prototype development request|candidate|candidata|package|paquete|promotion|finalization|\.zip$)',re.I)
          for line in Path('/tmp/all-objects.txt').read_text(errors='replace').splitlines():
            parts=line.split(' ',1)
            if len(parts)==2 and rx.search(parts[1]): rows.append({'sha':parts[0],'path':parts[1],'reachable':True})
          # Include large reachable blobs even when the filename is generic.
          proc=subprocess.run(['git','cat-file','--batch-check=%(objectname) %(objecttype) %(objectsize) %(rest)'],input=Path('/tmp/all-objects.txt').read_text(),text=True,capture_output=True,check=True)
          large=[]
          for line in proc.stdout.splitlines():
            parts=line.split(' ',3)
            if len(parts)>=4 and parts[1]=='blob':
              try:size=int(parts[2])
              except:continue
              path=parts[3]
              if size>=500000 and (path.lower().endswith(('.zip','.gz','.b64','.patch')) or rx.search(path)):
                large.append({'sha':parts[0],'path':path,'size':size,'reachable':True})
          result={'schemaVersion':'1.0.0','runId':os.environ.get('GITHUB_RUN_ID'),'matchingPaths':rows,'largeCandidateBlobs':large,'unreachableBlobCount':len(Path('/tmp/unreachable-blobs.txt').read_text().splitlines()) if Path('/tmp/unreachable-blobs.txt').exists() else 0}
          Path('app/docs/V156-GIT-OBJECT-SOURCE-SCAN-20260716.json').write_text(json.dumps(result,indent=2,ensure_ascii=False)+'\n',encoding='utf-8')
          lines=['# V156 git object source scan','',f"Matching paths: {len(rows)}",f"Large candidate blobs: {len(large)}",f"Unreachable blobs: {result['unreachableBlobCount']}",'']
          for x in large+rows[:300]: lines.append(f"- `{x['sha']}` · {x.get('size','')} · `{x['path']}`")
          Path('app/docs/V156-GIT-OBJECT-SOURCE-SCAN-20260716.md').write_text('\n'.join(lines)+'\n',encoding='utf-8')
          print('\n'.join(lines[:120]))
          PY
          git config user.name 'CXOrbia Object Scan Bot'
          git config user.email 'cxorbia-objects@example.invalid'
          git add app/docs/V156-GIT-OBJECT-SOURCE-SCAN-20260716.json app/docs/V156-GIT-OBJECT-SOURCE-SCAN-20260716.md
          git commit -m 'docs: persist V156 git object source scan'
          git push origin HEAD:docs-tya-v6-v71-audit
