name: CXOrbia Phase A R10 Post-V110 Source-Safe

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/qa/r10-post-v110/READY

permissions:
  contents: write

jobs:
  r10-source-safe-post-v110:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout baseline V110 empalmada
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Verificar source lock de empalme
        shell: bash
        run: |
          set -euo pipefail
          test -f app/docs/MANIFEST-V110-UNION-EMPALME-R1.json
          test -f app/docs/verify-manifest-v110-union-empalme.mjs
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)
          grep -Fq 'COMPLETED_VERIFIED' app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-EMPALME-DETERMINISTICO-V110-20260712.md

      - name: Construir payload HR TyA source-safe
        env:
          CXORBIA_HR_SOURCE_SAFE_OUT: app/data/tya-hr-source-safe-periods.js
          CXORBIA_HR_LIVE_MAX_ROW: '140'
          CXORBIA_HR_LIVE_MAX_COL: AI
        run: |
          set -euo pipefail
          node tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          test -s app/data/tya-hr-source-safe-periods.js
          grep -q 'sourceSafe' app/data/tya-hr-source-safe-periods.js

      - name: Instalar Playwright
        run: |
          npm init -y >/dev/null 2>&1
          npm i -D playwright@1.47.2 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null

      - name: Iniciar app local
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 --directory app > .tmp-r10-server.log 2>&1 &
          echo $! > .tmp-r10-server.pid
          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4173/index.html >/dev/null; then exit 0; fi
            sleep 1
          done
          cat .tmp-r10-server.log || true
          exit 1

      - name: Ejecutar R10 visual source-safe
        id: smoke
        env:
          CXORBIA_BASE_URL: http://127.0.0.1:4173/index.html
          CXORBIA_EXPECT_TENANT_ID: tya
          CXORBIA_EXPECT_PROJECT_ID: cinepolis
          CXORBIA_EXPECT_PERIODS: '14'
          CXORBIA_EXPECT_VISITS: '616'
          CXORBIA_EXPECT_SHOPPERS: '213'
        shell: bash
        run: |
          set +e
          node tools/qa/tya-phase-a-source-safe-visual-smoke.mjs --out .tmp/phase-a-r10-post-v110
          rc=$?
          set -e
          test -f .tmp/phase-a-r10-post-v110/phase-a-source-safe-visual-smoke-report.json
          cat .tmp/phase-a-r10-post-v110/phase-a-source-safe-visual-smoke-report.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"

      - name: Documentar resultado R10
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const report=JSON.parse(fs.readFileSync('.tmp/phase-a-r10-post-v110/phase-a-source-safe-visual-smoke-report.json','utf8'));
          const blockers=report.blockers||[]; const warnings=report.warnings||[];
          const roles=(report.roles||[]).map(r=>`- ${r.id}: ${r.status}; source-safe=${r.sourceSafeMode}; project=${r.projectId}; routes=${r.routes?.length||0}; pageErrors=${r.pageErrorCount||0}; consoleErrors=${r.consoleErrorCount||0}`).join('\n')||'- none';
          const modules=(report.modules||[]).map(m=>`- ${m.role}/${m.token}: target=${m.target||'none'}; rendered=${Boolean(m.rendered)}; honestCopy=${!m.hasTechnicalPromise}`).join('\n')||'- none';
          const list=a=>a.length?a.map(x=>`- ${x}`).join('\n'):'- none';
          const result=`# PHASE A — R10 SOURCE-SAFE POST-V110\n\nFecha: 2026-07-12\n\n## Decisión\n\n\`${report.decision}\`\n\n## Fuente operacional comprobada\n\n- tenantId: \`${report.source?.tenantId||'n/a'}\`;\n- projectId: \`${report.source?.projectId||'n/a'}\`;\n- periodos: ${report.source?.counts?.periods||0};\n- visitas: ${report.source?.counts?.visits||0};\n- shoppers: ${report.source?.counts?.shoppers||0};\n- países: \`${JSON.stringify(report.source?.countryCounts||{})}\`;\n- monedas: \`${JSON.stringify(report.source?.currencyCounts||{})}\`;\n- junio con evidencia de ejecución: ${report.source?.june?.withExecutionEvidence||0}/${report.source?.june?.visits||0}.\n\n## Roles\n\n${roles}\n\n## Rutas verificadas\n\n${modules}\n\n## Blockers\n\n${list(blockers)}\n\n## Warnings\n\n${list(warnings)}\n\n## Estado seguro\n\nSource-safe solamente. Sin datos crudos, import real, writes, deploy, producción, Make/Gemini live ni pagos reales.\n`;
          fs.writeFileSync('app/docs/PHASE-A-SOURCE-SAFE-VISUAL-SMOKE-R10-POST-V110-RESULT-20260712.md',result,'utf8');
          fs.writeFileSync('app/docs/CAMBIOS-BACKEND-ADDENDUM-SMOKE-SOURCE-SAFE-R10-POST-V110-20260712.md',`# CAMBIOS BACKEND — R10 POST-V110\n\n- Ejecutado sobre la baseline V110 empalmada y source lock verificado.\n- Decisión: \`${report.decision}\`.\n- Fuente TyA source-safe: ${report.source?.counts?.periods||0} periodos, ${report.source?.counts?.visits||0} visitas y ${report.source?.counts?.shoppers||0} shoppers.\n- Roles probados: ${(report.roles||[]).length}; rutas: ${(report.modules||[]).length}; blockers: ${blockers.length}; warnings: ${warnings.length}.\n- Sin deploy, producción, imports, writes, proveedores ni pagos reales.\n`,'utf8');
          fs.writeFileSync('app/docs/ACADEMIA-IMPACT-SMOKE-SOURCE-SAFE-R10-POST-V110-20260712.md',`# ACADEMIA — IMPACTO R10 POST-V110\n\n- Academia se verificó dentro de los recorridos por rol definidos por el smoke.\n- La segregación por país del shopper permanece vinculada a la identidad real y fail-closed.\n- Decisión R10: \`${report.decision}\`.\n- Blockers relacionados con Academia: ${blockers.filter(x=>/academia|shopper/i.test(x)).length}.\n- Warnings relacionados con Academia: ${warnings.filter(x=>/academia|shopper/i.test(x)).length}.\n- No se publica contenido IA ni se activa Gemini; revisión humana permanece obligatoria.\n`,'utf8');
          fs.writeFileSync('app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R10-POST-V110-20260712.md',`# TRACKER PHASE A — R10 POST-V110\n\n- Empalme físico V110: COMPLETED_VERIFIED.\n- Source lock unión: VERIFIED.\n- R10 source-safe: ${report.decision}.\n- HR source-safe: ${report.source?.counts?.periods||0} periodos / ${report.source?.counts?.visits||0} visitas / ${report.source?.counts?.shoppers||0} shoppers.\n- Firebase DEV read-only: pendiente autorización específica.\n- Pagos/certificaciones: pendientes fuentes sanitizadas.\n- Producción: HOLD.\n`,'utf8');
          const marker='## R10 source-safe post-V110 — 2026-07-12';
          let cb=fs.readFileSync('CAMBIOS-BACKEND.md','utf8');
          if(!cb.includes(marker)) cb+=`\n${marker}\n\n- Decisión: \`${report.decision}\`.\n- V110 física y source lock unión verificados antes del smoke.\n- Fuente TyA source-safe: ${report.source?.counts?.periods||0} periodos, ${report.source?.counts?.visits||0} visitas, ${report.source?.counts?.shoppers||0} shoppers.\n- Sin deploy, producción, imports, writes, providers ni pagos reales.\n`;
          fs.writeFileSync('CAMBIOS-BACKEND.md',cb,'utf8');
          let rs=fs.readFileSync('RESUMEN-PARA-CLAUDE.md','utf8');
          if(!rs.includes(marker)) rs+=`\n${marker}\n\n- R10 ejecutado sobre V110 empalmada: \`${report.decision}\`.\n- No reabrir los P0 cerrados de Academia/país ni Finanzas fail-closed.\n- ${blockers.length?'Los blockers quedan documentados en el resultado R10; no se genera paquete amplio hasta clasificarlos.':'No surgió un nuevo paquete crítico para Claude.'}\n`;
          fs.writeFileSync('RESUMEN-PARA-CLAUDE.md',rs,'utf8');
          if(blockers.length){
            let pp=fs.readFileSync('PENDIENTES-PROTOTIPO.md','utf8');
            if(!pp.includes(marker)) pp+=`\n${marker}\n\n${blockers.map(x=>`- ${x}`).join('\n')}\n`;
            fs.writeFileSync('PENDIENTES-PROTOTIPO.md',pp,'utf8');
          }
          NODE

      - name: Restaurar payload temporal y refrescar source lock unión
        shell: bash
        run: |
          set -euo pipefail
          git restore app/data/tya-hr-source-safe-periods.js
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const root=path.resolve('app');
          const manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json';
          const verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]);
          const rels=[];function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          const report=JSON.parse(fs.readFileSync('.tmp/phase-a-r10-post-v110/phase-a-source-safe-visual-smoke-report.json','utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r10={decision:report.decision,report:'docs/PHASE-A-SOURCE-SAFE-VISUAL-SMOKE-R10-POST-V110-RESULT-20260712.md',blockers:(report.blockers||[]).length,warnings:(report.warnings||[]).length};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          const lock=`/* CXOrbia · Source lock unión V110 empalme R1 · R10\n   No implica deploy, producción, importación ni providers activos. */\nvar CX_SOURCE_LOCK={\n  manifestFile:'${manifestRel}',\n  aggregateSha256:'${aggregateSha256}',\n  fileCount:${files.length},\n  runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',\n  r10Decision:'${report.decision}',\n  generatedAt:'${M.generatedAt.slice(0,10)}',\n  sourceZipSha256:'${M.sourceZipSha256}',\n  note:'Baseline V110 empalmada; R10 source-safe documentado; backend y source-safe preservados.'\n};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`;
          fs.writeFileSync(path.join(root,'core','build-lock.js'),lock,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Subir evidencia sanitizada R10
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-r10-post-v110-source-safe
          path: .tmp/phase-a-r10-post-v110
          if-no-files-found: error
          retention-days: 14

      - name: Commit resultado R10 y limpiar runner temporal
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r10-post-v110-source-safe.yml
          git rm -rf tools/qa/r10-post-v110
          git rm -f tools/empalme/v110-final-last-run.txt || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md .github/workflows tools/qa tools/empalme || true
          git commit -m "test(phase-a): document R10 source-safe post-V110"
          git push origin HEAD:docs-tya-v6-v71-audit

      - name: Aplicar decisión del smoke
        if: steps.smoke.outputs.rc != '0'
        run: exit 2
