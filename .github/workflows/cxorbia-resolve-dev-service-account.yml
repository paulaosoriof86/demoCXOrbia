name: CXOrbia Resolve DEV Service Account Identity

on:
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - '.github/workflows/cxorbia-resolve-dev-service-account.yml'

permissions:
  contents: read

jobs:
  resolve-identity:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve non-secret service account identity
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const value=JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT_JSON || '{}');
          if(value.type!=='service_account' || !value.client_email) throw new Error('Firebase DEV service account secret unavailable.');
          if(value.project_id!=='cxorbia-backend-dev') throw new Error('Unexpected Firebase project.');
          console.log('CXORBIA_DEV_SERVICE_ACCOUNT_EMAIL=' + value.client_email);
          NODE
