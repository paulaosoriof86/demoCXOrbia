name: CXOrbia V156 source discovery persisted

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/v156-atomic-recovery-pr-executor.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  discover-v156-source:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout complete repository history
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Discover exact V156 source and persist result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ROOT=.tmp/v156-source-discovery-persisted
          mkdir -p "$ROOT/artifacts"
          exec > >(tee "$ROOT/run.log") 2>&1

          git fetch --all --tags --prune
          git branch -a > "$ROOT/branches.txt"
          git log --all --date=iso --pretty='%H %ad %d %s' --regexp-ignore-case \
            --grep='V156\|finalization\|promote.*156' > "$ROOT/commits.txt" || true
          git rev-list --all --objects > "$ROOT/all-objects.txt"
          grep -Ei 'v156|manifest-v156|prototype development request|finalization' \
            "$ROOT/all-objects.txt" > "$ROOT/matching-objects.txt" || true

          gh api --paginate "repos/${GITHUB_REPOSITORY}/actions/artifacts?per_page=100" \
            --jq '.artifacts[] | [.id,.workflow_run.id,.name,.size_in_bytes,.created_at,.expired] | @tsv' \
            > "$ROOT/all-artifacts.tsv"
          awk -F '\t' 'BEGIN{IGNORECASE=1} $3 ~ /(v156|final|candidate|prototype|export|source|baseline)/ && $6=="false" {print}' \
            "$ROOT/all-artifacts.tsv" > "$ROOT/matching-artifacts.tsv" || true

          while IFS=$'\t' read -r id run_id name size created expired; do
            test -n "${id:-}" || continue
            safe=$(printf '%s' "$name" | tr -cs 'A-Za-z0-9._-' '_')
            out="$ROOT/artifacts/${id}-${safe}.zip"
            echo "Downloading artifact=$id run=$run_id name=$name size=$size"
            gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}/zip" > "$out" || { rm -f "$out"; continue; }
          done < "$ROOT/matching-artifacts.tsv"

          python3 <<'PY'
          from pathlib import Path
          import base64, gzip, hashlib, json, os, re, zipfile
          root=Path('.tmp/v156-source-discovery-persisted')
          expected_zip='8a8672b6403b0eccdd1406ffeaa1942546d100b3c99615549000fd519be65933'
          expected_patch='8bfb2a85e1c42d095f56fbac7367da54b2872503effb2a7af939aa8a471b9347'
          payload=Path('.cxorbia/v156-promotion.patch.gz.b64')
          result={
            'schemaVersion':'1.0.0',
            'generatedAt':os.environ.get('GITHUB_RUN_ID',''),
            'runId':os.environ.get('GITHUB_RUN_ID'),
            'headSha':os.environ.get('GITHUB_SHA'),
            'expectedV156ZipSha256':expected_zip,
            'expectedPatchSha256':expected_patch,
            'transportPayload':{},
            'matchingArtifacts':[],
            'exactSources':[],
            'gitObjectMatches':[],
            'decision':'HOLD_COMPLETE_V156_SOURCE_NOT_FOUND'
          }
          if payload.exists():
            raw=payload.read_bytes()
            p={'path':str(payload),'size':len(raw),'sha256':hashlib.sha256(raw).hexdigest(),'base64Valid':False,'gzipValid':False,'patchSha256':None}
            try:
              gz=base64.b64decode(raw,validate=True); p['base64Valid']=True
              try:
                patch=gzip.decompress(gz); p['gzipValid']=True; p['patchSha256']=hashlib.sha256(patch).hexdigest()
              except Exception as exc: p['gzipError']=str(exc)
            except Exception as exc: p['base64Error']=str(exc)
            result['transportPayload']=p
          objects=(root/'matching-objects.txt')
          if objects.exists(): result['gitObjectMatches']=[x for x in objects.read_text(errors='replace').splitlines() if x][:200]
          meta={}
          for line in (root/'matching-artifacts.tsv').read_text(errors='replace').splitlines() if (root/'matching-artifacts.tsv').exists() else []:
            parts=line.split('\t')
            if len(parts)>=6: meta[parts[0]]={'artifactId':int(parts[0]),'runId':int(parts[1]),'name':parts[2],'declaredSize':int(parts[3]),'createdAt':parts[4]}
          for archive in sorted((root/'artifacts').glob('*.zip')):
            aid=archive.name.split('-',1)[0]
            item=dict(meta.get(aid,{}))
            item.update({'downloadedPath':str(archive),'archiveSize':archive.stat().st_size,'archiveSha256':hashlib.sha256(archive.read_bytes()).hexdigest(),'members':[],'nestedArchives':[],'hasV156Manifest':False,'hasAppTree':False})
            try:
              with zipfile.ZipFile(archive) as z:
                names=z.namelist(); item['members']=names[:300]
                low=[n.lower() for n in names]
                item['hasV156Manifest']=any('manifest-v156' in n for n in low)
                item['hasAppTree']=any('/app/index.html' in '/'+n or n=='app/index.html' for n in names)
                for name in names:
                  if not name.lower().endswith('.zip'): continue
                  data=z.read(name); sha=hashlib.sha256(data).hexdigest()
                  nested={'name':name,'size':len(data),'sha256':sha}
                  item['nestedArchives'].append(nested)
                  if sha==expected_zip: result['exactSources'].append({'artifactId':item.get('artifactId'),'runId':item.get('runId'),'artifactName':item.get('name'),'member':name,'sha256':sha})
            except Exception as exc:
              item['zipError']=str(exc)
            if item['archiveSha256']==expected_zip:
              result['exactSources'].append({'artifactId':item.get('artifactId'),'runId':item.get('runId'),'artifactName':item.get('name'),'member':None,'sha256':item['archiveSha256']})
            result['matchingArtifacts'].append(item)
          if result['exactSources']:
            result['decision']='FOUND_EXACT_V156_SOURCE'
          elif any(x.get('hasV156Manifest') and x.get('hasAppTree') for x in result['matchingArtifacts']):
            result['decision']='FOUND_COMPLETE_V156_APP_TREE_ARTIFACT'
          out=Path('app/docs/V156-SOURCE-DISCOVERY-RESULT-20260716.json')
          out.write_text(json.dumps(result,indent=2,ensure_ascii=False)+'\n',encoding='utf-8')
          md=[
            '# V156 source discovery result','',
            f"Decision: `{result['decision']}`",'',
            f"Run: `{result['runId']}`",'',
            '## Transport payload','',
            f"- Size: {result['transportPayload'].get('size')}",
            f"- SHA-256: `{result['transportPayload'].get('sha256')}`",
            f"- Base64 valid: {result['transportPayload'].get('base64Valid')}",
            f"- Gzip valid: {result['transportPayload'].get('gzipValid')}",
            f"- Error: {result['transportPayload'].get('gzipError') or result['transportPayload'].get('base64Error')}",'',
            f"- Matching artifacts inspected: {len(result['matchingArtifacts'])}",
            f"- Exact sources found: {len(result['exactSources'])}",'',
            'No deploy, production, imports or writes were executed.'
          ]
          Path('app/docs/V156-SOURCE-DISCOVERY-RESULT-20260716.md').write_text('\n'.join(md)+'\n',encoding='utf-8')
          print(json.dumps({'decision':result['decision'],'runId':result['runId'],'payload':result['transportPayload'],'matchingArtifacts':len(result['matchingArtifacts']),'exactSources':result['exactSources']},indent=2))
          PY

          git config user.name 'CXOrbia Source Discovery Bot'
          git config user.email 'cxorbia-discovery@example.invalid'
          git add app/docs/V156-SOURCE-DISCOVERY-RESULT-20260716.json app/docs/V156-SOURCE-DISCOVERY-RESULT-20260716.md
          git commit -m 'docs: persist exact V156 source discovery result'
          git push origin HEAD:docs-tya-v6-v71-audit

      - name: Upload discovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v156-source-discovery-persisted
          path: .tmp/v156-source-discovery-persisted
          if-no-files-found: warn
          retention-days: 14
