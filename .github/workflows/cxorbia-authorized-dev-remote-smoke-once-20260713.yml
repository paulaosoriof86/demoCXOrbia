name: CXOrbia Authorized DEV Remote Smoke Once

# Read-only validation of the already deployed DEV Hosting build.
# No provider writes, imports, rules, Functions, deploy or production.
on:
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - '.github/authorized/cxorbia-dev-remote-smoke-20260713.txt'

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  CXORBIA_DEV_URL: https://cxorbia-backend-dev.web.app/index.html
  CXORBIA_EXPECT_TENANT_ID: tya
  CXORBIA_EXPECT_PROJECT_ID: cinepolis
  CXORBIA_EXPECT_PERIODS: '14'
  CXORBIA_EXPECT_VISITS: '616'
  CXORBIA_EXPECT_SHOPPERS: '213'

jobs:
  authorized-dev-remote-smoke:
    name: Authorized DEV remote smoke once
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify remote-smoke authorization marker
        run: |
          set -euo pipefail
          marker='.github/authorized/cxorbia-dev-remote-smoke-20260713.txt'
          test -f "$marker"
          grep -Fxq 'scope=read_only_remote_smoke' "$marker"
          grep -Fxq 'url=https://cxorbia-backend-dev.web.app/index.html' "$marker"
          grep -Fxq 'writes=false' "$marker"
          grep -Fxq 'production=false' "$marker"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npm install --no-save --ignore-scripts playwright@latest
          npx playwright install --with-deps chromium

      - name: Verify deployed build proof
        run: |
          set -euo pipefail
          mkdir -p .tmp/phase-a-dev-remote-smoke
          curl -fsSL 'https://cxorbia-backend-dev.web.app/cxorbia-dev-build-proof.json' \
            > .tmp/phase-a-dev-remote-smoke/deployed-build-proof.json
          node <<'NODE'
          const fs = require('fs');
          const proof = JSON.parse(fs.readFileSync('.tmp/phase-a-dev-remote-smoke/deployed-build-proof.json', 'utf8'));
          if (proof.environment !== 'dev') throw new Error('environment mismatch');
          if (proof.build !== 'tya-source-safe-r15f-r16d') throw new Error('build mismatch');
          if (proof.hostingOnly !== true || proof.firestoreWrites !== false || proof.authWrites !== false || proof.imports !== false || proof.rules !== false || proof.functions !== false || proof.production !== false) throw new Error('safety flags mismatch');
          console.log('Deployed DEV build proof verified.');
          NODE

      - name: Run source-safe remote visual smoke
        run: |
          set -euo pipefail
          node tools/qa/tya-phase-a-source-safe-visual-smoke.mjs \
            --base-url "$CXORBIA_DEV_URL" \
            --out .tmp/phase-a-dev-remote-smoke/report

      - name: Upload remote-smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-a-dev-remote-smoke-report
          path: .tmp/phase-a-dev-remote-smoke
          if-no-files-found: error
          retention-days: 14
