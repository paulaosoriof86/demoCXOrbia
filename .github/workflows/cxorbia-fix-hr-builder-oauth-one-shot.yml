name: CXOrbia Fix HR Builder OAuth One-Shot

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-fix-hr-builder-oauth-one-shot.yml'

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  fix-and-self-remove:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout active branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Restore exact OAuth grant type and preserve HR row filter
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          p = Path('tools/hr-source/tya-build-live-hr-source-safe-static.mjs')
          text = p.read_text(encoding='utf-8')
          bad = "  const body = new URLSearchParams({ grant_type: 'urn:ietf:params:oauth-type:jwt-bearer', assertion: jwt });\n  body.set('grant_type', 'urn:ietf:params:oauth:grant-type:jwt-bearer');"
          good = "  const body = new URLSearchParams({ grant_type: 'urn:ietf:params:oauth:grant-type:jwt-bearer', assertion: jwt });"
          if bad not in text:
              raise SystemExit('Expected accidental OAuth sequence not found; refusing blind change.')
          text = text.replace(bad, good, 1)
          required = "return !!(cell(row, c.pais) && cell(row, c.shopping) && cell(row, c.idCinema));"
          if required not in text:
              raise SystemExit('Required ID Cinema row filter missing; refusing commit.')
          p.write_text(text, encoding='utf-8', newline='\n')
          PY
          node --check tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          git rm .github/workflows/cxorbia-fix-hr-builder-oauth-one-shot.yml

      - name: Commit exact correction
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          git commit -m 'fix(hr-source): restaura OAuth exacto y conserva filtro ID Cinema'
          git push origin HEAD:docs-tya-v6-v71-audit
