name: CXOrbia R18E Observe Hosting DEV Once

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - 'backend/config/phase-a-r18e-observe-once.source-safe.json'
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - '.github/workflows/cxorbia-r18e-observe-hosting-dev-once.yml'
      - 'backend/config/phase-a-r18e-observe-once.source-safe.json'

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  CXORBIA_DEV_ROOT_URL: https://cxorbia-backend-dev.web.app
  CXORBIA_R18E_BUILD_LABEL: v131-r18d-source-safe-20260715-r18e
  CXORBIA_R18E_AGGREGATE: 6e833331f5aa9ba9458ef0724756e72747352add3f8c6cc1fa327c96fadec348
  CXORBIA_R18E_OBSERVER_MARKER: backend/config/phase-a-r18e-observe-once.source-safe.json
  CXORBIA_R18E_RESULT_FILE: app/docs/PHASE-A-R18E-HOSTING-DEV-OBSERVED-RESULT.source-safe.json

jobs:
  observe-remote-deploy:
    name: Observe exact remote proof and run remote R18D smoke
    if: ${{ (github.event_name == 'push' && github.event.head_commit.message == 'ops(r18e): observe authorized Hosting DEV deploy once') || (github.event_name == 'pull_request' && github.event.pull_request.head.ref == 'docs-tya-v6-v71-audit') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate observer marker
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const marker = JSON.parse(fs.readFileSync(process.env.CXORBIA_R18E_OBSERVER_MARKER, 'utf8'));
          if (marker.status !== 'OBSERVE_ONCE') throw new Error('Observer marker status mismatch.');
          if (marker.authorizationId !== 'R18E_HOSTING_DEV_ONCE_20260715') throw new Error('Observer authorization id mismatch.');
          if (marker.expectedBuildLabel !== process.env.CXORBIA_R18E_BUILD_LABEL) throw new Error('Observer build label mismatch.');
          if (marker.expectedAggregateSha256 !== process.env.CXORBIA_R18E_AGGREGATE) throw new Error('Observer aggregate mismatch.');
          console.log(JSON.stringify({decision:'PASS_R18E_OBSERVER_MARKER'}, null, 2));
          NODE

      - name: Install Playwright
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm i -D playwright@1.47.2 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null

      - name: Wait for exact remote deploy proof
        id: proof
        run: |
          set -euo pipefail
          mkdir -p .tmp/r18e-observer
          found=0
          for attempt in $(seq 1 72); do
            cache="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl -fsSL "$CXORBIA_DEV_ROOT_URL/r18e-deploy-proof.json?cache=$cache" -o .tmp/r18e-observer/remote-proof.json; then
              if node <<'NODE'
          const fs = require('fs');
          const proof = JSON.parse(fs.readFileSync('.tmp/r18e-observer/remote-proof.json', 'utf8'));
          const ok = proof.environment === 'FIREBASE_HOSTING_DEV' &&
            proof.firebaseProjectId === 'cxorbia-backend-dev' &&
            proof.hostingTarget === 'cxorbia-dev' &&
            proof.buildLabel === process.env.CXORBIA_R18E_BUILD_LABEL &&
            proof.sourceLockAggregateSha256 === process.env.CXORBIA_R18E_AGGREGATE &&
            proof.baseline === 'V131' &&
            proof.decision === 'PASS_R18D_VISIBLE_OVERLAYS' &&
            proof.sourceSafe === true && proof.imported === false && proof.production === false &&
            proof.firestoreWrites === false && proof.authWrites === false && proof.storageWrites === false &&
            proof.hrWrites === false && proof.payments === false;
          if (!ok) process.exit(1);
          console.log(JSON.stringify({decision:'PASS_REMOTE_EXACT_BUILD_PROOF',proof}, null, 2));
          NODE
              then
                found=1
                break
              fi
            fi
            sleep 10
          done
          if [ "$found" -ne 1 ]; then
            echo 'proof_found=false' >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo 'proof_found=true' >> "$GITHUB_OUTPUT"

      - name: Run remote R18D smoke
        env:
          CXORBIA_BASE_URL: https://cxorbia-backend-dev.web.app/index.html?cxTyaPhaseA=1&r18d=visible
        run: |
          set -euo pipefail
          node tools/qa/tya-phase-a-visible-overlays-smoke-r18d.mjs \
            --out .tmp/r18e-observer/remote-smoke
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('.tmp/r18e-observer/remote-smoke/r18d-visible-overlays-smoke.json', 'utf8'));
          if (!String(report.decision || '').startsWith('PASS_') && !String(report.decision || '').startsWith('PASS_WITH_REVIEW_')) throw new Error(`Remote smoke decision is not PASS: ${report.decision}`);
          if (Array.isArray(report.blockers) && report.blockers.length) throw new Error(`Remote smoke blockers: ${report.blockers.join(', ')}`);
          console.log(JSON.stringify({decision:report.decision,blockers:report.blockers,warnings:report.warnings,counts:report.counts || report.validated || null}, null, 2));
          NODE

      - name: Write sanitized observed result
        if: success()
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const proof = JSON.parse(fs.readFileSync('.tmp/r18e-observer/remote-proof.json', 'utf8'));
          const smoke = JSON.parse(fs.readFileSync('.tmp/r18e-observer/remote-smoke/r18d-visible-overlays-smoke.json', 'utf8'));
          const result = {
            schemaVersion: '1.0.0',
            block: 'R18E',
            decision: 'PASS_HOSTING_DEV_V131_R18D_REMOTE_VERIFIED',
            observedAt: new Date().toISOString(),
            firebaseProjectId: 'cxorbia-backend-dev',
            hostingTarget: 'cxorbia-dev',
            url: 'https://cxorbia-backend-dev.web.app/index.html?cxTyaPhaseA=1&r18d=visible',
            buildLabel: proof.buildLabel,
            deployedCommit: proof.gitCommit,
            sourceLockAggregateSha256: proof.sourceLockAggregateSha256,
            baseline: proof.baseline,
            r18dDecision: smoke.decision,
            blockers: smoke.blockers || [],
            warnings: smoke.warnings || [],
            counts: smoke.counts || smoke.validated || null,
            sourceSafe: true,
            imported: false,
            production: false,
            firestoreWrites: false,
            authWrites: false,
            storageWrites: false,
            hrWrites: false,
            make: false,
            gemini: false,
            payments: false,
            authorizationId: 'R18E_HOSTING_DEV_ONCE_20260715'
          };
          fs.writeFileSync(process.env.CXORBIA_R18E_RESULT_FILE, JSON.stringify(result, null, 2) + '\n', 'utf8');
          console.log(JSON.stringify(result, null, 2));
          NODE

      - name: Commit sanitized result to integration branch
        if: success() && github.event_name == 'push'
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$CXORBIA_R18E_RESULT_FILE"
          git commit -m 'docs(r18e): record remotely verified Hosting DEV deployment'
          git push origin HEAD:docs-tya-v6-v71-audit

      - name: Upload observer evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-a-r18e-hosting-dev-observer-report
          path: .tmp/r18e-observer
          if-no-files-found: ignore
          retention-days: 14
