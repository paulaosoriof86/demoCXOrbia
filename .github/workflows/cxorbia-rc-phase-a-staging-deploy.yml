name: CXOrbia RC Phase A DEV Root Deploy

# Controlled DEV Hosting root only. No Firestore/Storage rules, Functions, imports or providers.
on:
  workflow_dispatch:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/cxorbia-rc-phase-a-staging-deploy.yml'
  pull_request:
    branches:
      - release/cxorbia-tya-rc-20260630
    paths:
      - '.github/workflows/cxorbia-rc-phase-a-staging-deploy.yml'

permissions:
  contents: read
  pull-requests: write
  checks: read

defaults:
  run:
    shell: bash

env:
  CXORBIA_DEV_ROOT_URL: https://cxorbia-backend-dev.web.app
  FIREBASE_PROJECT_ID: cxorbia-backend-dev
  FIREBASE_HOSTING_TARGET: cxorbia-dev
  CXORBIA_DEV_BUILD_LABEL: tya-source-safe-preview-20260709

jobs:
  dev-root-deploy:
    name: RC Phase A DEV root deploy hosting only
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Predeploy gate
        run: |
          node tools/release/tya-rc-phase-a-predeploy-gate.mjs --out .tmp/rc-phase-a-dev-root-predeploy

      - name: Drift gate
        run: |
          node tools/release/tya-rc-phase-a-drift-gate.mjs \
            --validated d6abab620589abf9be26e0a3884f92c4b342fb9b \
            --out .tmp/rc-phase-a-dev-root-drift

      - name: Secret availability and JSON sanity check
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
        run: |
          set -euo pipefail
          mkdir -p .tmp/rc-phase-a-dev-root-deploy
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "status=blocked_missing_secret" | tee .tmp/rc-phase-a-dev-root-deploy/deploy-status.txt
            echo "url=$CXORBIA_DEV_ROOT_URL" | tee -a .tmp/rc-phase-a-dev-root-deploy/deploy-status.txt
            echo "Missing FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV secret."
            echo "Deployment was intentionally blocked before any Firebase call."
            exit 1
          fi
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > .tmp/rc-phase-a-dev-root-deploy/firebase-service-account.json
          node <<'NODE'
          const fs = require('fs');
          const path = '.tmp/rc-phase-a-dev-root-deploy/firebase-service-account.json';
          const out = '.tmp/rc-phase-a-dev-root-deploy/credential-sanity.txt';
          let parsed;
          try {
            parsed = JSON.parse(fs.readFileSync(path, 'utf8'));
          } catch (error) {
            fs.writeFileSync(out, 'status=invalid_json\n');
            console.error('Firebase service account secret is not valid JSON.');
            process.exit(1);
          }
          const projectId = parsed.project_id || '';
          const clientEmail = parsed.client_email || '';
          const type = parsed.type || '';
          const emailDomain = clientEmail.includes('@') ? clientEmail.replace(/^[^@]+/, '***') : 'missing';
          const lines = [
            `status=secret_present`,
            `type=${type}`,
            `project_id=${projectId}`,
            `client_email_domain=${emailDomain}`
          ];
          fs.writeFileSync(out, lines.join('\n') + '\n');
          if (type !== 'service_account') {
            console.error('Firebase secret JSON is not a service_account.');
            process.exit(1);
          }
          if (projectId !== 'cxorbia-backend-dev') {
            console.error(`Firebase secret project_id mismatch. Expected cxorbia-backend-dev, got ${projectId || 'missing'}.`);
            process.exit(1);
          }
          if (!clientEmail.endsWith('@cxorbia-backend-dev.iam.gserviceaccount.com')) {
            console.error('Firebase secret client_email does not belong to cxorbia-backend-dev service account domain.');
            process.exit(1);
          }
          console.log('Firebase service account JSON sanity check passed.');
          NODE
          echo "status=secret_present" | tee .tmp/rc-phase-a-dev-root-deploy/deploy-status.txt
          echo "url=$CXORBIA_DEV_ROOT_URL" | tee -a .tmp/rc-phase-a-dev-root-deploy/deploy-status.txt
          echo "Firebase service account secret is present and project-scoped sanity checks passed."

      - name: Firebase CLI access check
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.tmp/rc-phase-a-dev-root-deploy/firebase-service-account.json
        run: |
          set -euo pipefail
          npx --yes firebase-tools@latest --version | tee .tmp/rc-phase-a-dev-root-deploy/firebase-tools-version.txt
          npx --yes firebase-tools@latest hosting:sites:list \
            --project "$FIREBASE_PROJECT_ID" \
            --json \
            > .tmp/rc-phase-a-dev-root-deploy/hosting-sites.json
          node <<'NODE'
          const fs = require('fs');
          const payload = JSON.parse(fs.readFileSync('.tmp/rc-phase-a-dev-root-deploy/hosting-sites.json', 'utf8'));
          const text = JSON.stringify(payload);
          if (!text.includes('cxorbia-backend-dev')) {
            console.error('Hosting sites list did not include expected DEV site/project marker.');
            process.exit(1);
          }
          console.log('Firebase Hosting access check passed.');
          NODE

      - name: Deploy Hosting DEV root
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.tmp/rc-phase-a-dev-root-deploy/firebase-service-account.json
        run: |
          set -euo pipefail
          npx --yes firebase-tools@latest deploy \
            --only "hosting:$FIREBASE_HOSTING_TARGET" \
            --project "$FIREBASE_PROJECT_ID" \
            --non-interactive \
            --json \
            2>&1 | tee .tmp/rc-phase-a-dev-root-deploy/firebase-deploy-output.txt

      - name: Verify DEV root URL
        run: |
          set -euo pipefail
          mkdir -p .tmp/rc-phase-a-dev-root-deploy
          echo "status=deploy_step_completed" > .tmp/rc-phase-a-dev-root-deploy/dev-root-url.txt
          echo "url=$CXORBIA_DEV_ROOT_URL" >> .tmp/rc-phase-a-dev-root-deploy/dev-root-url.txt
          curl -fsSIL "$CXORBIA_DEV_ROOT_URL" | tee .tmp/rc-phase-a-dev-root-deploy/dev-root-headers.txt
          curl -fsSL "$CXORBIA_DEV_ROOT_URL" | tee .tmp/rc-phase-a-dev-root-deploy/dev-root-index.html | grep -E "CXOrbia|Plataforma Operativa de Campo" >/dev/null
          echo "verification=ok" >> .tmp/rc-phase-a-dev-root-deploy/dev-root-url.txt

      - name: Upload DEV root deploy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rc-phase-a-dev-root-deploy-report
          path: .tmp
          if-no-files-found: ignore
          retention-days: 14
