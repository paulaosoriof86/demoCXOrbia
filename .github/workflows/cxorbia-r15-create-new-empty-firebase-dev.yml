name: CXOrbia Phase A R15 Create New Empty Firebase DEV

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/release/READY-FIREBASE-NEW-EMPTY-R15

permissions:
  contents: write

jobs:
  create-and-verify-new-empty-firebase-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CXORBIA_NEW_PROJECT_ID: cxorbia-tya-dev-260713-r15a
      CXORBIA_NEW_PROJECT_NAME: CXOrbia TyA DEV Clean R15A
      CXORBIA_SOURCE_CREDENTIAL_PROJECT_ID: cxorbia-backend-dev

    steps:
      - name: Checkout current Phase A branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate explicit authorization marker
        shell: bash
        run: |
          set -euo pipefail
          grep -Fxq 'authorization=CREATE_NEW_EMPTY_FIREBASE_DEV' tools/release/READY-FIREBASE-NEW-EMPTY-R15
          grep -Fxq 'imports=false' tools/release/READY-FIREBASE-NEW-EMPTY-R15
          grep -Fxq 'deploy=false' tools/release/READY-FIREBASE-NEW-EMPTY-R15
          grep -Fxq 'production=false' tools/release/READY-FIREBASE-NEW-EMPTY-R15

      - name: Prepare temporary creator credential
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
        shell: bash
        run: |
          set -euo pipefail
          private_dir='.tmp/firebase-new-empty-r15-private'
          mkdir -p "$private_dir"
          credential_path="$private_dir/credentials.json"
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo 'Blocked: missing FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV.'
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$credential_path"
          chmod 600 "$credential_path"
          node <<'NODE'
          const fs=require('fs');
          const p='.tmp/firebase-new-empty-r15-private/credentials.json';
          const c=JSON.parse(fs.readFileSync(p,'utf8'));
          if(c.type!=='service_account') throw new Error('credential type mismatch');
          if(c.project_id!=='cxorbia-backend-dev') throw new Error('credential project mismatch');
          if(!String(c.client_email||'').endsWith('@cxorbia-backend-dev.iam.gserviceaccount.com')) throw new Error('credential domain mismatch');
          console.log('Temporary creator credential validated without outputting identifiers.');
          NODE

      - name: Install provider client dependency
        shell: bash
        run: |
          set -euo pipefail
          npm install --no-save --ignore-scripts google-auth-library@9

      - name: Create and verify the new empty Firebase DEV project
        env:
          CXORBIA_CONFIRM: CREATE_NEW_EMPTY_FIREBASE_DEV
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.tmp/firebase-new-empty-r15-private/credentials.json
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/release/tya-create-new-empty-firebase-dev-r15.mjs
          node tools/release/tya-create-new-empty-firebase-dev-r15.mjs \
            --out .tmp/firebase-new-empty-r15-report
          test -s .tmp/firebase-new-empty-r15-report/firebase-new-empty-r15-report.source-safe.json

      - name: Validate sanitized report and authorized scope
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const p='.tmp/firebase-new-empty-r15-report/firebase-new-empty-r15-report.source-safe.json';
          const r=JSON.parse(fs.readFileSync(p,'utf8'));
          const allowed=new Set([
            'NEW_EMPTY_FIREBASE_DEV_VERIFIED',
            'NEW_FIREBASE_DEV_CREATED_VERIFICATION_INCONCLUSIVE_REVIEW_REQUIRED',
            'PROJECT_CREATED_FIREBASE_ADDITION_BLOCKED_REVIEW_REQUIRED',
            'BLOCKED_PROJECT_CREATION_PERMISSION_OR_POLICY',
            'BLOCKED_TARGET_PROJECT_ALREADY_EXISTS_DO_NOT_REUSE',
            'BLOCKED_TARGET_PROJECT_EXISTENCE_UNVERIFIED',
            'BLOCKED_SOURCE_CREDENTIAL_MISMATCH',
            'UNEXPECTED_RUNNER_FAILURE_REVIEW_REQUIRED'
          ]);
          if(!allowed.has(r.decision)) throw new Error(`unexpected decision ${r.decision}`);
          if(r.target?.projectId!=='cxorbia-tya-dev-260713-r15a') throw new Error('target project drift');
          const s=r.safeState||{};
          for(const key of ['projectDeletionAttempted','billingLinkAttempted','authWrites','claimsWrites','firestoreWrites','storageWrites','rulesDeploy','functionsDeployOrInvocation','hostingDeploy','deploy','imports','dataMigration','production','piiOrCredentialsOutput','credentialPersisted']) {
            if(s[key]!==false) throw new Error(`unsafe state ${key}`);
          }
          console.log(JSON.stringify({decision:r.decision,target:r.target.projectId,summary:r.summary,safeState:r.safeState},null,2));
          NODE

      - name: Persist result, docs and future target config
        shell: bash
        run: |
          set -euo pipefail
          cp .tmp/firebase-new-empty-r15-report/firebase-new-empty-r15-report.source-safe.json backend/config/phase-a-firebase-dev-new-empty-r15.source-safe.json
          cp .tmp/firebase-new-empty-r15-report/firebase-new-empty-r15-report.source-safe.md app/docs/PHASE-A-FIREBASE-DEV-NEW-EMPTY-R15-RESULT-20260713.md
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-new-empty-r15.source-safe.json','utf8'));
          const ok=R.decision==='NEW_EMPTY_FIREBASE_DEV_VERIFIED';
          const project=R.target.projectId;
          const targetConfig={
            schemaVersion:'1.0.0',
            configId:'phase-a-firebase-dev-target-r15',
            generatedAt:new Date().toISOString(),
            target:{projectId:project,environment:'DEV',newProjectCreated:Boolean(R.summary.projectCreated),firebaseAdded:Boolean(R.summary.firebaseAdded),emptyBaselineVerified:Boolean(R.summary.emptyBaselineVerified)},
            sourceRun:{decision:R.decision,report:'backend/config/phase-a-firebase-dev-new-empty-r15.source-safe.json'},
            gates:{adapterConfigurationAllowed:ok,providerWriteMaterializationAllowed:false,authInitializationAllowed:false,firestoreInitializationAllowed:false,storageInitializationAllowed:false,importsAllowed:false,deployAllowed:false,productionAllowed:false},
            safeState:{sourceSafe:true,secretsIncluded:false,credentialIncluded:false,piiIncluded:false,imports:false,deploy:false,production:false}
          };
          fs.writeFileSync('backend/config/phase-a-firebase-dev-target-r15.source-safe.json',JSON.stringify(targetConfig,null,2)+'\n','utf8');
          const summary=R.summary||{};
          const checks=R.checks||{};
          const classification=ok?'READY_NEW_EMPTY_DEV_BASELINE':'BLOCKED_OR_REVIEW_REQUIRED';
          const docs={
            'app/docs/CAMBIOS-BACKEND-ADDENDUM-FIREBASE-NEW-EMPTY-R15-20260713.md':`# CAMBIOS BACKEND — R15 Firebase DEV nuevo y vacío\n\n## Clasificación obligatoria\n\n- Reusable CXOrbia: creación de baseline DEV nueva, verificación de ausencia previa y checks sanitizados antes de cualquier adapter o materialización.\n- Exclusivo cliente TyA: proyecto DEV objetivo \`${project}\` para la salida Phase A TyA.\n- Claude/prototipo: sin cambio frontend; no corresponde paquete Claude.\n- Academia: explicar separación DEV/producción y que proyecto vacío no equivale a backend operativo.\n- Sin impacto Claude inmediato: creación y verificación de infraestructura.\n\n## Resultado\n\n- Decisión: \`${R.decision}\`.\n- Clasificación: \`${classification}\`.\n- Ausencia previa verificada: ${Boolean(summary.targetAbsenceVerifiedBeforeCreate)}.\n- Proyecto creado: ${Boolean(summary.projectCreated)}.\n- Firebase agregado: ${Boolean(summary.firebaseAdded)}.\n- Proyecto activo: ${Boolean(summary.projectActive)}.\n- Baseline vacía verificada: ${Boolean(summary.emptyBaselineVerified)}.\n- Apps/Auth/Firestore/Storage/Hosting: ${JSON.stringify({apps:summary.appCount,authUsers:summary.authUserCount,firestoreDatabases:summary.firestoreDatabaseCount,storageBuckets:summary.storageBucketCount,hostingSites:summary.hostingSiteCount})}.\n- Sin billing, Auth users, Firestore docs, Storage objects, imports, deploy ni producción.\n`,
            'app/docs/ACADEMIA-IMPACT-FIREBASE-NEW-EMPTY-R15-20260713.md':`# ACADEMIA — IMPACTO R15 Firebase DEV\n\n- DEV nuevo y vacío es un entorno técnico, no producción.\n- Proyecto Firebase creado no significa que Auth, Firestore, Storage, Make, Gemini, pagos o sincronización estén activos.\n- Cada activación posterior requiere gate, autorización, rollback y auditoría.\n- No mostrar identificadores de credenciales ni datos de proveedor en manuales/cursos.\n`,
            'app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R15-FIREBASE-NEW-EMPTY-20260713.md':`# TRACKER PHASE A — R15 Firebase DEV nuevo y vacío\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11D shopper 210/213: REVIEW_QUEUE.\n- R14C finanzas reales: PASS_WITH_REVIEW, 196/247 enlaces exactos.\n- R15 Firebase DEV: \`${R.decision}\`.\n- Proyecto objetivo: \`${project}\`.\n- Baseline vacía verificada: ${Boolean(summary.emptyBaselineVerified)}.\n- Adapter CX.data: ${ok?'READY_FOR_CONFIGURATION_ONLY':'HOLD'}.\n- Inicialización Auth/Firestore/Storage: HOLD.\n- Materialización/import/deploy/producción: HOLD.\n\nSiguiente bloque exacto: ${ok?'configurar el adapter CX.data en modo disabled/DEV y preparar inicialización mínima de Auth/Firestore/Storage bajo nueva autorización, sin importar datos':'resolver el bloqueo documentado de creación/verificación sin reutilizar cxorbia-backend-dev'}.\n`
          };
          for(const [p,c] of Object.entries(docs)) fs.writeFileSync(p,c,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R15 Firebase DEV nuevo y vacío — 2026-07-13\n\n- Autorización explícita registrada.\n- Proyecto objetivo: \`${project}\`.\n- Decisión: \`${R.decision}\`.\n- Proyecto creado: ${Boolean(summary.projectCreated)}; Firebase agregado: ${Boolean(summary.firebaseAdded)}; baseline vacía verificada: ${Boolean(summary.emptyBaselineVerified)}.\n- Sin billing, import, deploy, producción ni datos TyA materializados.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R15 Firebase DEV nuevo y vacío — 2026-07-13\n\n- Backend/infraestructura: \`${R.decision}\` sobre \`${project}\`.\n- Sin cambio frontend ni P0 Claude.\n- No afirmar que Auth, Firestore, Storage, sync, pagos o producción estén activos.\n`,'utf8');
          fs.appendFileSync('PENDIENTES-PROTOTIPO.md',`\n\n## R15 Firebase DEV — impacto Claude\n\n- Sin P0 nuevo.\n- Mantener copy honesto: un entorno DEV creado/vacío no implica backend operativo ni producción.\n`,'utf8');

          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}
          walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;
          M.r15={decision:R.decision,projectId:project,projectCreated:Boolean(summary.projectCreated),firebaseAdded:Boolean(summary.firebaseAdded),emptyBaselineVerified:Boolean(summary.emptyBaselineVerified),report:'docs/PHASE-A-FIREBASE-DEV-NEW-EMPTY-R15-RESULT-20260713.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R15 Firebase DEV nuevo */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11dDecision:'${M.r11d?.decision}',r13Decision:'${M.r13?.decision}',r14cDecision:'${M.r14c?.decision}',r15Decision:'${R.decision}',r15ProjectId:'${project}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; R15 registra Firebase DEV nuevo/vacío sin import, deploy ni producción.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Cleanup temporary credential
        if: always()
        shell: bash
        run: |
          rm -f .tmp/firebase-new-empty-r15-private/credentials.json
          rmdir .tmp/firebase-new-empty-r15-private 2>/dev/null || true

      - name: Upload sanitized R15 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-r15-firebase-new-empty-source-safe
          path: .tmp/firebase-new-empty-r15-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit sanitized result and remove one-time trigger
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r15-create-new-empty-firebase-dev.yml
          git rm -f tools/release/READY-FIREBASE-NEW-EMPTY-R15
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app backend/config tools/release CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md .github/workflows
          git commit -m 'feat(phase-a): record authorized new empty Firebase DEV R15'
          git push origin HEAD:docs-tya-v6-v71-audit
