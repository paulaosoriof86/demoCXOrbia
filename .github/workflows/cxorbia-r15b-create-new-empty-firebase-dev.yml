name: CXOrbia Phase A R15B Create New Empty Firebase DEV

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/release/READY-FIREBASE-NEW-EMPTY-R15B

permissions:
  contents: write

jobs:
  create-and-verify-new-empty-firebase-dev-r15b:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CXORBIA_NEW_PROJECT_ID: cxorbia-tya-dev-260713-r15a
      CXORBIA_NEW_PROJECT_NAME: CXOrbia TyA DEV Clean R15A
      CXORBIA_SOURCE_CREDENTIAL_PROJECT_ID: cxorbia-backend-dev

    steps:
      - name: Checkout current Phase A branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate authorization marker
        shell: bash
        run: |
          set -euo pipefail
          grep -Fxq 'authorization=CREATE_NEW_EMPTY_FIREBASE_DEV' tools/release/READY-FIREBASE-NEW-EMPTY-R15B
          grep -Fxq 'atomic_create_guard=true' tools/release/READY-FIREBASE-NEW-EMPTY-R15B
          grep -Fxq 'imports=false' tools/release/READY-FIREBASE-NEW-EMPTY-R15B
          grep -Fxq 'deploy=false' tools/release/READY-FIREBASE-NEW-EMPTY-R15B
          grep -Fxq 'production=false' tools/release/READY-FIREBASE-NEW-EMPTY-R15B

      - name: Prepare temporary creator credential
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .tmp/firebase-new-empty-r15b-private
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo 'Blocked: missing FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV.'
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > .tmp/firebase-new-empty-r15b-private/credentials.json
          chmod 600 .tmp/firebase-new-empty-r15b-private/credentials.json
          node <<'NODE'
          const fs=require('fs');
          const c=JSON.parse(fs.readFileSync('.tmp/firebase-new-empty-r15b-private/credentials.json','utf8'));
          if(c.type!=='service_account') throw new Error('credential type mismatch');
          if(c.project_id!=='cxorbia-backend-dev') throw new Error('credential project mismatch');
          if(!String(c.client_email||'').endsWith('@cxorbia-backend-dev.iam.gserviceaccount.com')) throw new Error('credential domain mismatch');
          console.log('Temporary credential validated without identifier output.');
          NODE

      - name: Install provider client dependency
        shell: bash
        run: npm install --no-save --ignore-scripts google-auth-library@9

      - name: Run atomic-create guarded creation and verification
        env:
          CXORBIA_CONFIRM: CREATE_NEW_EMPTY_FIREBASE_DEV
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.tmp/firebase-new-empty-r15b-private/credentials.json
        shell: bash
        run: |
          set -euo pipefail
          node --check tools/release/tya-create-new-empty-firebase-dev-r15b.mjs
          node tools/release/tya-create-new-empty-firebase-dev-r15b.mjs --out .tmp/firebase-new-empty-r15b-report
          test -s .tmp/firebase-new-empty-r15b-report/firebase-new-empty-r15b-report.source-safe.json

      - name: Validate result and safe scope
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const r=JSON.parse(fs.readFileSync('.tmp/firebase-new-empty-r15b-report/firebase-new-empty-r15b-report.source-safe.json','utf8'));
          const allowed=new Set([
            'NEW_EMPTY_FIREBASE_DEV_VERIFIED',
            'NEW_FIREBASE_DEV_CREATED_VERIFICATION_INCONCLUSIVE_REVIEW_REQUIRED',
            'PROJECT_CREATED_FIREBASE_ADDITION_BLOCKED_REVIEW_REQUIRED',
            'BLOCKED_PROJECT_CREATION_PERMISSION_OR_POLICY',
            'BLOCKED_TARGET_PROJECT_ALREADY_EXISTS_DO_NOT_REUSE',
            'BLOCKED_TARGET_PROJECT_EXISTENCE_UNVERIFIED',
            'BLOCKED_SOURCE_CREDENTIAL_MISMATCH',
            'UNEXPECTED_RUNNER_FAILURE_REVIEW_REQUIRED'
          ]);
          if(!allowed.has(r.decision)) throw new Error(`unexpected decision ${r.decision}`);
          if(r.target?.projectId!=='cxorbia-tya-dev-260713-r15a') throw new Error('target drift');
          const s=r.safeState||{};
          for(const key of ['projectDeletionAttempted','billingLinkAttempted','authWrites','claimsWrites','firestoreWrites','storageWrites','rulesDeploy','functionsDeployOrInvocation','hostingDeploy','deploy','imports','dataMigration','production','piiOrCredentialsOutput','credentialPersisted']) if(s[key]!==false) throw new Error(`unsafe ${key}`);
          console.log(JSON.stringify({decision:r.decision,summary:r.summary,safeState:r.safeState},null,2));
          NODE

      - name: Persist sanitized R15B result and documentation
        shell: bash
        run: |
          set -euo pipefail
          cp .tmp/firebase-new-empty-r15b-report/firebase-new-empty-r15b-report.source-safe.json backend/config/phase-a-firebase-dev-new-empty-r15b.source-safe.json
          cp .tmp/firebase-new-empty-r15b-report/firebase-new-empty-r15b-report.source-safe.md app/docs/PHASE-A-FIREBASE-DEV-NEW-EMPTY-R15B-RESULT-20260713.md
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-new-empty-r15b.source-safe.json','utf8'));
          const s=R.summary||{},ok=R.decision==='NEW_EMPTY_FIREBASE_DEV_VERIFIED',project=R.target.projectId;
          fs.writeFileSync('backend/config/phase-a-firebase-dev-target-r15b.source-safe.json',JSON.stringify({
            schemaVersion:'1.0.0',configId:'phase-a-firebase-dev-target-r15b',generatedAt:new Date().toISOString(),
            target:{projectId:project,environment:'DEV',atomicCreateConfirmedNew:Boolean(s.atomicCreateConfirmedNew),projectCreated:Boolean(s.projectCreated),firebaseAdded:Boolean(s.firebaseAdded),emptyBaselineVerified:Boolean(s.emptyBaselineVerified)},
            sourceRun:{decision:R.decision,report:'backend/config/phase-a-firebase-dev-new-empty-r15b.source-safe.json'},
            gates:{adapterConfigurationAllowed:ok,providerWriteMaterializationAllowed:false,authInitializationAllowed:false,firestoreInitializationAllowed:false,storageInitializationAllowed:false,importsAllowed:false,deployAllowed:false,productionAllowed:false},
            safeState:{sourceSafe:true,secretsIncluded:false,credentialIncluded:false,piiIncluded:false,imports:false,deploy:false,production:false}
          },null,2)+'\n','utf8');
          const docs={
            'app/docs/CAMBIOS-BACKEND-ADDENDUM-FIREBASE-NEW-EMPTY-R15B-20260713.md':`# CAMBIOS BACKEND — R15B Firebase DEV nuevo y vacío\n\n## Clasificación\n\n- Reusable CXOrbia: guard atómico de creación para no reutilizar proyectos existentes cuando el lookup devuelve 403.\n- Exclusivo cliente TyA: proyecto DEV \`${project}\`.\n- Claude/prototipo: sin cambio frontend ni paquete Claude.\n- Academia: distinguir proyecto creado, Firebase agregado, servicios inicializados y producción.\n- Sin impacto Claude inmediato: infraestructura backend.\n\n## Resultado\n\n- Decisión: \`${R.decision}\`.\n- Lookup 403: ${Boolean(s.lookupPermissionDenied)}.\n- Guard atómico usado: ${Boolean(s.atomicCreateGuardUsed)}.\n- Creación atómica confirmó proyecto nuevo: ${Boolean(s.atomicCreateConfirmedNew)}.\n- Proyecto creado: ${Boolean(s.projectCreated)}.\n- Firebase agregado: ${Boolean(s.firebaseAdded)}.\n- Baseline vacía verificada: ${Boolean(s.emptyBaselineVerified)}.\n- Apps/Auth/Firestore/Storage/Hosting: ${JSON.stringify({apps:s.appCount,authUsers:s.authUserCount,firestoreDatabases:s.firestoreDatabaseCount,storageBuckets:s.storageBucketCount,hostingSites:s.hostingSiteCount})}.\n- Sin billing, import, deploy ni producción.\n`,
            'app/docs/ACADEMIA-IMPACT-FIREBASE-NEW-EMPTY-R15B-20260713.md':`# ACADEMIA — IMPACTO R15B\n\n- Un lookup 403 no autoriza reutilizar un proyecto existente.\n- La creación atómica solo confirma un proyecto nuevo cuando el proveedor acepta la creación.\n- Proyecto Firebase vacío no significa Auth, Firestore, Storage, Make, Gemini, pagos o producción activos.\n- Cada inicialización posterior requiere autorización, gate, rollback y auditoría.\n`,
            'app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R15B-FIREBASE-NEW-EMPTY-20260713.md':`# TRACKER PHASE A — R15B Firebase DEV nuevo y vacío\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11D shopper 210/213: REVIEW_QUEUE.\n- R14C finanzas reales: PASS_WITH_REVIEW, 196/247 enlaces exactos.\n- R15 inicial: BLOCKED_TARGET_PROJECT_EXISTENCE_UNVERIFIED.\n- R15B guard atómico: \`${R.decision}\`.\n- Proyecto objetivo: \`${project}\`.\n- Baseline vacía verificada: ${Boolean(s.emptyBaselineVerified)}.\n- Adapter CX.data: ${ok?'READY_FOR_CONFIGURATION_ONLY':'HOLD'}.\n- Auth/Firestore/Storage init: HOLD.\n- Materialización/import/deploy/producción: HOLD.\n\nSiguiente bloque: ${ok?'configurar adapter CX.data disabled/DEV y preparar inicialización mínima bajo autorización separada':'resolver el bloqueo de permisos/política sin reutilizar cxorbia-backend-dev'}.\n`
          };
          for(const [p,c] of Object.entries(docs))fs.writeFileSync(p,c,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R15B Firebase DEV nuevo y vacío — 2026-07-13\n\n- Decisión: \`${R.decision}\`.\n- Proyecto \`${project}\`; creación atómica nueva: ${Boolean(s.atomicCreateConfirmedNew)}; Firebase agregado: ${Boolean(s.firebaseAdded)}; baseline vacía: ${Boolean(s.emptyBaselineVerified)}.\n- Sin billing, import, deploy ni producción.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R15B Firebase DEV — 2026-07-13\n\n- Backend/infraestructura: \`${R.decision}\` sobre \`${project}\`.\n- Sin P0 frontend nuevo; no afirmar servicios activos ni producción.\n`,'utf8');
          fs.appendFileSync('PENDIENTES-PROTOTIPO.md',`\n\n## R15B Firebase DEV — impacto Claude\n\n- Sin P0 nuevo.\n- Mantener copy honesto: proyecto creado/vacío no equivale a backend operativo.\n`,'utf8');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}
          walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;
          M.r15b={decision:R.decision,projectId:project,atomicCreateConfirmedNew:Boolean(s.atomicCreateConfirmedNew),projectCreated:Boolean(s.projectCreated),firebaseAdded:Boolean(s.firebaseAdded),emptyBaselineVerified:Boolean(s.emptyBaselineVerified),report:'docs/PHASE-A-FIREBASE-DEV-NEW-EMPTY-R15B-RESULT-20260713.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R15B Firebase DEV */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11dDecision:'${M.r11d?.decision}',r14cDecision:'${M.r14c?.decision}',r15Decision:'${M.r15?.decision}',r15bDecision:'${R.decision}',r15bProjectId:'${project}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'R15B registra creación atómica/estado de Firebase DEV sin import, deploy ni producción.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Cleanup credential
        if: always()
        shell: bash
        run: |
          rm -f .tmp/firebase-new-empty-r15b-private/credentials.json
          rmdir .tmp/firebase-new-empty-r15b-private 2>/dev/null || true

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-r15b-firebase-new-empty-source-safe
          path: .tmp/firebase-new-empty-r15b-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit result and remove one-time trigger
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r15b-create-new-empty-firebase-dev.yml
          git rm -f tools/release/READY-FIREBASE-NEW-EMPTY-R15B
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app backend/config tools/release CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md .github/workflows
          git commit -m 'feat(phase-a): record atomic-create Firebase DEV retry R15B'
          git push origin HEAD:docs-tya-v6-v71-audit
