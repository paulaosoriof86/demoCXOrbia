name: CXOrbia Phase A R15G DEV Root Deploy

# Canonical Hosting DEV lane. The workflow is only an authorization and runner
# wrapper; all build, gates, deploy, propagation polling and remote verification
# live in tools/release/tya-r15g-dev-root-deploy.sh.
on:
  workflow_dispatch:
    inputs:
      confirm_dev_deploy:
        description: 'Type DEPLOY_DEV_ROOT_R15G only after explicit Paula authorization and atomic source-lock GO.'
        required: true
        default: 'HOLD'
        type: string
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - 'backend/config/phase-a-hosting-dev-execution-request-v1.json'

permissions:
  contents: read
  actions: read
  checks: read

concurrency:
  group: cxorbia-r15g-hosting-dev
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CXORBIA_DEV_ROOT_URL: https://cxorbia-backend-dev.web.app
  FIREBASE_PROJECT_ID: cxorbia-backend-dev
  FIREBASE_HOSTING_TARGET: cxorbia-dev
  CXORBIA_V159_BUILD_LABEL: v159-r18d-source-safe-20260717-dev
  CXORBIA_EXECUTION_REQUEST: backend/config/phase-a-hosting-dev-execution-request-v1.json
  CXORBIA_OUT_DIR: .tmp/r15g-dev-deploy

jobs:
  dev-root-deploy:
    name: V159 exact build · gates · Hosting DEV · remote smoke
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.confirm_dev_deploy == 'DEPLOY_DEV_ROOT_R15G') || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout active integration branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate canonical executor syntax
        run: |
          set -euo pipefail
          test -s tools/release/tya-r15g-dev-root-deploy.sh
          bash -n tools/release/tya-r15g-dev-root-deploy.sh

      - name: Execute fail-closed V159 Hosting DEV lane
        env:
          CXORBIA_EVENT_NAME: ${{ github.event_name }}
          CXORBIA_EVENT_BEFORE: ${{ github.event.before || '' }}
          CXORBIA_MANUAL_CONFIRM: ${{ inputs.confirm_dev_deploy || '' }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
        run: bash tools/release/tya-r15g-dev-root-deploy.sh

      - name: Cleanup temporary credential
        if: always()
        run: rm -f .tmp/r15g-dev-deploy/firebase-service-account.json

      - name: Upload sanitized DEV deploy evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-r15g-dev-root-deploy-evidence
          path: .tmp/r15g-dev-deploy
          if-no-files-found: error
          retention-days: 14
