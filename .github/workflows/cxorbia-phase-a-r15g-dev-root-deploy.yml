name: CXOrbia Phase A V161C R21 DEV Root Deploy — authorization consumed

on:
  workflow_dispatch:
    inputs:
      confirm_dev_deploy:
        description: 'Disabled until a new explicit Paula authorization is registered.'
        required: true
        default: 'HOLD'
        type: string

permissions:
  contents: read
  actions: read
  checks: read
  statuses: write

concurrency:
  group: cxorbia-r21-hosting-dev
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  CXORBIA_DEV_ROOT_URL: https://cxorbia-backend-dev.web.app
  FIREBASE_PROJECT_ID: cxorbia-backend-dev
  FIREBASE_HOSTING_TARGET: cxorbia-dev
  CXORBIA_RUNTIME_BUILD_LABEL: v161c-r21-source-safe-20260719-dev
  CXORBIA_EXECUTION_REQUEST: backend/config/phase-a-hosting-dev-execution-request-v1.json
  CXORBIA_OUT_DIR: .tmp/r21-dev-deploy

jobs:
  dev-root-deploy:
    name: HOLD · requires new explicit authorization
    if: ${{ false }}
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout active integration branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate one-time authorization and source lock
        env:
          CXORBIA_EVENT_NAME: ${{ github.event_name }}
          CXORBIA_EVENT_BEFORE: ${{ github.event.before || '' }}
        run: |
          set -euo pipefail
          test -s "$CXORBIA_EXECUTION_REQUEST"
          node tools/release/tya-r21-validate-dev-authorization.mjs "$CXORBIA_EXECUTION_REQUEST"
          node --check tools/release/tya-r21-write-build-proof.mjs
          node --check tools/release/tya-r21-verify-remote-proof.mjs
          bash -n tools/release/tya-r21-build-and-gates.sh

      - name: Install transient browser
        run: |
          set -euo pipefail
          npm install --no-save --ignore-scripts playwright@1.61.1
          npx playwright install --with-deps chromium

      - name: Build exact R21 runtime and run local gates
        run: |
          set -euo pipefail
          mkdir -p "$CXORBIA_OUT_DIR"
          python3 -m http.server 4173 --bind 127.0.0.1 --directory app > "$CXORBIA_OUT_DIR/local-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          export CXORBIA_BASE_URL='http://127.0.0.1:4173/index.html?cxTyaPhaseA=1&r18d=visible'
          bash tools/release/tya-r21-build-and-gates.sh

      - name: Deploy Hosting DEV only
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
          projectId: cxorbia-backend-dev
          channelId: live
          target: cxorbia-dev

      - name: Verify remote propagation and smoke
        run: |
          set -euo pipefail
          proof_url="$CXORBIA_DEV_ROOT_URL/cxorbia-v161c-r21-dev-build-proof.json"
          verified=0
          for attempt in $(seq 1 24); do
            if curl -fsSL -H 'Cache-Control: no-cache' "$proof_url?attempt=$attempt&ts=$(date +%s)" > "$CXORBIA_OUT_DIR/remote-proof.json" && node tools/release/tya-r21-verify-remote-proof.mjs "$CXORBIA_OUT_DIR/remote-proof.json"; then
              verified=1
              break
            fi
            sleep 5
          done
          test "$verified" -eq 1
          export CXORBIA_EXPECT_TENANT_ID=tya CXORBIA_EXPECT_PROJECT_ID=cinepolis CXORBIA_EXPECT_PERIODS=14 CXORBIA_EXPECT_VISITS=616 CXORBIA_EXPECT_SHOPPERS=216 CXORBIA_MAX_SOURCE_AGE_HOURS=24
          remote_url="$CXORBIA_DEV_ROOT_URL/index.html?cxTyaPhaseA=1&r18d=visible"
          node tools/qa/tya-source-semantics-r21-gate.mjs --base-url "$remote_url" --out "$CXORBIA_OUT_DIR/remote-semantics"
          node tools/qa/tya-phase-a-source-safe-visual-smoke.mjs --base-url "$remote_url" --out "$CXORBIA_OUT_DIR/remote-roles-academy"
          printf '{"ok":true,"decision":"PASS_R21_HOSTING_DEV_AND_REMOTE_SMOKE","build":"%s","commit":"%s","production":false,"dataWrites":false}\n' "$CXORBIA_RUNTIME_BUILD_LABEL" "$GITHUB_SHA" > "$CXORBIA_OUT_DIR/final-status.json"

      - name: Upload sanitized DEV evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-v161c-r21-dev-root-deploy-evidence
          path: .tmp/r21-dev-deploy
          if-no-files-found: error
          retention-days: 14

      - name: Publish Hosting DEV commit status
        if: always()
        uses: actions/github-script@v7
        env:
          CXORBIA_JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const state = process.env.CXORBIA_JOB_STATUS === 'success' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'cxorbia/v161c-r21-hosting-dev',
              description: state === 'success'
                ? 'V161C R21 Hosting DEV and remote smoke PASS'
                : 'V161C R21 Hosting DEV or remote smoke HOLD',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            });
