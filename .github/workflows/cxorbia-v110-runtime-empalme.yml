name: CXOrbia V110 Runtime Empalme

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/empalme/v110-runtime/READY

permissions:
  contents: write

jobs:
  empalme-runtime-v110:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Reconstruir payload V110 y verificar identidad
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/cxorbia-v110
          cat tools/empalme/v110-runtime/chunk-*.b64 | base64 -d > /tmp/cxorbia-v110/runtime.tar.gz
          echo "e60d987302d459ec30f83d46b0f10dde578cbfcdf86c83f48996ce5df9b14747  /tmp/cxorbia-v110/runtime.tar.gz" | sha256sum -c -
          tar -xzf /tmp/cxorbia-v110/runtime.tar.gz -C /tmp/cxorbia-v110
          test -f /tmp/cxorbia-v110/app/index.html
          test -f /tmp/cxorbia-v110/app/modules/academia.js
          test -f /tmp/cxorbia-v110/app/core/data.js
          test -f /tmp/cxorbia-v110/app/modules/finanzas.js

      - name: Validar sintaxis de la candidata V110
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' f; do
            node --check "$f"
          done < <(find /tmp/cxorbia-v110/app -type f \( -name '*.js' -o -name '*.mjs' \) -print0)

      - name: Empalmar runtime sin borrar documentación backend
        shell: bash
        run: |
          set -euo pipefail
          cp -a /tmp/cxorbia-v110/app/. app/

      - name: Generar source lock runtime V110 empalmado
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');
          const srcRoot = '/tmp/cxorbia-v110/app';
          const repoRoot = path.resolve('app');
          const rels = [];
          function walk(dir){
            for(const ent of fs.readdirSync(dir,{withFileTypes:true})){
              const p=path.join(dir,ent.name);
              if(ent.isDirectory()) walk(p);
              else if(ent.isFile()) rels.push(path.relative(srcRoot,p).split(path.sep).join('/'));
            }
          }
          walk(srcRoot);
          const excluded = new Set(['core/build-lock.js']);
          const sha = b => crypto.createHash('sha256').update(b).digest('hex');
          const files = rels.filter(r=>!excluded.has(r)).sort().map(r=>{
            const buf=fs.readFileSync(path.join(repoRoot,r));
            return {path:r,size:buf.length,sha256:sha(buf)};
          });
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          const manifest={
            package:'CXORBIA-V110-RUNTIME-EMPALME-R1',
            project:'CXOrbia',
            baseline:'Prototype development request CXOrbia V110.zip · runtime empalmado sobre rama viva',
            generatedAt:new Date().toISOString(),
            sourceZipSha256:'1f9e30f711899af500683e7292eb8652e9e0bc4b888cd1252a5482795dbba227',
            sourceRuntimeTarSha256:'e60d987302d459ec30f83d46b0f10dde578cbfcdf86c83f48996ce5df9b14747',
            fileCount:files.length,
            aggregateSha256,
            exclusionsDeclared:[{path:'core/build-lock.js',reason:'declara el aggregate del runtime y se excluye por referencia circular'}],
            files
          };
          fs.mkdirSync(path.join(repoRoot,'docs'),{recursive:true});
          fs.writeFileSync(path.join(repoRoot,'docs','MANIFEST-V110-RUNTIME-EMPALME-R1.json'),JSON.stringify(manifest,null,2)+'\n','utf8');
          const lock=`/* CXOrbia · Runtime source lock V110 empalme R1\n   Fuente: Prototype development request CXOrbia V110.zip\n   ZIP SHA-256: ${manifest.sourceZipSha256}\n   Runtime TAR SHA-256: ${manifest.sourceRuntimeTarSha256}\n   Manifest: docs/MANIFEST-V110-RUNTIME-EMPALME-R1.json\n   No implica deploy, producción, importación ni providers activos. */\nvar CX_SOURCE_LOCK={\n  manifestFile:'docs/MANIFEST-V110-RUNTIME-EMPALME-R1.json',\n  aggregateSha256:'${aggregateSha256}',\n  fileCount:${files.length},\n  generatedAt:'${manifest.generatedAt.slice(0,10)}',\n  sourceZipSha256:'${manifest.sourceZipSha256}',\n  note:'Baseline auditada de continuidad runtime V110. Documentación backend/repo-only preservada fuera de este manifest.'\n};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`;
          fs.writeFileSync(path.join(repoRoot,'core','build-lock.js'),lock,'utf8');
          const verifier=`#!/usr/bin/env node\nimport {readFile} from 'node:fs/promises';\nimport {createHash} from 'node:crypto';\nimport path from 'node:path';\nconst ROOT=process.cwd();\nconst M=JSON.parse(await readFile(path.join(ROOT,'docs','MANIFEST-V110-RUNTIME-EMPALME-R1.json'),'utf8'));\nconst sha=b=>createHash('sha256').update(b).digest('hex');\nlet diffs=0;const entries=[];\nfor(const f of M.files){let b;try{b=await readFile(path.join(ROOT,f.path));}catch(e){console.error('DIFERENCIA faltante',f.path);diffs++;continue;}const h=sha(b);if(h!==f.sha256||b.length!==f.size){console.error('DIFERENCIA',f.path);diffs++;}entries.push(f.path+':'+h);}\nconst agg=sha(Buffer.from(entries.join('\\n'),'utf8'));if(agg!==M.aggregateSha256){console.error('DIFERENCIA aggregate',agg);diffs++;}\nconsole.log('Archivos verificados:',M.files.length);console.log('Aggregate recalculado:',agg);console.log(diffs?'Diferencias: '+diffs:'0 diferencias');process.exit(diffs?1:0);\n`;
          fs.writeFileSync(path.join(repoRoot,'docs','verify-manifest-v110-runtime-empalme.mjs'),verifier,'utf8');
          console.log(JSON.stringify({fileCount:files.length,aggregateSha256},null,2));
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-runtime-empalme.mjs)

      - name: Limpiar transporte temporal
        shell: bash
        run: |
          set -euo pipefail
          git rm -rf tools/empalme/v110-runtime
          git rm .github/workflows/cxorbia-v110-runtime-empalme.yml

      - name: Commit controlado del empalme V110
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app .github/workflows tools/empalme || true
          if git diff --cached --quiet; then
            echo "No hay cambios que commitear"
            exit 1
          fi
          git commit -m "feat(frontend): empalme runtime V110 auditada"
          git push origin HEAD:docs-tya-v6-v71-audit
