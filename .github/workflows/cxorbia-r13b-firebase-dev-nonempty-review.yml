name: CXOrbia Phase A R13B Firebase DEV Nonempty Review

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/release/r13b-firebase-nonempty-review/READY

permissions:
  contents: write

jobs:
  document-nonempty-review:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout rama viva
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validar reporte R13 y crear review item source-safe
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-clean-state-read-only-result-r13.source-safe.json','utf8'));
          if(R.decision!=='NONEMPTY_REVIEW_REQUIRED') throw new Error('unexpected R13 decision');
          if(R.safeState.providerCallsExecuted!==true) throw new Error('provider read not executed');
          for(const k of ['authWrites','claimsWrites','firestoreWrites','storageWrites','functionWritesOrInvocations','rulesDeploy','hostingDeploy','imports','production']) if(R.safeState[k]!==false) throw new Error('unsafe state '+k);
          const stable=s=>crypto.createHash('sha256').update(s).digest('hex').slice(0,24);
          const reviewId=`review_${stable(`firebase-dev|nonempty|17|1|${R.generatedAt}`)}`;
          const item={
            reviewId,
            tenantId:'tya',
            projectId:'cinepolis',
            environment:'DEV',
            conflictType:'firebase_dev_not_clean',
            severity:'P0_INFRA_GATE',
            entityType:'firebase_project',
            entityRef:'firebase_project:cxorbia-backend-dev',
            status:'blocked',
            reason:'Sanitized read-only verification found existing Auth users and Firestore content in the DEV target, so the project cannot be treated as the required new empty base.',
            evidence:{authUserCount:17,firestoreRootCollectionCount:1,firestoreAnyDocumentDetected:true,rulesReleaseCount:1,storageCheck:'NOT_FOUND_OR_API_NOT_INITIALIZED',functionsCheck:'PERMISSION_DENIED',firestoreDatabaseCheck:'HTTP_400'},
            allowedActions:['identify whether cxorbia-backend-dev is the intended new clean project','attach approved ownership/provenance evidence','provision a different brand-new empty Firebase DEV project','perform a new sanitized read-only verification after project decision'],
            blockedActions:['delete_existing_users_or_documents','reuse_unknown_or_preexisting_data','connect_cx_data_adapter','materialize_phase_a_data','deploy_rules_or_hosting','enable_providers','write_firestore_auth_storage','touch_production'],
            impact:{backendActivation:'hold',cxDataAdapter:'hold',materialization:'hold',production:'hold',frontendV110:'no_regression'},
            sourceSafe:true,
            piiIncluded:false,
            createdAt:new Date().toISOString()
          };
          const pack={schemaVersion:'1.0.0',contractId:'phase-a-firebase-dev-nonempty-review-r13b-v1',decision:'REVIEW_QUEUE_INFRA_GATE_CREATED',reviewItems:[item],safeState:{providerCalls:false,writes:false,imports:false,deploy:false,production:false}};
          fs.writeFileSync('backend/config/phase-a-firebase-dev-nonempty-review-r13b.source-safe.json',JSON.stringify(pack,null,2)+'\n','utf8');
          fs.writeFileSync('app/docs/PHASE-A-FIREBASE-DEV-NONEMPTY-REVIEW-R13B-20260712.md',`# PHASE A — R13B FIREBASE DEV NO LIMPIO\n\nFecha: 2026-07-12\n\n## Decisión\n\n\`${pack.decision}\`\n\nSe creó el review item \`${reviewId}\` porque la lectura sanitizada encontró 17 usuarios Auth y una colección raíz Firestore con al menos un documento. Por la regla de base nueva y vacía, \`cxorbia-backend-dev\` no puede tratarse como baseline limpia sin resolver su procedencia.\n\n## Acciones permitidas\n\n${item.allowedActions.map(x=>`- ${x}`).join('\n')}\n\n## Acciones bloqueadas\n\n${item.blockedActions.map(x=>`- ${x}`).join('\n')}\n\n## Estado seguro\n\nNo se borró, modificó, importó ni desplegó nada. No se leyeron identificadores de usuarios ni campos de documentos.\n`,'utf8');
          fs.writeFileSync('app/docs/CAMBIOS-BACKEND-ADDENDUM-FIREBASE-DEV-NONEMPTY-R13B-20260712.md',`# CAMBIOS BACKEND — R13B FIREBASE DEV NONEMPTY\n\n- R13 confirmó entorno DEV no vacío mediante lectura sanitizada.\n- Se creó un único review item de infraestructura.\n- Adapter CX.data, materialización y activación backend permanecen HOLD.\n- Sin writes, imports, deploy o producción.\n`,'utf8');
          fs.writeFileSync('app/docs/ACADEMIA-IMPACT-FIREBASE-DEV-NONEMPTY-R13B-20260712.md',`# ACADEMIA — IMPACTO R13B\n\n- Sin cambios de cursos o rutas.\n- Manual administrativo: una verificación read-only no autoriza borrar recursos existentes ni reutilizar una base desconocida.\n- No corresponde paquete Claude.\n`,'utf8');
          fs.writeFileSync('app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R13B-FIREBASE-NONEMPTY-20260712.md',`# TRACKER PHASE A — R13B FIREBASE DEV NONEMPTY\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11D shopper gap: REVIEW_QUEUE_SOURCE_LEVEL_ITEM_CREATED.\n- R13 provider read: NONEMPTY_REVIEW_REQUIRED.\n- R13B infra review: REVIEW_QUEUE_INFRA_GATE_CREATED.\n- Firebase DEV clean baseline: NOT_VERIFIED.\n- CX.data adapter: HOLD.\n- Materialización: HOLD.\n- Producción: HOLD.\n\nSiguiente bloque exacto: confirmar si \`cxorbia-backend-dev\` es realmente el proyecto nuevo destinado a CXOrbia. Si contiene recursos ajenos o previos, crear un proyecto Firebase DEV nuevo y vacío; no borrar ni reutilizar silenciosamente.\n`,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R13B Firebase DEV nonempty review — 2026-07-12\n\n- Se creó review item de infraestructura por 17 usuarios Auth y Firestore no vacío.\n- Adapter/materialización/backend activation permanecen HOLD.\n- Sin writes, imports, deploy ni producción.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R13B Firebase DEV nonempty — 2026-07-12\n\n- No es bug Claude ni del prototipo. El bloqueo es infraestructura/base DEV no limpia.\n- No mostrar backend conectado ni base limpia.\n`,'utf8');
          NODE

      - name: Refrescar source lock unión
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const P=JSON.parse(fs.readFileSync('backend/config/phase-a-firebase-dev-nonempty-review-r13b.source-safe.json','utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r13b={decision:P.decision,reviewId:P.reviewItems[0].reviewId,report:'docs/PHASE-A-FIREBASE-DEV-NONEMPTY-REVIEW-R13B-20260712.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R13B */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r13Decision:'${M.r13?.decision}',r13bDecision:'${P.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; Firebase DEV no limpio en reviewQueue; backend writes apagados.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Commit y limpiar runners temporales
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r13b-firebase-dev-nonempty-review.yml
          git rm -rf tools/release/r13b-firebase-nonempty-review
          git rm -rf tools/release/r13-firebase-readonly-authorized || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend/config CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md .github/workflows tools/release
          git commit -m "docs(phase-a): create Firebase DEV nonempty infra review R13B"
          git push origin HEAD:docs-tya-v6-v71-audit
