name: CXOrbia TyA context R15G correction

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - '.github/workflows/tya-context-r15g-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
      - name: Patch project-period context at the backend connection layer
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_exact(path, old, new, label):
            p=Path(path)
            s=p.read_text(encoding='utf-8')
            if old not in s:
              raise SystemExit(f'{label}: expected source fragment not found in {path}')
            s=s.replace(old,new,1)
            p.write_text(s,encoding='utf-8',newline='\n')

          builder='tools/release/tya-source-safe-binding-build-r15f.mjs'
          replace_exact(
            builder,
            "id:'tya', clientName:'TyA', name:'TyA', tagline:'Tenant TyA · Phase A controlada'",
            "id:'tya', tenantId:'tya', clientName:'TyA', name:'TyA', tagline:'Tenant TyA · Phase A controlada'",
            'builder tenant identity'
          )
          replace_exact(
            builder,
            "  CX.data.currentProjectId = latest && latest.id;\n  CX.data.sourceMode = 'tya_hr_live_multitab_source_safe_dev';",
            "  CX.data.currentProjectId = 'cinepolis';\n  CX.data.currentPeriodId = latest && latest.id;\n  CX.data.sourceMode = 'tya_hr_live_multitab_source_safe_dev';",
            'builder project-period state'
          )
          replace_exact(
            builder,
            "    currentPeriodId:CX.data.currentProjectId,",
            "    currentPeriodId:CX.data.currentPeriodId,",
            'visible contract period identity'
          )
          replace_exact(
            builder,
            "    CX.dataSource.warnings = shoppers.length === 210 ? ['Gap shopper protegido: 210/213; 3 referencias continúan en revisión.'] : [];",
            "    CX.dataSource.warnings = shoppers.length === 216 ? [] : ['Conteo shopper source-safe distinto al snapshot aprobado: ' + shoppers.length + '/216.'];",
            'shopper count warning'
          )
          replace_exact(
            builder,
            "    tenantId:'tya', projectId:'cinepolis', projectName:'Cinépolis', sourceTitle:snapshot.source && snapshot.source.title,",
            "    tenantId:'tya', projectId:'cinepolis', projectName:'Cinépolis', activePeriodId:latest && latest.id, sourceTitle:snapshot.source && snapshot.source.title,",
            'preview metadata context'
          )

          bridge='app/core/tya-phase-a-source-safe-preview.js'
          replace_exact(
            bridge,
            "  const stablePeriodId = (projectId, periodKey) => `${projectId}::${periodKey || 'pending'}`;",
            "  const stablePeriodId = (projectId, periodKey) => `${projectId}-${periodKey || 'pending'}`;",
            'bridge period identity'
          )
          replace_exact(
            bridge,
            "    clientName: 'TyA',",
            "    tenantId: 'tya',\n    clientName: 'TyA',",
            'bridge tenant identity'
          )

          replace_exact(
            'tools/qa/tya-phase-a-source-safe-visual-smoke.mjs',
            "  shoppers: Number(process.env.CXORBIA_EXPECT_SHOPPERS || 213)",
            "  shoppers: Number(process.env.CXORBIA_EXPECT_SHOPPERS || 216)",
            'source-safe smoke shopper count'
          )
          replace_exact(
            'tools/qa/tya-phase-a-visible-data-smoke-r17.mjs',
            "const expected = { periods:14, visits:616, shoppers:210, currentPeriodVisits:44, routes:13 };",
            "const expected = { periods:14, visits:616, shoppers:216, currentPeriodVisits:44, routes:13 };",
            'visible data shopper count'
          )
          replace_exact(
            '.github/workflows/cxorbia-phase-a-source-safe-visual-smoke-tya.yml',
            "          CXORBIA_EXPECT_SHOPPERS: '213'",
            "          CXORBIA_EXPECT_SHOPPERS: '216'",
            'workflow shopper count'
          )
          PY

          node --check app/core/tya-phase-a-source-safe-preview.js
          node --check tools/release/tya-source-safe-binding-build-r15f.mjs
          node --check tools/qa/tya-phase-a-source-safe-visual-smoke.mjs
          node --check tools/qa/tya-phase-a-visible-data-smoke-r17.mjs

          cat > app/docs/CAMBIOS-BACKEND-ADDENDUM-R15G-PROJECT-PERIOD-CONTEXT-20260716.md <<'EOF'
          # CAMBIOS BACKEND — R15G CONTEXTO PROYECTO/PERIODO TYA

          Fecha: 2026-07-16

          ## Causa raíz

          El bridge corregido era sobrescrito después por el adapter generado en build-time. Ese adapter volvía a colocar el ID del periodo en `currentProjectId`, no establecía `currentPeriodId` y dejaba `CX.data.project()` sin objeto válido. Como consecuencia:

          - Dashboard/KPI fallaban o mezclaban contexto;
          - Histórico y Hoja de ruta no recibían el periodo activo correcto;
          - Admin y Cliente podían fallar al leer países/nombre del proyecto;
          - cambiar periodo no producía el conjunto esperado de 44 visitas.

          ## Corrección

          - `currentProjectId = cinepolis` como proyecto padre.
          - `currentPeriodId = cinepolis-YYYY-MM` como periodo activo.
          - `CX.BRAND.tenantId = tya` para `CX.data.ctx()`.
          - contrato visible usa `currentPeriodId`, no `currentProjectId`.
          - conteo aprobado de shoppers source-safe actualizado a 216.
          - bridge y adapter usan la misma identidad estable de periodo.

          ## Validación

          Sintaxis JS/MJS validada. Los gates source-safe, proyecto/periodo/KPI/histórico y smoke por roles se ejecutan automáticamente en el siguiente workflow.

          ## Estado seguro

          Sin cambios en `app/modules/**`; sin deploy, producción, imports, writes, Make, Gemini ni pagos.
          EOF
          sed -i 's/^          //' app/docs/CAMBIOS-BACKEND-ADDENDUM-R15G-PROJECT-PERIOD-CONTEXT-20260716.md

          rm -f .github/workflows/tya-context-r15g-fix.yml
          git config user.name 'CXOrbia Context Fix Bot'
          git config user.email 'cxorbia-context@example.invalid'
          git add -A
          git commit -m 'fix: align TyA project period context across bridge and adapter'
          git push origin HEAD:docs-tya-v6-v71-audit
