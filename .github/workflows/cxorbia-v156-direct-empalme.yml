name: CXOrbia V156 Direct Empalme
on:
  push:
    branches: [docs-tya-v6-v71-audit]
    paths:
      - '.candidate/v156-runtime-delta.zip'
      - '.candidate/empalme-v156-direct.mjs'
      - '.github/workflows/cxorbia-v156-direct-empalme.yml'
permissions:
  contents: write
concurrency:
  group: cxorbia-v156-direct-empalme
  cancel-in-progress: true
jobs:
  empalme:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Apply audited V156 delta
        run: |
          set -euo pipefail
          test "$(sha256sum .candidate/v156-runtime-delta.zip | awk '{print $1}')" = "053af067f5ffa5f2c9244798af3d0cce28189457533a835fb5376eac5112ebf5"
          unzip -oq .candidate/v156-runtime-delta.zip -d .
          node .candidate/empalme-v156-direct.mjs
          while IFS= read -r -d '' f; do node --check "$f"; done < <(find app -type f \( -name '*.js' -o -name '*.mjs' \) -not -path 'app/docs/*' -print0)
          (cd app && node docs/verify-manifest.mjs)
      - name: Commit final V156 baseline
        run: |
          set -euo pipefail
          rm -rf .candidate evidence .github/workflows/cxorbia-v156-direct-empalme.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: empalme directo V156 y source lock [skip ci]"
          git push origin HEAD:docs-tya-v6-v71-audit
