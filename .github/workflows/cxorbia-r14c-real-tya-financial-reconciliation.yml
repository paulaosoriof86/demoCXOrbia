name: CXOrbia Phase A R14C Real TyA Financial Reconciliation

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/reconciliation/READY-R14C

permissions:
  contents: write

jobs:
  reconcile-real-tya-financial-r14c:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout current Phase A branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node and Python
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate persisted source-safe TyA financial input
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const p='backend/config/phase-a-financial-workbook-source-safe-r14.json';
          const r=JSON.parse(fs.readFileSync(p,'utf8'));
          if(r.reportId!=='phase-a-financial-workbook-source-safe-r14') throw new Error('wrong source id');
          if(r.tenantId!=='tya'||r.projectId!=='cinepolis') throw new Error('wrong tenant/project');
          if(r.source?.sha256!=='b8e753ade03286caf3ff19e119a9b21b4dde7d5bd21d61fba70ab32719afea89') throw new Error('source hash mismatch');
          if(r.liquidationControl?.summary?.uniqueRecordCount!==247) throw new Error('source row drift');
          if(r.safeState?.sourceSafe!==true||r.safeState?.piiOutput!==false||r.safeState?.rawWorkbookCommitted!==false) throw new Error('unsafe source');
          console.log(JSON.stringify({financialRows:247,sourceSafe:true,sourceHash:r.source.sha256},null,2));
          NODE

      - name: Build live TyA HR source-safe payload
        env:
          CXORBIA_HR_SOURCE_SAFE_OUT: app/data/tya-hr-source-safe-periods.js
          CXORBIA_HR_LIVE_MAX_ROW: '140'
          CXORBIA_HR_LIVE_MAX_COL: AI
        shell: bash
        run: |
          set -euo pipefail
          node tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          test -s app/data/tya-hr-source-safe-periods.js

      - name: Run protected operational reconciliation
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .tmp/r14c-real-tya
          node --check tools/reconciliation/tya-financial-workbook-live-hr-reconcile-r14c.mjs
          node tools/reconciliation/tya-financial-workbook-live-hr-reconcile-r14c.mjs \
            --hr app/data/tya-hr-source-safe-periods.js \
            --financial backend/config/phase-a-financial-workbook-source-safe-r14.json \
            --out .tmp/r14c-real-tya
          test -s .tmp/r14c-real-tya/financial-live-hr-reconciliation-r14c.source-safe.json

      - name: Run existing source-safe importer dry-run
        shell: bash
        run: |
          set -euo pipefail
          python tools/migration/tya_phase_a_source_safe_import.py \
            --hr app/data/tya-hr-source-safe-periods.js \
            --financial .tmp/r14c-real-tya/financial-import-input-r14c.source-safe.json \
            --out .tmp/r14c-real-tya/importer-dry-run \
            > .tmp/r14c-real-tya/importer-console.json
          test -s .tmp/r14c-real-tya/importer-dry-run/phase-a-source-safe-import-report.json

      - name: Validate operational and safety invariants
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const p='.tmp/r14c-real-tya/financial-live-hr-reconciliation-r14c.source-safe.json';
          const r=JSON.parse(fs.readFileSync(p,'utf8'));
          if(r.decision!=='PASS_WITH_REVIEW_REAL_TYA_FINANCIAL_RECONCILIATION_R14C') throw new Error(`R14C did not recover exact links: ${r.decision}`);
          if(r.summary.hrVisits!==616) throw new Error(`HR visit drift ${r.summary.hrVisits}`);
          if(r.summary.financialLiquidationRows!==247) throw new Error('financial row drift');
          if(!(r.summary.exactAcceptedLinks>0)) throw new Error('no exact accepted links');
          const s=r.safeState||{};
          for(const key of ['piiOutput','rawWorkbookRead','rawWorkbookCommitted','providerReads','providerWrites','imports','paymentsExecuted','deploy','production']) if(s[key]!==false) throw new Error('unsafe state '+key);
          const raw=fs.readFileSync(p,'utf8');
          for(const token of ['"shopperName"','"beneficiaryName"','"storeName"','"bankAccount"','"dpi"']) if(raw.includes(token)) throw new Error('forbidden field '+token);
          console.log(JSON.stringify({decision:r.decision,summary:r.summary,dataAvailability:r.dataAvailability,june:r.coverageByPeriodCountry?.['2026-06']},null,2));
          NODE

      - name: Persist sanitized operational outputs and documentation
        shell: bash
        run: |
          set -euo pipefail
          cp .tmp/r14c-real-tya/financial-live-hr-reconciliation-r14c.source-safe.json backend/config/phase-a-financial-live-hr-reconciliation-r14c.source-safe.json
          cp .tmp/r14c-real-tya/financial-import-input-r14c.source-safe.json backend/config/phase-a-financial-import-input-r14c.source-safe.json
          cp .tmp/r14c-real-tya/ledger-payment-evidence-candidates-r14c.source-safe.json backend/config/phase-a-ledger-payment-evidence-candidates-r14c.source-safe.json
          cp .tmp/r14c-real-tya/review-queue-r14c.source-safe.json backend/config/phase-a-financial-review-queue-r14c.source-safe.json
          cp .tmp/r14c-real-tya/importer-dry-run/phase-a-source-safe-import-report.json backend/config/phase-a-financial-importer-dry-run-r14c.source-safe.json
          cp .tmp/r14c-real-tya/financial-live-hr-reconciliation-r14c.source-safe.md app/docs/PHASE-A-FINANCIAL-REAL-TYA-R14C-RESULT-20260713.md
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-financial-live-hr-reconciliation-r14c.source-safe.json','utf8'));
          const I=JSON.parse(fs.readFileSync('backend/config/phase-a-financial-importer-dry-run-r14c.source-safe.json','utf8'));
          const june=R.coverageByPeriodCountry?.['2026-06']||{};
          const s=R.summary;
          const docs={
            'app/docs/CAMBIOS-BACKEND-ADDENDUM-FINANCIAL-REAL-TYA-R14C-20260713.md':`# CAMBIOS BACKEND — R14C FINANZAS REALES TyA\n\n## Clasificación\n\n- Reusable CXOrbia: enlace exacto por referencias protegidas y campos operativos disponibles.\n- Exclusivo cliente TyA: mapeo del control de liquidaciones y ledger del workbook TyA.\n- Claude/prototipo: sin P0 nuevo; conservar distinción liquidada/pagada.\n- Academia: explicar enlace protegido, revisión humana y evidencia de pago.\n- Sin impacto Claude inmediato: reconciliación backend source-safe.\n\n## Resultado\n\n- Decisión: \`${R.decision}\`.\n- Visitas HR: ${s.hrVisits}.\n- Filas financieras: ${s.financialLiquidationRows}.\n- Enlaces exactos aceptados: ${s.exactAcceptedLinks}.\n- Filas en revisión: ${s.reviewLiquidationRows}.\n- Ledger itemizado vinculado a visita: ${s.ledgerRowsLinkedToVisit}/${s.itemizedLedgerRows}.\n- Importador R4 dry-run: ${JSON.stringify(I)}.\n- Cero writes, import real, pagos, deploy o producción.\n`,
            'app/docs/ACADEMIA-IMPACT-FINANCIAL-REAL-TYA-R14C-20260713.md':`# ACADEMIA — IMPACTO R14C\n\n- Enseñar que una referencia protegida estable puede vincular fuentes sin exponer nombres.\n- Cuando HR no trae fecha realizada ni honorario, solo se acepta coincidencia única por periodo, país, shopper protegido, sucursal protegida, boleto y combo.\n- Toda ambigüedad permanece en reviewQueue.\n- Liquidada o fecha planificada no equivale a pagada; pago exige evidencia y confirmación.\n`,
            'app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R14C-FINANCIAL-REAL-TYA-20260713.md':`# TRACKER PHASE A — R14C FINANZAS REALES TyA\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11D shopper 210/213: REVIEW_QUEUE.\n- R13 Firebase DEV: NONEMPTY_REVIEW_REQUIRED.\n- R14 estricta: HOLD_NO_EXACT_REAL_TYA_LINKS.\n- R14C protegida operacional: ${R.decision}.\n- Enlaces exactos: ${s.exactAcceptedLinks}/${s.financialLiquidationRows}.\n- Revisión de liquidaciones: ${s.reviewLiquidationRows}.\n- Ledger vinculado: ${s.ledgerRowsLinkedToVisit}/${s.itemizedLedgerRows}.\n- Junio GT: HR ${june.GT?.hrVisits||0}, fuente ${june.GT?.financialRows||0}, exactos ${june.GT?.exactLinked||0}, gap fuente ${june.GT?.sourceCountGap||0}.\n- Junio HN: HR ${june.HN?.hrVisits||0}, fuente ${june.HN?.financialRows||0}, exactos ${june.HN?.exactLinked||0}, gap fuente ${june.HN?.sourceCountGap||0}.\n- Writes/import/pagos/deploy/producción: HOLD.\n\nSiguiente bloque exacto: cerrar reviewQueue financiera y evidencia de pago, mientras se crea una base Firebase DEV nueva y vacía antes de materializar.\n`
          };
          for(const [p,c] of Object.entries(docs)) fs.writeFileSync(p,c,'utf8');
          fs.appendFileSync('CAMBIOS-BACKEND.md',`\n\n## R14C Finanzas reales TyA — 2026-07-13\n\n- Decisión: \`${R.decision}\`.\n- ${s.exactAcceptedLinks}/${s.financialLiquidationRows} enlaces exactos protegidos; ${s.reviewLiquidationRows} en revisión.\n- Ledger vinculado a visita: ${s.ledgerRowsLinkedToVisit}/${s.itemizedLedgerRows}.\n- Sin writes, import real, pagos, deploy ni producción.\n`,'utf8');
          fs.appendFileSync('RESUMEN-PARA-CLAUDE.md',`\n\n## R14C Finanzas reales TyA — 2026-07-13\n\n- Backend/datos: \`${R.decision}\`, ${s.exactAcceptedLinks} enlaces exactos.\n- Sin P0 frontend nuevo. Mantener liquidada/pagada como estados distintos y los P1 de pagos ya registrados.\n`,'utf8');
          fs.appendFileSync('PENDIENTES-PROTOTIPO.md',`\n\n## R14C Finanzas reales TyA — impacto Claude\n\n- Sin P0 nuevo.\n- Mantener copy honesto: liquidación y fecha planificada no confirman pago.\n- Los casos backend en reviewQueue no deben mostrarse como pagados.\n`,'utf8');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;
          M.r14c={decision:R.decision,exactAcceptedLinks:s.exactAcceptedLinks,reviewLiquidationRows:s.reviewLiquidationRows,ledgerRowsLinkedToVisit:s.ledgerRowsLinkedToVisit,report:'docs/PHASE-A-FINANCIAL-REAL-TYA-R14C-RESULT-20260713.md'};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R14C datos financieros reales TyA */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11dDecision:'${M.r11d?.decision}',r13Decision:'${M.r13?.decision}',r14Decision:'${M.r14?.decision}',r14cDecision:'${R.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; R14C vincula datos financieros reales TyA source-safe; provider writes siguen apagados.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Upload sanitized R14C evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cxorbia-r14c-real-tya-financial-source-safe
          path: .tmp/r14c-real-tya
          if-no-files-found: error
          retention-days: 14

      - name: Commit sanitized R14C result and remove one-time trigger
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r14c-real-tya-financial-reconciliation.yml
          git rm -f tools/reconciliation/READY-R14C
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app backend/config tools/reconciliation CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md PENDIENTES-PROTOTIPO.md .github/workflows
          git commit -m 'feat(phase-a): record protected operational financial reconciliation R14C'
          git push origin HEAD:docs-tya-v6-v71-audit
