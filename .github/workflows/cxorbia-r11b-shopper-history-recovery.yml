name: CXOrbia Phase A R11B Shopper History Recovery

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/reconciliation/r11b/READY

permissions:
  contents: write

jobs:
  recover-reference-set:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Build current source-safe HR payload
        shell: bash
        env:
          CXORBIA_HR_SOURCE_SAFE_OUT: .tmp/r11b/current-hr-source-safe.js
          CXORBIA_HR_LIVE_MAX_ROW: '140'
          CXORBIA_HR_LIVE_MAX_COL: AI
        run: |
          set -euo pipefail
          mkdir -p .tmp/r11b
          node tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          test -s .tmp/r11b/current-hr-source-safe.js

      - name: Search reachable Git objects for approved 213-reference set
        shell: bash
        run: |
          set -euo pipefail
          python3 tools/reconciliation/tya-shopper-reference-history-recovery-r11b.py \
            --current .tmp/r11b/current-hr-source-safe.js \
            --target 213 \
            --out .tmp/r11b/history-recovery.source-safe.json
          test -s .tmp/r11b/history-recovery.source-safe.json
          node -e "const r=require('./.tmp/r11b/history-recovery.source-safe.json'); if(r.safeState.writes||r.safeState.imported||r.safeState.production) process.exit(2); console.log(r.decision)"

      - name: Document R11B result
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const R=JSON.parse(fs.readFileSync('.tmp/r11b/history-recovery.source-safe.json','utf8'));
          const refs=a=>a.length?a.map(x=>`- \`${x}\``).join('\n'):'- none';
          const selected=R.recoveredHistorical;
          fs.writeFileSync('backend/config/phase-a-shopper-reference-history-recovery-r11b.source-safe.json',JSON.stringify(R,null,2)+'\n','utf8');
          fs.writeFileSync('app/docs/PHASE-A-SHOPPER-REFERENCE-HISTORY-RECOVERY-R11B-20260712.md',`# PHASE A — R11B RECUPERACIÓN HISTÓRICA DE REFERENCIAS SHOPPER\n\nFecha: 2026-07-12\n\n## Decisión\n\n\`${R.decision}\`\n\n## Búsqueda\n\n- objetos Git alcanzables con referencias shopper: ${R.search.reachableGitObjectsWithShopperRefs};\n- candidatos exactos de 213 referencias: ${R.search.exact213Candidates};\n- referencia seleccionada: ${selected?`blob \`${selected.blobSha}\`, path \`${selected.pathHint||'sin path'}\`, commit \`${selected.commit||'no resuelto'}\``:'ninguna'}.\n\n## Actual\n\n- shoppers: ${R.current.shopperCount};\n- visitas: ${R.current.visitCount};\n- periodos: ${R.current.periodCount};\n- referenceSet SHA-256: \`${R.current.referenceSetSha256}\`.\n\n## Comparación\n\n- estables: ${R.comparison.stableCount};\n- históricas solamente: ${R.comparison.historicalOnlyCount};\n- actuales solamente: ${R.comparison.currentOnlyCount}.\n\n### Históricas solamente\n\n${refs(R.comparison.historicalOnlyRefs)}\n\n### Actuales solamente\n\n${refs(R.comparison.currentOnlyRefs)}\n\n## Política\n\nNo nombres, correos, teléfonos, DPI, banco, filas HR crudas ni URLs privadas. No match por nombre, no borrado, no merge, no backfill y no materialización automática.\n\n## Estado seguro\n\nSin imports, writes, deploy, producción, providers, HR writes ni pagos reales.\n`,'utf8');
          fs.writeFileSync('app/docs/CAMBIOS-BACKEND-ADDENDUM-SHOPPER-HISTORY-RECOVERY-R11B-20260712.md',`# CAMBIOS BACKEND — R11B SHOPPER HISTORY RECOVERY\n\n- Se inspeccionaron objetos Git alcanzables sin exponer contenido crudo.\n- Decisión: \`${R.decision}\`.\n- Candidatos exactos 213: ${R.search.exact213Candidates}.\n- Históricas solamente: ${R.comparison.historicalOnlyCount}; actuales solamente: ${R.comparison.currentOnlyCount}.\n- Sin materialización, writes, imports, deploy ni producción.\n`,'utf8');
          fs.writeFileSync('app/docs/ACADEMIA-IMPACT-SHOPPER-HISTORY-RECOVERY-R11B-20260712.md',`# ACADEMIA — IMPACTO R11B\n\n- Sin cambio de cursos, rutas o contenido visible.\n- Reforzar en manual administrativo que referencias históricas se recuperan por llaves opacas y evidencia auditable, nunca por nombre.\n- No corresponde paquete Claude inmediato.\n`,'utf8');
          fs.writeFileSync('app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R11B-SHOPPER-HISTORY-20260712.md',`# TRACKER PHASE A — R11B SHOPPER HISTORY\n\n- V110: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11: HOLD_REFERENCE_SET_UNAVAILABLE.\n- R11B: ${R.decision}.\n- Objetos con referencias: ${R.search.reachableGitObjectsWithShopperRefs}.\n- Candidatos 213: ${R.search.exact213Candidates}.\n- Materialización shopper: ${R.policy.materializationHold?'HOLD':'READY_SOURCE_SAFE'}.\n- Producción: HOLD.\n\nSiguiente bloque exacto: ${selected?'crear reviewQueue source-safe para las referencias históricas/actuales divergentes y verificar impacto en visitas, certificaciones y liquidaciones':'buscar evidencia aprobada fuera de objetos Git alcanzables: artefacto R5, salida protegida local o export source-safe firmado; no inferir identidades desde el conteo'}.\n`,'utf8');
          let cb=fs.readFileSync('CAMBIOS-BACKEND.md','utf8');
          cb+=`\n\n## R11B recuperación histórica shopper refs — 2026-07-12\n\n- Decisión: \`${R.decision}\`.\n- Objetos inspeccionados con referencias: ${R.search.reachableGitObjectsWithShopperRefs}; candidatos exactos 213: ${R.search.exact213Candidates}.\n- Sin match por nombre, materialización, imports, writes, deploy ni producción.\n`;
          fs.writeFileSync('CAMBIOS-BACKEND.md',cb,'utf8');
          let rs=fs.readFileSync('RESUMEN-PARA-CLAUDE.md','utf8');
          rs+=`\n\n## R11B shopper history recovery — 2026-07-12\n\n- Decisión backend: \`${R.decision}\`.\n- No es tarea Claude. No reabrir V110 ni R10.\n`;
          fs.writeFileSync('RESUMEN-PARA-CLAUDE.md',rs,'utf8');
          NODE
          cp .tmp/r11b/history-recovery.source-safe.json tools/reconciliation/r11b-result.source-safe.json

      - name: Refresh union source lock
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-shopper-reference-history-recovery-r11b.source-safe.json','utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r11b={decision:R.decision,report:'docs/PHASE-A-SHOPPER-REFERENCE-HISTORY-RECOVERY-R11B-20260712.md',exact213Candidates:R.search.exact213Candidates,historicalOnly:R.comparison.historicalOnlyCount,currentOnly:R.comparison.currentOnlyCount};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R10/R11/R11B */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision}',r11Decision:'${M.r11?.decision}',r11bDecision:'${R.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; R10/R11/R11B documentados; backend preservado.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Commit and clean runner
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r11b-shopper-history-recovery.yml
          git rm -rf tools/reconciliation/r11b
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend/config tools/reconciliation CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md .github/workflows
          git commit -m "feat(phase-a): recover historical shopper reference evidence R11B"
          git push origin HEAD:docs-tya-v6-v71-audit
