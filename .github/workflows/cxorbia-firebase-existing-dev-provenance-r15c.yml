name: CXOrbia Firebase Existing DEV Provenance R15C

# Provider read workflow. Manual-only to avoid consuming Firebase quotas on every
# commit. Static syntax/config checks remain inside the same controlled run.
on:
  workflow_dispatch:
    inputs:
      confirm_read_only:
        description: 'Type RECONCILE_EXISTING_FIREBASE_DEV_READ_ONLY after explicit read-only authorization.'
        required: true
        default: 'HOLD'
        type: string

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  FIREBASE_PROJECT_ID: cxorbia-backend-dev
  FIREBASE_STORAGE_BUCKET: cxorbia-backend-dev.firebasestorage.app

jobs:
  reconcile-existing-dev-provenance:
    name: Sanitized read-only provenance reconciliation
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.confirm_read_only == 'RECONCILE_EXISTING_FIREBASE_DEV_READ_ONLY' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate runner syntax and source-safe config
        run: |
          set -euo pipefail
          node --check tools/release/tya-firebase-existing-dev-provenance-reconcile-r15c.mjs
          node -e "const fs=require('fs');const p='backend/config/phase-a-firebase-existing-dev-provenance-r15c.source-safe.json';const x=JSON.parse(fs.readFileSync(p,'utf8'));if(x.status!=='authorized_read_only'||x.authorization?.providerReadAuthorized!==true||x.authorization?.writesAuthorized!==false)process.exit(2);console.log('R15C source-safe config valid.');"

      - name: Prepare temporary DEV credential
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV }}
        run: |
          set -euo pipefail
          private_dir='.tmp/firebase-existing-dev-provenance-r15c-private'
          mkdir -p "$private_dir"
          credential_path="$private_dir/credentials.json"
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo 'Blocked: missing FIREBASE_SERVICE_ACCOUNT_CXORBIA_BACKEND_DEV.'
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$credential_path"
          chmod 600 "$credential_path"
          node <<'NODE'
          const fs = require('fs');
          const file = '.tmp/firebase-existing-dev-provenance-r15c-private/credentials.json';
          const parsed = JSON.parse(fs.readFileSync(file, 'utf8'));
          if (parsed.type !== 'service_account') throw new Error('Credential type mismatch.');
          if (parsed.project_id !== 'cxorbia-backend-dev') throw new Error('Credential project mismatch.');
          if (!String(parsed.client_email || '').endsWith('@cxorbia-backend-dev.iam.gserviceaccount.com')) throw new Error('Credential service-account domain mismatch.');
          console.log('DEV credential sanity checks passed without outputting identifiers.');
          NODE

      - name: Install read-only dependencies
        run: npm install --no-save --ignore-scripts firebase-admin@13 google-auth-library@9

      - name: Run R15C sanitized provider reconciliation
        env:
          CXORBIA_CONFIRM: RECONCILE_EXISTING_FIREBASE_DEV_READ_ONLY
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/.tmp/firebase-existing-dev-provenance-r15c-private/credentials.json
        run: |
          set -euo pipefail
          node tools/release/tya-firebase-existing-dev-provenance-reconcile-r15c.mjs \
            --config backend/config/phase-a-firebase-existing-dev-provenance-r15c.source-safe.json \
            --out .tmp/firebase-existing-dev-provenance-r15c

      - name: Cleanup temporary credential
        if: always()
        run: |
          rm -f .tmp/firebase-existing-dev-provenance-r15c-private/credentials.json
          rmdir .tmp/firebase-existing-dev-provenance-r15c-private 2>/dev/null || true

      - name: Upload sanitized R15C report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firebase-existing-dev-provenance-r15c-report
          path: .tmp/firebase-existing-dev-provenance-r15c
          if-no-files-found: ignore
          retention-days: 14
