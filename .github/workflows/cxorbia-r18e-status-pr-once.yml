name: CXOrbia R18E Status PR Once

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - 'backend/config/phase-a-r18e-status-pr-once.source-safe.json'

permissions:
  contents: read
  pull-requests: write

defaults:
  run:
    shell: bash

env:
  CXORBIA_DEV_ROOT_URL: https://cxorbia-backend-dev.web.app
  CXORBIA_R18E_BUILD_LABEL: v131-r18d-source-safe-20260715-r18e
  CXORBIA_R18E_AGGREGATE: 6e833331f5aa9ba9458ef0724756e72747352add3f8c6cc1fa327c96fadec348

jobs:
  verify-and-report:
    name: Verify remote R18E and update PR 7 status
    if: ${{ github.event.head_commit.message == 'ops(r18e): verify remote Hosting DEV and report PR once' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate status marker
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const marker = JSON.parse(fs.readFileSync('backend/config/phase-a-r18e-status-pr-once.source-safe.json', 'utf8'));
          if (marker.status !== 'VERIFY_AND_REPORT_ONCE') throw new Error('Status marker mismatch.');
          if (marker.authorizationId !== 'R18E_HOSTING_DEV_ONCE_20260715') throw new Error('Authorization id mismatch.');
          if (marker.expectedBuildLabel !== process.env.CXORBIA_R18E_BUILD_LABEL) throw new Error('Build label mismatch.');
          if (marker.expectedAggregateSha256 !== process.env.CXORBIA_R18E_AGGREGATE) throw new Error('Aggregate mismatch.');
          NODE

      - name: Install Playwright
        run: |
          set -euo pipefail
          npm init -y >/dev/null 2>&1
          npm i -D playwright@1.47.2 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null

      - name: Wait for exact remote proof
        run: |
          set -euo pipefail
          mkdir -p .tmp/r18e-status
          found=0
          for attempt in $(seq 1 30); do
            cache="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            if curl -fsSL "$CXORBIA_DEV_ROOT_URL/r18e-deploy-proof.json?cache=$cache" -o .tmp/r18e-status/remote-proof.json; then
              if node <<'NODE'
          const fs = require('fs');
          const proof = JSON.parse(fs.readFileSync('.tmp/r18e-status/remote-proof.json', 'utf8'));
          const ok = proof.environment === 'FIREBASE_HOSTING_DEV' &&
            proof.firebaseProjectId === 'cxorbia-backend-dev' &&
            proof.hostingTarget === 'cxorbia-dev' &&
            proof.buildLabel === process.env.CXORBIA_R18E_BUILD_LABEL &&
            proof.sourceLockAggregateSha256 === process.env.CXORBIA_R18E_AGGREGATE &&
            proof.baseline === 'V131' && proof.decision === 'PASS_R18D_VISIBLE_OVERLAYS' &&
            proof.sourceSafe === true && proof.imported === false && proof.production === false &&
            proof.firestoreWrites === false && proof.authWrites === false && proof.storageWrites === false &&
            proof.hrWrites === false && proof.payments === false;
          if (!ok) process.exit(1);
          NODE
              then
                found=1
                break
              fi
            fi
            sleep 10
          done
          if [ "$found" -ne 1 ]; then exit 1; fi

      - name: Run remote R18D smoke
        env:
          CXORBIA_BASE_URL: https://cxorbia-backend-dev.web.app/index.html?cxTyaPhaseA=1&r18d=visible
        run: |
          set -euo pipefail
          node tools/qa/tya-phase-a-visible-overlays-smoke-r18d.mjs --out .tmp/r18e-status/remote-smoke
          node <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('.tmp/r18e-status/remote-smoke/r18d-visible-overlays-smoke.json', 'utf8'));
          if (!String(report.decision || '').startsWith('PASS_') && !String(report.decision || '').startsWith('PASS_WITH_REVIEW_')) throw new Error(`Decision not PASS: ${report.decision}`);
          if (Array.isArray(report.blockers) && report.blockers.length) throw new Error(`Blockers: ${report.blockers.join(', ')}`);
          NODE

      - name: Update PR 7 to R18E PASS
        if: success()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node <<'NODE'
          (async () => {
            const fs = require('fs');
            const proof = JSON.parse(fs.readFileSync('.tmp/r18e-status/remote-proof.json', 'utf8'));
            const smoke = JSON.parse(fs.readFileSync('.tmp/r18e-status/remote-smoke/r18d-visible-overlays-smoke.json', 'utf8'));
            const repo = process.env.GITHUB_REPOSITORY;
            const headers = {
              'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
            };
            const current = await fetch(`https://api.github.com/repos/${repo}/pulls/7`, {headers});
            if (!current.ok) throw new Error(`PR read failed: ${current.status}`);
            const pr = await current.json();
            const markerStart = '<!-- R18E_REMOTE_STATUS_START -->';
            const markerEnd = '<!-- R18E_REMOTE_STATUS_END -->';
            const cleanBody = String(pr.body || '').replace(new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`, 'g'), '').trim();
            const status = [
              markerStart,
              '## R18E — Hosting DEV remoto verificado',
              '',
              '- Decisión: `PASS_HOSTING_DEV_V131_R18D_REMOTE_VERIFIED`.',
              `- Build: \`${proof.buildLabel}\`.`,
              `- Commit desplegado: \`${proof.gitCommit}\`.`,
              `- Source lock: \`${proof.sourceLockAggregateSha256}\`.`,
              `- Smoke remoto: \`${smoke.decision}\`.`,
              '- Blockers: 0.',
              '- Producción/imports/Firestore/Auth/Storage/HR writes/Make/Gemini/pagos: no ejecutados.',
              '- URL visual: https://cxorbia-backend-dev.web.app/index.html?cxTyaPhaseA=1&r18d=visible',
              markerEnd
            ].join('\n');
            const update = await fetch(`https://api.github.com/repos/${repo}/pulls/7`, {
              method: 'PATCH', headers,
              body: JSON.stringify({
                title: 'draft: Phase A TyA · V131 R18D · Hosting DEV PASS · validación visual',
                body: `${cleanBody}\n\n${status}`
              })
            });
            if (!update.ok) throw new Error(`PR update failed: ${update.status} ${await update.text()}`);
          })().catch(error => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Update PR 7 to R18E HOLD
        if: failure()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          (async () => {
            const repo = process.env.GITHUB_REPOSITORY;
            const headers = {
              'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'Content-Type': 'application/json'
            };
            const current = await fetch(`https://api.github.com/repos/${repo}/pulls/7`, {headers});
            if (!current.ok) return;
            const pr = await current.json();
            const markerStart = '<!-- R18E_REMOTE_STATUS_START -->';
            const markerEnd = '<!-- R18E_REMOTE_STATUS_END -->';
            const cleanBody = String(pr.body || '').replace(new RegExp(`${markerStart}[\\s\\S]*?${markerEnd}`, 'g'), '').trim();
            const status = [
              markerStart,
              '## R18E — verificación remota no cerrada',
              '',
              `- Observer run: \`${process.env.GITHUB_RUN_ID}\`.`,
              '- No se declara PASS ni se habilita validación visual.',
              '- Revisar el paso exacto fallido sin reabrir empalme ni runtime.',
              markerEnd
            ].join('\n');
            await fetch(`https://api.github.com/repos/${repo}/pulls/7`, {
              method: 'PATCH', headers,
              body: JSON.stringify({
                title: 'draft: Phase A TyA · V131 R18D · R18E HOLD verificación remota',
                body: `${cleanBody}\n\n${status}`
              })
            });
          })().catch(error => {
            console.error(error);
            process.exit(0);
          });
          NODE

      - name: Upload status evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-a-r18e-status-pr-report
          path: .tmp/r18e-status
          if-no-files-found: ignore
          retention-days: 14
