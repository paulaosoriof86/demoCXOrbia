name: CXOrbia Phase A R11 Shopper Reference Reconciliation

on:
  push:
    branches:
      - docs-tya-v6-v71-audit
    paths:
      - tools/reconciliation/r11/READY

permissions:
  contents: write

jobs:
  reconcile-shopper-references:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout history completo
        uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
          show-progress: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Construir lectura HR actual source-safe
        shell: bash
        env:
          CXORBIA_HR_SOURCE_SAFE_OUT: .tmp/r11/current-hr-source-safe.js
          CXORBIA_HR_LIVE_MAX_ROW: '140'
          CXORBIA_HR_LIVE_MAX_COL: AI
        run: |
          set -euo pipefail
          mkdir -p .tmp/r11
          node tools/hr-source/tya-build-live-hr-source-safe-static.mjs
          test -s .tmp/r11/current-hr-source-safe.js
          grep -q 'sourceSafe' .tmp/r11/current-hr-source-safe.js

      - name: Ejecutar reconciliador R11
        shell: bash
        run: |
          set -euo pipefail
          node tools/reconciliation/tya-shopper-reference-drift-r11.mjs \
            --current .tmp/r11/current-hr-source-safe.js \
            --target-historical 213 \
            --out-json .tmp/r11/shopper-reference-drift.source-safe.json \
            --out-md .tmp/r11/shopper-reference-drift.source-safe.md
          test -s .tmp/r11/shopper-reference-drift.source-safe.json
          node -e "const r=require('./.tmp/r11/shopper-reference-drift.source-safe.json'); if(!r.safeState.sourceSafe||r.safeState.writes||r.safeState.imported||r.safeState.production) process.exit(2); console.log(r.decision)"

      - name: Documentar resultado R11
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs');
          const R=JSON.parse(fs.readFileSync('.tmp/r11/shopper-reference-drift.source-safe.json','utf8'));
          const list=a=>a.length?a.map(x=>`- ${x.shopperRefId} · ${x.country} · visitas ${x.visits}`).join('\n'):'- none';
          const result=`# PHASE A — R11 RECONCILIACIÓN DE REFERENCIAS SHOPPER\n\nFecha: 2026-07-12\n\n## Decisión\n\n\`${R.decision}\`\n\n## Fuente actual\n\n- periodos: ${R.current.periodCount};\n- visitas: ${R.current.visitCount};\n- shoppers: ${R.current.shopperCount};\n- referenceSet SHA-256: \`${R.current.referenceSetSha256}\`.\n\n## Referencia histórica\n\n${R.historical?`- commit: \`${R.historical.commit}\`;\n- periodos: ${R.historical.periodCount};\n- visitas: ${R.historical.visitCount};\n- shoppers: ${R.historical.shopperCount};\n- referenceSet SHA-256: \`${R.historical.referenceSetSha256}\`.`:'No se encontró en el historial Git un payload source-safe aprobado con las 213 referencias completas.'}\n\n## Comparación\n\n- estables: ${R.comparison.stableCount};\n- históricas ausentes en lectura actual: ${R.comparison.missingFromCurrentCount};\n- nuevas en lectura actual: ${R.comparison.newInCurrentCount};\n- cambios de país: ${R.comparison.changedCountryCount}.\n\n### Históricas ausentes\n\n${list(R.comparison.missingFromCurrent)}\n\n### Nuevas actuales\n\n${list(R.comparison.newInCurrent)}\n\n## Política aplicada\n\n- No nombres ni datos personales crudos.\n- No match por nombre o semejanza visual.\n- No borrado, merge, backfill ni materialización automática.\n- Toda diferencia pasa a revisión humana con referencia opaca.\n\n## Siguiente acción\n\n${R.nextAction}\n\n## Estado seguro\n\nSource-safe, sin imports, writes, deploy, producción, providers, HR writes ni pagos reales.\n`;
          fs.writeFileSync('app/docs/PHASE-A-SHOPPER-REFERENCE-DRIFT-R11-20260712.md',result,'utf8');
          fs.writeFileSync('app/docs/CAMBIOS-BACKEND-ADDENDUM-SHOPPER-REFERENCE-DRIFT-R11-20260712.md',`# CAMBIOS BACKEND — R11 SHOPPER REFERENCE DRIFT\n\n- Se agregó un reconciliador source-safe que compara referencias opacas, nunca nombres.\n- Decisión: \`${R.decision}\`.\n- Actual: ${R.current.shopperCount}; referencia histórica encontrada: ${R.historical?R.historical.shopperCount:'no disponible en Git'}; estables: ${R.comparison.stableCount}; históricas ausentes: ${R.comparison.missingFromCurrentCount}; nuevas: ${R.comparison.newInCurrentCount}.\n- Sin materialización, imports, writes, deploy, producción ni datos sensibles.\n`,'utf8');
          fs.writeFileSync('app/docs/ACADEMIA-IMPACT-SHOPPER-REFERENCE-DRIFT-R11-20260712.md',`# ACADEMIA — IMPACTO R11 SHOPPER REFERENCES\n\n- Este bloque no cambia cursos, rutas ni contenido visible.\n- Manuales de administración deben explicar que una diferencia de identidad se revisa por llave estable y nunca por nombre.\n- No corresponde paquete Claude inmediato.\n- Clasificación: \`Reusable CXOrbia\` + \`Sin impacto Claude crítico\` + \`Academia documental\`.\n`,'utf8');
          fs.writeFileSync('app/docs/PHASE-A-BLOCK-PROGRESS-TRACKER-R11-SHOPPER-REFERENCE-20260712.md',`# TRACKER PHASE A — R11 SHOPPER REFERENCES\n\n- V110 empalmada: COMPLETED_VERIFIED.\n- R10: PASS_WITH_REVIEW.\n- R11: ${R.decision}.\n- Actual: ${R.current.shopperCount} shoppers.\n- Histórica encontrada: ${R.historical?R.historical.shopperCount:'NO'}.\n- Históricas ausentes: ${R.comparison.missingFromCurrentCount}.\n- Nuevas actuales: ${R.comparison.newInCurrentCount}.\n- Materialización shopper: HOLD hasta cierre de revisión.\n- Producción: HOLD.\n\nSiguiente bloque exacto: ${R.historical?'crear candidatos source-safe de reviewQueue para las referencias divergentes y validar que no afecten visitas, certificaciones o liquidaciones':'recuperar un set histórico source-safe aprobado de 213 referencias desde evidencia R5 o salida protegida, sin inferir identidades por conteo'}.\n`,'utf8');
          fs.writeFileSync('backend/config/phase-a-shopper-reference-drift-r11.source-safe.json',JSON.stringify(R,null,2)+'\n','utf8');
          let cb=fs.readFileSync('CAMBIOS-BACKEND.md','utf8');
          cb+=`\n\n## R11 reconciliación shopper references — 2026-07-12\n\n- Reconciliador source-safe por referencias opacas agregado y ejecutado.\n- Decisión: \`${R.decision}\`.\n- Actual ${R.current.shopperCount}; histórica ${R.historical?R.historical.shopperCount:'no localizada'}; históricas ausentes ${R.comparison.missingFromCurrentCount}; nuevas ${R.comparison.newInCurrentCount}.\n- No match por nombre, no materialización, no imports, no writes, no deploy ni producción.\n`;
          fs.writeFileSync('CAMBIOS-BACKEND.md',cb,'utf8');
          let rs=fs.readFileSync('RESUMEN-PARA-CLAUDE.md','utf8');
          rs+=`\n\n## R11 shopper references — 2026-07-12\n\n- Decisión backend: \`${R.decision}\`.\n- No es tarea Claude: la diferencia 210/213 se procesa por referencias opacas y revisión humana.\n- No reabrir P0 V110 ni R10.\n`;
          fs.writeFileSync('RESUMEN-PARA-CLAUDE.md',rs,'utf8');
          NODE
          cp .tmp/r11/shopper-reference-drift.source-safe.json tools/reconciliation/r11-result.source-safe.json
          cp .tmp/r11/shopper-reference-drift.source-safe.md tools/reconciliation/r11-result.source-safe.md

      - name: Refrescar source lock unión
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs=require('fs'),path=require('path'),crypto=require('crypto');
          const root=path.resolve('app'),manifestRel='docs/MANIFEST-V110-UNION-EMPALME-R1.json',verifierRel='docs/verify-manifest-v110-union-empalme.mjs';
          const M=JSON.parse(fs.readFileSync(path.join(root,manifestRel),'utf8'));
          const excluded=new Set(['core/build-lock.js',manifestRel,verifierRel]),rels=[];
          function walk(d){for(const e of fs.readdirSync(d,{withFileTypes:true})){const p=path.join(d,e.name);if(e.isDirectory())walk(p);else if(e.isFile())rels.push(path.relative(root,p).split(path.sep).join('/'));}}walk(root);
          const sha=b=>crypto.createHash('sha256').update(b).digest('hex');
          const files=rels.filter(r=>!excluded.has(r)).sort().map(r=>{const b=fs.readFileSync(path.join(root,r));return{path:r,size:b.length,sha256:sha(b)};});
          const aggregateSha256=sha(Buffer.from(files.map(f=>`${f.path}:${f.sha256}`).join('\n'),'utf8'));
          const R=JSON.parse(fs.readFileSync('backend/config/phase-a-shopper-reference-drift-r11.source-safe.json','utf8'));
          M.generatedAt=new Date().toISOString();M.fileCount=files.length;M.aggregateSha256=aggregateSha256;M.files=files;M.r11={decision:R.decision,report:'docs/PHASE-A-SHOPPER-REFERENCE-DRIFT-R11-20260712.md',current:R.current.shopperCount,historical:R.historical?.shopperCount||null,missing:R.comparison.missingFromCurrentCount,newRefs:R.comparison.newInCurrentCount};
          fs.writeFileSync(path.join(root,manifestRel),JSON.stringify(M,null,2)+'\n','utf8');
          fs.writeFileSync(path.join(root,'core','build-lock.js'),`/* CXOrbia · Source lock unión V110 · R10/R11 */\nvar CX_SOURCE_LOCK={manifestFile:'${manifestRel}',aggregateSha256:'${aggregateSha256}',fileCount:${files.length},runtimeIdentity:'67 exactos V110 + 2 overrides locales protegidos + lock unión',r10Decision:'${M.r10?.decision||'PASS_WITH_REVIEW_SOURCE_SAFE_VISUAL_SMOKE'}',r11Decision:'${R.decision}',generatedAt:'${M.generatedAt.slice(0,10)}',sourceZipSha256:'${M.sourceZipSha256}',note:'V110 empalmada; R10 y R11 documentados; backend preservado.'};\nvar CX_BUILD_ID=CX_SOURCE_LOCK.aggregateSha256.slice(0,16);\nif(typeof window!=='undefined'){window.CX=window.CX||{};window.CX.BUILD_ID=CX_BUILD_ID;window.CX.SOURCE_LOCK=CX_SOURCE_LOCK;}\n`,'utf8');
          NODE
          node --check app/core/build-lock.js
          (cd app && node docs/verify-manifest-v110-union-empalme.mjs)

      - name: Commit y limpiar runner
        shell: bash
        run: |
          set -euo pipefail
          git rm -f .github/workflows/cxorbia-r11-shopper-reference-reconciliation.yml
          git rm -rf tools/reconciliation/r11
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend/config tools/reconciliation CAMBIOS-BACKEND.md RESUMEN-PARA-CLAUDE.md .github/workflows
          git commit -m "feat(phase-a): reconcile shopper reference drift R11 source-safe"
          git push origin HEAD:docs-tya-v6-v71-audit
