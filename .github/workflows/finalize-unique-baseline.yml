name: cxorbia finalize unique baseline
on:
  push:
    branches: [docs-tya-v6-v71-audit]
    paths:
      - '.github/workflows/finalize-unique-baseline.yml'
permissions:
  contents: write
  issues: write
jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: docs-tya-v6-v71-audit
          fetch-depth: 0
      - name: Promote V156 runtime
        shell: bash
        run: |
          set -euo pipefail
          echo "d96784fac04b5ca03613fa790a46e63c5ca512da9d82b4cf4b6b0ad540d3a020  .cxorbia/v156-promotion.patch.gz.b64" | sha256sum -c -
          base64 -d .cxorbia/v156-promotion.patch.gz.b64 | gzip -d > /tmp/v156.patch
          echo "8bfb2a85e1c42d095f56fbac7367da54b2872503effb2a7af939aa8a471b9347  /tmp/v156.patch" | sha256sum -c -
          git apply --check --exclude=app/core/finanzas-core.js --exclude=app/core/build-lock.js --exclude=app/modules/importador.js --exclude='app/docs/**' /tmp/v156.patch
          git apply --exclude=app/core/finanzas-core.js --exclude=app/core/build-lock.js --exclude=app/modules/importador.js --exclude='app/docs/**' /tmp/v156.patch
          grep -q "const p=data.project()" app/core/finanzas-core.js
          grep -q "project:()=>p, period:()=>p" app/core/finanzas-core.js
          grep -q "sourceContract" app/modules/importador.js
          find app -name '*.js' -not -path 'app/docs/*' -print0 | xargs -0 -n1 node --check
          rm -rf .cxorbia
          rm -f .github/workflows/finalize-unique-baseline.yml .github/workflows/diagnose-v156-apply.yml .github/workflows/export-current-app-for-finalization.yml .github/workflows/snapshot-current-for-finalization.yml
          git config user.name "CXOrbia Baseline Bot"
          git config user.email "cxorbia-baseline@example.invalid"
          git add -A
          git commit -m "feat: promote V156 runtime as the only active version"
          FINAL_SHA=$(git rev-parse HEAD)
          git push origin HEAD:docs-tya-v6-v71-audit
          gh api repos/${{ github.repository }}/issues/7/comments -f body="V156_RUNTIME_FINAL_COMMIT=${FINAL_SHA}"
